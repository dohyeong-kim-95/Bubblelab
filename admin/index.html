<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Bubblelab Admin</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
         background: light-dark(#f2f6fa, #0d131c); color: light-dark(#17202b, #dbe5ef); }
  main { width: min(54rem, 100%); margin: 0 auto; padding: 3rem 1.25rem; }
  header { display: flex; align-items: center; justify-content: space-between;
           gap: 1rem; margin-bottom: 2rem; }
  h1 { margin: 0; font-size: 1.3rem; }
  .logout { color: inherit; opacity: .65; font-size: .85rem; }
  .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .card { min-height: 10rem; padding: 1.25rem; border-radius: 1.2rem;
          display: flex; flex-direction: column; justify-content: space-between;
          background: light-dark(#fff, #151e2a); border: 1px solid light-dark(#dce4ec, #263445); }
  .label { opacity: .58; font-size: .85rem; }
  .value { font-size: clamp(2.3rem, 8vw, 4rem); font-weight: bold;
           font-variant-numeric: tabular-nums; }
  .range { opacity: .45; font-size: .75rem; }
  .top { margin-top: 2rem; }
  .top h2 { font-size: 1rem; margin: 0 0 .8rem; opacity: .8; }
  #top { list-style: none; margin: 0; padding: 0; display: flex;
         flex-direction: column; gap: .6rem; }
  #top li { display: flex; align-items: center; gap: .8rem; padding: .85rem 1.1rem;
            border-radius: 1rem; background: light-dark(#fff, #151e2a);
            border: 1px solid light-dark(#dce4ec, #263445); }
  #top .medal { font-size: 1.3rem; }
  #top .page { flex: 1; font-weight: bold; overflow-wrap: anywhere; }
  #top .users { opacity: .6; font-size: .9rem; font-variant-numeric: tabular-nums; }
  #top .empty, #suggestions .empty, #records .empty { opacity: .55; justify-content: center; }
  #suggestions, #records { list-style: none; margin: 0; padding: 0; display: flex;
                 flex-direction: column; gap: .6rem; }
  #suggestions li, #records li { display: flex; align-items: baseline; gap: .8rem;
                    padding: .85rem 1.1rem; border-radius: 1rem;
                    background: light-dark(#fff, #151e2a);
                    border: 1px solid light-dark(#dce4ec, #263445); }
  #suggestions .text, #records .text { flex: 1; overflow-wrap: anywhere; }
  #suggestions .meta, #records .meta { opacity: .5; font-size: .78rem; white-space: nowrap; }
  #suggestions .del, #records .del { border: 0; background: none; color: inherit;
                      opacity: .45; cursor: pointer; font: inherit; padding: 0 .2rem; }
  #suggestions .del:hover, #records .del:hover { opacity: 1; }
  #notice-card { padding: 1rem 1.1rem; border-radius: 1rem;
                 background: light-dark(#fff, #151e2a);
                 border: 1px solid light-dark(#dce4ec, #263445);
                 display: flex; flex-direction: column; gap: .7rem; }
  #notice-text { width: 100%; font: inherit; padding: .6rem .7rem; resize: vertical;
                 border-radius: .6rem; border: 1px solid light-dark(#dce4ec, #263445);
                 background: none; color: inherit; }
  .notice-actions { display: flex; align-items: center; gap: .6rem; }
  .notice-actions .meta { flex: 1; opacity: .5; font-size: .78rem; }
  .notice-actions button { font: inherit; font-size: .85rem; padding: .45rem .9rem;
                 border-radius: .6rem; border: 1px solid currentColor;
                 background: none; color: inherit; cursor: pointer; }
  #warning { display: none; margin-top: 1rem; padding: .85rem 1rem; border-radius: .8rem;
             background: light-dark(#fff2c7, #4a3711); color: light-dark(#6a4a00, #ffe49a); }
  footer { margin-top: 2rem; opacity: .5; font-size: .78rem; line-height: 1.7; }
  @media (max-width: 38rem) { .cards { grid-template-columns: 1fr; } .card { min-height: 8rem; } }
</style>
</head>
<body>
<main>
  <header><h1>🫧 Bubblelab Admin</h1><a class="logout" href="logout">로그아웃</a></header>
  <section class="cards" aria-label="순사용자 통계">
    <article class="card"><span class="label">일간 사용자</span><strong class="value" id="daily">—</strong><span class="range">오늘 · KST</span></article>
    <article class="card"><span class="label">주간 사용자</span><strong class="value" id="weekly">—</strong><span class="range">최근 7일</span></article>
    <article class="card"><span class="label">월간 사용자</span><strong class="value" id="monthly">—</strong><span class="range">최근 30일</span></article>
  </section>
  <section class="top" aria-label="월간 인기 카드">
    <h2>🏆 월간 인기 카드 TOP 3</h2>
    <ol id="top"><li class="empty">불러오는 중…</li></ol>
  </section>
  <section class="top" aria-label="주간 신기록 보드">
    <h2>👑 주간 신기록 보드 <span id="recweek" style="opacity:.5;font-weight:normal;font-size:.8rem"></span></h2>
    <ol id="records"><li class="empty">불러오는 중…</li></ol>
  </section>
  <section class="top" aria-label="공지">
    <h2>📢 공지 <span style="opacity:.5;font-weight:normal;font-size:.8rem">방문자에게 팝업으로 한 번씩 보여요</span></h2>
    <div id="notice-card">
      <textarea id="notice-text" rows="3" maxlength="200"
        placeholder="예: 지난주 통합 1위는 김윤배님! 이번 주도 도전해보세요"></textarea>
      <div class="notice-actions">
        <span id="notice-meta" class="meta">불러오는 중…</span>
        <button id="notice-save">게시</button>
        <button id="notice-clear">내리기</button>
      </div>
    </div>
  </section>
  <section class="top" aria-label="토이 아이디어 요청함">
    <h2>💡 토이 아이디어 요청함</h2>
    <ol id="suggestions"><li class="empty">불러오는 중…</li></ol>
  </section>
  <div id="warning">⚠️ 초기 계정 admin/admin을 사용 중입니다. Cloudflare secrets를 설정해 변경하세요.</div>
  <footer id="status">불러오는 중…</footer>
</main>
<script>
async function loadStats() {
  const status = document.getElementById('status');
  try {
    const base = location.hostname.endsWith('bubblelab.dev') ? '' : '/admin';
    const res = await fetch(`${base}/api/stats`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    for (const key of ['daily', 'weekly', 'monthly']) {
      document.getElementById(key).textContent = data[key].toLocaleString('ko-KR');
    }
    const top = document.getElementById('top');
    top.replaceChildren();
    const medals = ['🥇', '🥈', '🥉'];
    for (const [i, entry] of (data.top ?? []).entries()) {
      const li = document.createElement('li');
      for (const [cls, text] of [
        ['medal', medals[i]], ['page', entry.page],
        ['users', `${entry.users.toLocaleString('ko-KR')}명`],
      ]) {
        const span = document.createElement('span');
        span.className = cls;
        span.textContent = text;
        li.append(span);
      }
      top.append(li);
    }
    if (!top.children.length) {
      const li = document.createElement('li');
      li.className = 'empty';
      li.textContent = '아직 집계된 카드가 없어요';
      top.append(li);
    }
    document.getElementById('warning').style.display = data.usingDefaultCredentials ? 'block' : 'none';
    status.textContent = `${data.date} 기준 · 익명 브라우저 순사용자 · ${new Date(data.generatedAt).toLocaleTimeString('ko-KR')} 갱신`;
  } catch (err) {
    status.textContent = `통계를 불러오지 못했습니다: ${err.message}`;
  }
}
const base = location.hostname.endsWith('bubblelab.dev') ? '' : '/admin';

async function loadSuggestions() {
  const list = document.getElementById('suggestions');
  const empty = (text) => {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = text;
    list.replaceChildren(li);
  };
  try {
    const res = await fetch(`${base}/api/suggestions`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { items } = await res.json();
    if (!items.length) return empty('아직 들어온 아이디어가 없어요');
    list.replaceChildren();
    for (const item of items) {
      const li = document.createElement('li');
      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = item.text;
      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = `${item.page || '?'} · ${new Date(item.at).toLocaleDateString('ko-KR')}`;
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '✕';
      del.title = '삭제';
      del.addEventListener('click', async () => {
        await fetch(`${base}/api/suggestions?id=${encodeURIComponent(item.id)}`, { method: 'DELETE' });
        li.remove();
        if (!list.children.length) empty('아직 들어온 아이디어가 없어요');
      });
      li.append(text, meta, del);
      list.append(li);
    }
  } catch (err) {
    empty(`불러오지 못했어요: ${err.message}`);
  }
}

async function loadRecords() {
  const list = document.getElementById('records');
  const empty = (text) => {
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = text;
    list.replaceChildren(li);
  };
  try {
    const res = await fetch(`${base}/api/records`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { week, records } = await res.json();
    document.getElementById('recweek').textContent = `(${week} 주)`;
    const games = Object.keys(records).sort();
    if (!games.length) return empty('이번 주 기록이 아직 없어요');
    list.replaceChildren();
    for (const game of games) {
      const r = records[game];
      const li = document.createElement('li');
      const text = document.createElement('span');
      text.className = 'text';
      text.textContent = `${game} — 👑 ${r.nick} · ${r.text ?? r.score}`;
      const meta = document.createElement('span');
      meta.className = 'meta';
      meta.textContent = new Date(r.at).toLocaleDateString('ko-KR');
      const del = document.createElement('button');
      del.className = 'del';
      del.textContent = '✕';
      del.title = `${game} 기록 리셋`;
      del.addEventListener('click', async () => {
        if (!confirm(`${game}의 이번 주 기록(${r.nick})을 리셋할까요?`)) return;
        await fetch(`${base}/api/records?game=${encodeURIComponent(game)}`, { method: 'DELETE' });
        loadRecords();
      });
      li.append(text, meta, del);
      list.append(li);
    }
  } catch (err) {
    empty(`불러오지 못했어요: ${err.message}`);
  }
}

const noticeText = document.getElementById('notice-text');
const noticeMeta = document.getElementById('notice-meta');

async function loadNotice() {
  try {
    const res = await fetch(`${base}/api/notice`, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const { notice } = await res.json();
    noticeText.value = notice?.text ?? '';
    noticeMeta.textContent = notice
      ? `${new Date(notice.at).toLocaleString('ko-KR')} 게시됨` : '게시된 공지 없음';
  } catch (err) {
    noticeMeta.textContent = `불러오지 못했어요: ${err.message}`;
  }
}

document.getElementById('notice-save').addEventListener('click', async () => {
  const text = noticeText.value.trim();
  if (!text) { noticeMeta.textContent = '⚠️ 내용을 입력해주세요 (내리려면 "내리기")'; return; }
  noticeMeta.textContent = '게시 중…';
  const res = await fetch(`${base}/api/notice`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text }),
  });
  noticeMeta.textContent = res.ok ? '' : `⚠️ 게시 실패 (HTTP ${res.status})`;
  if (res.ok) loadNotice();
});

document.getElementById('notice-clear').addEventListener('click', async () => {
  if (!confirm('공지를 내릴까요?')) return;
  await fetch(`${base}/api/notice`, { method: 'DELETE' });
  loadNotice();
});

loadStats();
loadSuggestions();
loadRecords();
loadNotice();
setInterval(loadStats, 60_000);
setInterval(loadSuggestions, 60_000);
setInterval(loadRecords, 60_000);
</script>
</body>
</html>
