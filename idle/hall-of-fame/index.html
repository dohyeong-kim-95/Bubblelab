<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#102c3b">
<meta name="description" content="Bubble Pop Idle 7일 완주 명예의 전당">
<title>🏆 Bubble Pop Idle 명예의 전당</title>
<style>
  :root { color-scheme: dark; --ink:#e9f9ff; --muted:#8db2c2; --line:#315464; --gold:#ffd56a; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100dvh; display:grid; place-items:center; padding:1.2rem;
    color:var(--ink); background:radial-gradient(circle at 50% 10%,#245d72,#102c3b 42%,#071923);
    font-family:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Consolas,monospace; }
  main { width:min(100%,31rem); text-align:center; }
  .back { display:inline-block; margin-bottom:2.2rem; color:var(--muted); font-size:.75rem; }
  .trophy { font-size:4.5rem; filter:drop-shadow(0 14px 25px #ffd56a44); }
  .eyebrow { margin:1rem 0 .35rem; color:var(--gold); font-size:.65rem; letter-spacing:.14em; }
  h1 { margin:0; font-size:clamp(1.45rem,7vw,2.2rem); }
  .intro { margin:.7rem auto 1.8rem; max-width:24rem; color:var(--muted); font-size:.75rem; line-height:1.7; }
  .champion { min-height:12rem; display:flex; flex-direction:column; justify-content:center; padding:1.4rem;
    border:1px solid #ffd56a66; border-radius:1.3rem; background:#fff0c90d; box-shadow:0 18px 60px #0005; }
  .crown { font-size:2rem; }
  .nick { margin:.5rem 0 .35rem; color:var(--gold); font-size:1.35rem; font-weight:bold; }
  .score { font-size:clamp(1.8rem,9vw,3rem); font-weight:bold; font-variant-numeric:tabular-nums; }
  .date { margin-top:.55rem; color:var(--muted); font-size:.65rem; }
  .empty { color:var(--muted); font-size:.82rem; line-height:1.7; }
  .history { margin-top:1rem; display:grid; gap:.5rem; text-align:left; }
  .history h2 { margin:1rem 0 .2rem; color:var(--muted); font-size:.72rem; letter-spacing:.08em; }
  .history-row { display:grid; grid-template-columns:1fr auto; gap:.25rem .8rem; padding:.75rem .85rem;
    border:1px solid var(--line); border-radius:.8rem; background:#ffffff08; }
  .history-row b { color:var(--gold); font-size:.78rem; }
  .history-row .week { color:var(--muted); font-size:.62rem; }
  .history-row .record { grid-row:1 / 3; grid-column:2; align-self:center; font-size:.76rem; font-weight:bold; }
  .rules { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; margin:1rem 0; }
  .rule { padding:.8rem .45rem; border:1px solid var(--line); border-radius:.9rem; background:#ffffff08; }
  .rule b,.rule span { display:block; }
  .rule b { font-size:.73rem; }
  .rule span { margin-top:.35rem; color:var(--muted); font-size:.6rem; line-height:1.45; }
  .play { display:block; margin-top:1rem; padding:1rem; border-radius:999px; color:#0b2734;
    background:var(--gold); box-shadow:0 5px 0 #b18a2d; text-decoration:none; font-weight:bold; }
  footer { margin-top:1.5rem; color:var(--muted); font-size:.62rem; }
</style>
</head>
<body>
<main>
  <a class="back" href="/">← idle.bubblelab.dev</a>
  <div class="trophy">🏆</div>
  <p class="eyebrow">SEVEN DAYS · ONE RECORD</p>
  <h1>명예의 전당</h1>
  <p class="intro">월요일 09:00 KST부터 모두 같은 7일. 가장 많은 버블을 만든 단 한 명이 그 시즌의 왕좌를 차지합니다.</p>
  <section class="champion" id="champion" aria-live="polite"><p class="empty">기록을 불러오는 중…</p></section>
  <section class="history" id="history"></section>
  <section class="rules" aria-label="경기 규칙">
    <div class="rule"><b>⏳ 7일</b><span>월요일 09시부터 같은 시즌</span></div>
    <div class="rule"><b>🌙 24시간</b><span>한 번에 받는 최대 오프라인 보상</span></div>
    <div class="rule"><b>🫧 누적</b><span>7일 동안 만든 모든 버블이 점수</span></div>
  </section>
  <a class="play" href="/bubble-pop/">Bubble Pop Idle 시작하기</a>
  <footer>친구들과 즐기는 양심 기록 · Bubblelab</footer>
</main>
<script type="module">
const champion = document.getElementById("champion");
const historyEl = document.getElementById("history");
const esc = (value) => String(value ?? "").replace(/[&<>"']/g, (char) => ({
  "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;",
})[char]);
try {
  const response = await fetch("/_records?history=1&game=bubble-pop-idle", { cache: "no-store" });
  if (!response.ok) throw new Error();
  const { week, records } = await response.json();
  const record = records.find((item) => item.week === week);
  if (!record) {
    champion.innerHTML = '<div class="crown">👑</div><p class="empty">아직 7일을 완주한 사람이 없어요.<br>첫 번째 이름을 남겨보세요.</p>';
  } else {
    const date = new Date(record.at).toLocaleDateString("ko-KR", { year:"numeric", month:"long", day:"numeric" });
    champion.innerHTML = `<div class="crown">👑</div><div class="nick">${esc(record.nick)}</div>
      <div class="score">${esc(record.text ?? record.score)}</div><div class="date">${esc(date)} 등극</div>`;
  }
  const past = records.filter((item) => item.week !== week);
  if (past.length) {
    historyEl.innerHTML = `<h2>지난 시즌 우승자</h2>${past.map((item) => `
      <article class="history-row"><b>${esc(item.nick)}</b><span class="week">${esc(item.week)} 시즌</span>
      <span class="record">${esc(item.text ?? item.score)}</span></article>`).join("")}`;
  }
} catch {
  champion.innerHTML = '<p class="empty">기록 서버에 연결하지 못했어요.<br>잠시 후 다시 확인해주세요.</p>';
}
</script>
</body>
</html>
