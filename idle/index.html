<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#eefaff">
<meta name="description" content="일주일 동안 천천히 자라는 Bubblelab 방치형 게임">
<title>idle.bubblelab.dev</title>
<link rel="preconnect" href="https://bubblelab.dev">
<link rel="preconnect" href="https://assets.bubblelab.dev">
<link rel="preconnect" href="https://games.bubblelab.dev">
<link rel="preconnect" href="https://slop.bubblelab.dev">
<link rel="preconnect" href="https://util.bubblelab.dev">
<style>
  :root { color-scheme:light dark; --ink:light-dark(#17384a,#dff6ff); --muted:light-dark(#688594,#89aebe);
    --line:light-dark(#bcdce8,#2d5263); --panel:light-dark(#fff,#102d3a); --bg:light-dark(#eefaff,#071a23); }
  * { box-sizing:border-box; }
  body { margin:0; min-height:100dvh; padding:2.5rem 1.2rem 4rem; color:var(--ink); background:var(--bg);
    font-family:ui-monospace,"SF Mono","Cascadia Mono","Roboto Mono",Consolas,monospace; }
  main { width:min(100%,42rem); margin:0 auto; }
  header { margin-bottom:2rem; text-align:center; }
  h1 { margin:0; font-size:1.35rem; }
  .site-switcher { position:relative; width:max-content; max-width:100%; margin:0 auto 1rem; }
  .site-trigger { border:0; padding:.4rem .55rem; border-radius:.6rem; color:inherit; background:transparent;
    font:inherit; font-size:1.35rem; cursor:pointer; }
  .site-trigger:hover,.site-trigger:focus-visible { background:light-dark(#deeff5,#102d3a); outline:none; }
  .site-trigger .domain { color:var(--muted); font-weight:normal; }
  .chevron { display:inline-block; margin-left:.2rem; color:var(--muted); font-size:.65em; transition:transform .15s; }
  .site-trigger[aria-expanded="true"] .chevron { transform:rotate(180deg); }
  .site-menu { position:absolute; z-index:30; top:calc(100% + .3rem); left:50%; transform:translateX(-50%);
    width:13rem; padding:.4rem; border:1px solid var(--line); border-radius:.8rem; background:var(--panel);
    box-shadow:0 12px 30px light-dark(#1b27331f,#0008); text-align:left; }
  .site-menu[hidden] { display:none; }
  .site-menu a { display:grid; grid-template-columns:1.3rem 1fr; align-items:center; padding:.65rem .7rem;
    border-radius:.55rem; color:inherit; text-decoration:none; font-size:.9rem; }
  .site-menu a:hover,.site-menu a:focus-visible { background:light-dark(#eef6fa,#1b3a48); outline:none; }
  .site-menu a[aria-current="page"] { font-weight:bold; }
  .site-menu .menu-home { margin-bottom:.25rem; border-bottom:1px solid var(--line); }
  .intro { margin:0; color:var(--muted); font-size:.75rem; line-height:1.7; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
  .card { position:relative; min-height:17rem; overflow:hidden; display:flex; flex-direction:column;
    justify-content:space-between; padding:1.2rem; border:1px solid var(--line); border-radius:1.3rem;
    color:inherit; background:var(--panel); text-decoration:none; box-shadow:0 6px 0 light-dark(#cce6ef,#041117); }
  .card:active { transform:translateY(3px); box-shadow:0 3px 0 light-dark(#cce6ef,#041117); }
  .game { background:radial-gradient(circle at 80% 5%,light-dark(#bdeeff,#214e62),var(--panel) 55%); }
  .emoji { font-size:3.1rem; }
  .label { color:var(--muted); font-size:.62rem; letter-spacing:.1em; }
  .card h2 { margin:.4rem 0; font-size:1.05rem; }
  .card p { margin:0; color:var(--muted); font-size:.68rem; line-height:1.6; }
  .reset { margin-top:1rem; padding:.65rem .7rem; border-radius:.7rem; color:light-dark(#155575,#bcecff);
    background:light-dark(#ddf5ff,#0a2431); font-size:.65rem; font-weight:bold; }
  .reset strong { display:block; margin-top:.2rem; font-size:1.05rem; font-variant-numeric:tabular-nums; letter-spacing:.05em; }
  .reset.urgent { color:light-dark(#8f310e,#ffd0b8); background:light-dark(#fff0e8,#3a180d); animation:pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 50% { opacity:.72; } }
  .arrow { align-self:flex-end; margin-top:1rem; font-size:1rem; }
  footer { margin-top:2.5rem; color:var(--muted); text-align:center; font-size:.65rem; }
  @media(max-width:34rem) { .grid { grid-template-columns:1fr; } .card { min-height:14rem; } }
  @media(prefers-reduced-motion:reduce) { * { animation:none!important; } }
</style>
</head>
<body>
<main>
  <header>
    <div class="site-switcher">
      <h1><button class="site-trigger" id="siteTrigger" type="button" aria-expanded="false" aria-controls="siteMenu">
        🫧 <strong>idle</strong><span class="chevron">⌄</span><span class="domain">.bubblelab.dev</span>
      </button></h1>
      <nav class="site-menu" id="siteMenu" aria-label="Bubblelab sites" hidden>
        <a class="menu-home" href="https://bubblelab.dev"><span>🫧</span>bubblelab</a>
        <a href="https://assets.bubblelab.dev"><span></span>assets</a>
        <a href="https://games.bubblelab.dev"><span></span>games</a>
        <a href="https://idle.bubblelab.dev" aria-current="page"><span>✓</span>idle</a>
        <a href="https://slop.bubblelab.dev"><span></span>slop</a>
        <a href="https://util.bubblelab.dev"><span></span>util</a>
      </nav>
    </div>
    <p class="intro">켜두지 않아도 자라고, 끝이 있어서 기억에 남는 작은 게임.</p>
  </header>
  <section class="grid">
    <a class="card game" href="/bubble-pop/">
      <div><span class="emoji">🫧</span><div class="label">7 DAY IDLE</div><h2>Bubble Pop Idle</h2>
        <p>버블을 터뜨리고 자동화하세요.<br>누적 버블로 새 기능을 해금합니다.</p></div>
      <div class="reset" id="reset-warning">월요일 09:00 KST 초기화<strong id="countdown">--D --H</strong></div>
      <span class="arrow">시작하기 →</span>
    </a>
    <a class="card" href="/hall-of-fame/">
      <div><span class="emoji">🏆</span><div class="label">WEEKLY ARCHIVE</div><h2>명예의 전당</h2>
        <p>현재 시즌의 왕좌와<br>지난주 우승자들을 확인하세요.</p></div>
      <span class="arrow">기록 보기 →</span>
    </a>
  </section>
  <footer>모든 시즌은 매주 월요일 09:00 KST에 함께 시작합니다.</footer>
</main>
<script>
const siteTrigger = document.getElementById("siteTrigger");
const siteMenu = document.getElementById("siteMenu");
const closeSiteMenu = () => {
  siteMenu.hidden = true;
  siteTrigger.setAttribute("aria-expanded", "false");
};
siteTrigger.addEventListener("click", () => {
  const opening = siteMenu.hidden;
  siteMenu.hidden = !opening;
  siteTrigger.setAttribute("aria-expanded", String(opening));
  if (opening) {
    siteMenu.querySelector('[aria-current="page"]')?.focus();
    for (const anchor of siteMenu.querySelectorAll('a:not([aria-current="page"])')) {
      if (document.head.querySelector(`link[rel="prefetch"][href="${anchor.href}"]`)) continue;
      const link = document.createElement("link"); link.rel = "prefetch"; link.href = anchor.href;
      document.head.append(link);
    }
  }
});
addEventListener("click", (event) => {
  if (!event.target.closest(".site-switcher")) closeSiteMenu();
});
addEventListener("keydown", (event) => {
  if (event.key === "Escape" && !siteMenu.hidden) { closeSiteMenu(); siteTrigger.focus(); }
});
const countdown = document.getElementById("countdown");
const warning = document.getElementById("reset-warning");
function nextReset(now = new Date()) {
  const today = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
  const monday = today - ((now.getUTCDay() + 6) % 7) * 86400000;
  let reset = monday + 7 * 86400000;
  if (now.getTime() < monday) reset = monday;
  return reset;
}
function updateCountdown() {
  const left = Math.max(0, nextReset() - Date.now());
  const days = Math.floor(left / 86400000);
  const hours = Math.floor(left % 86400000 / 3600000);
  countdown.textContent = `${String(days).padStart(2,"0")}D ${String(hours).padStart(2,"0")}H`;
  warning.classList.toggle("urgent", left <= 24 * 60 * 60 * 1000);
}
updateCountdown();
setInterval(updateCountdown, 60000);
</script>
</body>
</html>
