<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Fruit Merge | Bubble Lab</title><!-- 🍉 -->
<meta name="description" content="같은 과일을 합쳐 더 큰 과일을 만드는 물리 퍼즐 게임">
<style>
:root{color-scheme:light;--ink:#35271f;--orange:#ef7f43}*{box-sizing:border-box}html,body{margin:0;min-height:100%;overscroll-behavior:none}body{background:#f8dca0;color:var(--ink);font-family:ui-rounded,"Arial Rounded MT Bold","Noto Sans KR",system-ui,sans-serif}.shell{min-height:100svh;padding:18px 14px 28px;display:grid;place-items:center;position:relative;overflow:hidden;background:radial-gradient(circle at 20% 10%,#fff9db 0 7%,transparent 24%),linear-gradient(155deg,#ffe5a8,#f3bf82)}.glow{position:fixed;border-radius:50%;opacity:.5;pointer-events:none}.glow.a{width:260px;height:260px;background:#ff9670;left:-130px;bottom:-80px}.glow.b{width:220px;height:220px;background:#fff8c9;right:-110px;top:12%}.game{width:min(100%,430px);position:relative;z-index:1}header{display:flex;align-items:flex-end;justify-content:space-between;margin:0 4px 14px}.eyebrow{font-size:9px;letter-spacing:.2em;font-weight:900;color:#a56644;margin:0 0 3px}h1{font-size:31px;line-height:.9;letter-spacing:-.06em;margin:0;font-weight:1000}h1 span{color:var(--orange)}button{font:inherit}.sound{width:38px;height:38px;border:1px solid #7543242e;border-radius:50%;background:#fffbe7b8;color:#795036;font-size:20px;font-weight:900;box-shadow:0 5px 16px #5b33181a}.scores{display:grid;grid-template-columns:1fr 1fr 72px;gap:8px;margin-bottom:9px}.card,.next{height:58px;border:1px solid #7543241f;border-radius:17px;background:#fffbe7d6;box-shadow:0 6px 18px #5c341719;padding:9px 13px;display:flex;flex-direction:column}.card small,.next small{font-size:8px;letter-spacing:.16em;color:#a06d4d;font-weight:900}.card strong{font-size:23px;line-height:1.05;font-variant-numeric:tabular-nums}.card.best strong{color:#dd7041}.next{align-items:center;padding:6px}.next span{font-size:27px;line-height:32px}.board{position:relative;border:6px solid #6f4430;border-top-width:9px;border-radius:17px 17px 25px 25px;overflow:hidden;background:#fffaf0;box-shadow:0 18px 45px #5a31193b,inset 0 0 0 3px #d99965}.board:after{content:"";position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 -18px 30px #80432414}canvas{display:block;width:100%;height:auto;touch-action:none;cursor:crosshair}.overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:#fff7dede;backdrop-filter:blur(4px);padding:30px}.hero{font-size:72px;filter:drop-shadow(0 10px 10px #5f30172e);animation:float 2.4s ease-in-out infinite}.overlay[hidden]{display:none}.overlay h2{font-size:25px;margin:12px 0 6px;letter-spacing:-.05em}.overlay p{font-family:system-ui,sans-serif;font-size:13px;line-height:1.6;color:#765945;margin:0 0 20px}.play{border:0;border-radius:999px;background:#ef7f43;color:white;font-weight:900;font-size:15px;padding:13px 25px;box-shadow:0 7px 0 #bd5930,0 12px 24px #96462038}.play:active{transform:translateY(5px);box-shadow:0 2px 0 #bd5930}.hint{text-align:center;font-family:system-ui,sans-serif;font-size:10px;color:#795337;margin:12px 0 8px}.hint b{color:#d66539}.line{display:flex;justify-content:center;align-items:center;overflow:hidden;white-space:nowrap;background:#fff8d994;border-radius:999px;padding:7px 9px;font-size:15px}.line i{font-style:normal;font-size:11px;color:#b98563;margin:0 2px}@keyframes float{50%{transform:translateY(-8px) rotate(3deg)}}@media(max-height:760px){.shell{padding-top:8px}.board{max-width:330px;margin:auto}.scores{margin-bottom:6px}.hint{margin:7px 0 5px}header{margin-bottom:8px}h1{font-size:26px}.card,.next{height:51px}.card strong{font-size:20px}}@media(min-width:700px){.shell{padding:28px}.game{width:410px}}
</style>
</head>
<body><main class="shell"><div class="glow a"></div><div class="glow b"></div><section class="game"><header><div><p class="eyebrow">BUBBLE LAB · MINI GAME</p><h1>FRUIT <span>MERGE</span></h1></div><button class="sound" id="sound" aria-label="소리 켜기 또는 끄기">♪</button></header><div class="scores"><div class="card"><small>SCORE</small><strong id="score">0</strong></div><div class="card best"><small>BEST</small><strong id="best">0</strong></div><div class="next"><small>NEXT</small><span id="next">🫐</span></div></div><div class="board"><canvas id="canvas" width="360" height="560" aria-label="과일 합치기 게임판"></canvas><div class="overlay" id="overlay"><div class="hero" id="hero">🍑</div><h2 id="message">과일을 합쳐보세요</h2><p id="sub">같은 과일끼리 만나면 더 큰 과일이 돼요.</p><button class="play" id="play">게임 시작</button></div></div><p class="hint"><b>이동</b> 손가락을 좌우로 움직이고&nbsp;&nbsp; <b>놓기</b> 화면을 톡 누르세요</p><div class="line" id="line"></div></section></main>
<script>
const F=[{n:"콩알",e:"🫐",c:"#7569ff",r:13,p:1},{n:"체리",e:"🍒",c:"#f04f66",r:18,p:3},{n:"딸기",e:"🍓",c:"#ff6b62",r:24,p:6},{n:"귤",e:"🍊",c:"#ff9f43",r:30,p:10},{n:"사과",e:"🍎",c:"#ef5350",r:38,p:15},{n:"배",e:"🍐",c:"#b7d953",r:46,p:21},{n:"복숭아",e:"🍑",c:"#ff9ca8",r:55,p:28},{n:"파인애플",e:"🍍",c:"#f5c84b",r:64,p:36},{n:"멜론",e:"🍈",c:"#92ca62",r:74,p:45},{n:"수박",e:"🍉",c:"#54b86d",r:86,p:60}],W=360,H=560,DANGER=88,G=1180;
const $=s=>document.querySelector(s),canvas=$("#canvas"),ctx=canvas.getContext("2d");let balls=[],id=1,aim=W/2,current=rand(),upcoming=rand(),lastDrop=0,dangerSince=null,state="ready",score=0,sound=true,last=performance.now();
function rand(){return Math.floor(Math.random()*4)}function ui(){$("#score").textContent=score.toLocaleString();$("#best").textContent=(+localStorage.getItem("fruitmerge-best")||0).toLocaleString();$("#next").textContent=F[upcoming].e}function blip(p=520){if(!sound)return;try{const c=new AudioContext,o=c.createOscillator(),g=c.createGain();o.frequency.value=p;g.gain.setValueAtTime(.05,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.09);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+.1)}catch{}}
function reset(){balls=[];score=0;current=rand();upcoming=rand();dangerSince=null;state="playing";$("#overlay").hidden=true;ui()}function over(){state="over";const best=Math.max(+localStorage.getItem("fruitmerge-best")||0,score);localStorage.setItem("fruitmerge-best",best);ui();$("#hero").textContent="🍉";$("#message").textContent="가득 찼어요!";$("#sub").textContent=`${score.toLocaleString()}점 · 다시 도전할까요?`;$("#play").textContent="다시 하기";$("#overlay").hidden=false;blip(120)}
function drop(){if(state!=="playing"){reset();return}const now=performance.now();if(now-lastDrop<420)return;const l=current,r=F[l].r;balls.push({id:id++,l,x:Math.max(r+3,Math.min(W-r-3,aim)),y:31,vx:0,vy:0,born:now});current=upcoming;upcoming=rand();lastDrop=now;ui();blip(300)}
function fruit(x,y,r,e,c){ctx.save();ctx.shadowColor="#5e361e29";ctx.shadowBlur=10;ctx.shadowOffsetY=5;ctx.fillStyle=c;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowColor="transparent";ctx.strokeStyle="#ffffffc7";ctx.lineWidth=Math.max(2,r*.07);ctx.stroke();ctx.font=`${Math.max(18,r*1.12)}px Apple Color Emoji,Segoe UI Emoji`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(e,x,y+1);ctx.restore()}
function tick(now){const elapsed=Math.min(.12,(now-last)/1000),steps=Math.max(1,Math.ceil(elapsed/.018)),dt=elapsed/steps;last=now;if(state==="playing")for(let step=0;step<steps;step++)physics(dt,now);draw();requestAnimationFrame(tick)}
function physics(dt,now){if(state!=="playing")return;for(const b of balls){b.vy+=G*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;const r=F[b.l].r;if(b.x-r<0){b.x=r;b.vx=Math.abs(b.vx)*.38}if(b.x+r>W){b.x=W-r;b.vx=-Math.abs(b.vx)*.38}if(b.y+r>H){b.y=H-r;b.vy=-Math.abs(b.vy)*.2;b.vx*=.96}}const merged=new Set;for(let pass=0;pass<3;pass++)for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){const a=balls[i],b=balls[j];if(merged.has(a.id)||merged.has(b.id))continue;const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||.001,min=F[a.l].r+F[b.l].r;if(d<min){if(a.l===b.l&&a.l<F.length-1&&now-a.born>120&&now-b.born>120){merged.add(a.id);merged.add(b.id);const l=a.l+1;balls.push({id:id++,l,x:(a.x+b.x)/2,y:(a.y+b.y)/2,vx:(a.vx+b.vx)/2,vy:-115,born:now});score+=F[l].p;ui();blip(420+l*55)}else{const nx=dx/d,ny=dy/d,o=min-d;a.x-=nx*o*.5;a.y-=ny*o*.5;b.x+=nx*o*.5;b.y+=ny*o*.5;const rv=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;if(rv<0){const imp=-rv*.56;a.vx-=imp*nx;a.vy-=imp*ny;b.vx+=imp*nx;b.vy+=imp*ny}}}}if(merged.size)balls=balls.filter(b=>!merged.has(b.id));const danger=balls.some(b=>now-b.born>1000&&b.y-F[b.l].r<DANGER);if(danger){dangerSince??=now;if(now-dangerSince>3000)over()}else dangerSince=null}
function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle="#fffaf0";ctx.fillRect(0,0,W,H);ctx.strokeStyle="#f3a46f";ctx.lineWidth=3;ctx.setLineDash([8,8]);ctx.beginPath();ctx.moveTo(0,DANGER);ctx.lineTo(W,DANGER);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle="#d9755b";ctx.font="700 11px system-ui";ctx.fillText("DANGER",10,DANGER-8);if(state!=="over"){const f=F[current];ctx.globalAlpha=.28;ctx.strokeStyle=f.c;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(aim,12);ctx.lineTo(aim,H);ctx.stroke();ctx.globalAlpha=1;fruit(aim,28,f.r,f.e,f.c)}for(const b of balls){const f=F[b.l];fruit(b.x,b.y,f.r,f.e,f.c)}}
function point(x){const r=canvas.getBoundingClientRect();aim=(x-r.left)*W/r.width}canvas.addEventListener("pointermove",e=>point(e.clientX));canvas.addEventListener("pointerdown",e=>{point(e.clientX);drop()});$("#play").onclick=reset;$("#sound").onclick=()=>{sound=!sound;$("#sound").textContent=sound?"♪":"×"};$("#line").innerHTML=F.map((f,i)=>`<span title="${f.n}">${f.e}${i<F.length-1?"<i>›</i>":""}</span>`).join("");ui();requestAnimationFrame(tick);window.blShareText=()=>`Fruit Merge 내 최고 기록은 ${+localStorage.getItem("fruitmerge-best")||score}점! 도전해보세요 🍉`;
</script>
<script defer src="/_shared/share.js"></script>
</body></html>
