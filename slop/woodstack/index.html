<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>우드 스택 — 통나무 쌓기</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none;
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
    color: #f4ead6; background: #1b2a4a; touch-action: manipulation;
  }
  #stage { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }

  /* 상단 HUD: Score · Combo · Best */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: max(.9rem, env(safe-area-inset-top)) 1.1rem 0; pointer-events: none;
  }
  .chip {
    padding: .4rem .8rem; border-radius: .8rem; font-size: .82rem; line-height: 1.35;
    background: rgba(20,26,36,.34); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.35);
  }
  .chip b { font-size: 1.5rem; font-weight: 800; letter-spacing: .01em; display: block; }
  .chip small { opacity: .8; font-weight: 400; }
  #hiChip { text-align: right; }
  #comboChip {
    align-self: center; margin-top: .1rem; font-weight: 800; font-size: .95rem;
    color: #3a2410; background: linear-gradient(#ffe08a, #f4bd5c);
    box-shadow: 0 2px 8px rgba(180,120,20,.4); transition: opacity .15s, transform .15s;
    opacity: 0; transform: scale(.8);
  }
  #comboChip.on { opacity: 1; transform: scale(1); }
  #comboChip.run {
    color: #fff; background: linear-gradient(#ff9d3a, #ff6a3a);
    box-shadow: 0 0 14px rgba(255,150,60,.8);
    animation: runPulse .7s ease-in-out infinite;
  }
  @keyframes runPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* 판정 텍스트(중앙 상단) */
  #judge {
    position: fixed; top: 24%; left: 50%; transform: translate(-50%,-50%) scale(.5);
    z-index: 9; font-weight: 900; font-size: 2.1rem; opacity: 0; pointer-events: none;
    color: #ffe08a; text-shadow: 0 2px 10px rgba(140,80,0,.55), 0 0 3px rgba(0,0,0,.4);
    white-space: nowrap;
  }
  #judge.show { animation: judgePop .6s cubic-bezier(.2,1.5,.4,1); }
  @keyframes judgePop {
    0% { opacity: 0; transform: translate(-50%,-40%) scale(.5); }
    30% { opacity: 1; transform: translate(-50%,-54%) scale(1.12); }
    100% { opacity: 0; transform: translate(-50%,-66%) scale(1); }
  }

  #mute {
    position: fixed; right: 1rem; bottom: max(1rem, env(safe-area-inset-bottom)); z-index: 12;
    width: 2.6rem; height: 2.6rem; border-radius: 50%; color: #fff; cursor: pointer;
    border: 1.5px solid rgba(255,255,255,.35);
    background: rgba(20,26,36,.4); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
    font-size: 1.2rem; line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  #mute:active { transform: scale(.92); }

  #overlay {
    position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: .9rem; text-align: center; padding: 1.4rem;
    background: rgba(12,18,30,.55); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    transition: opacity .25s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #overlay .big { font-size: 4rem; line-height: 1; filter: drop-shadow(0 6px 12px rgba(0,0,0,.4)); }
  #overlay h1 { font-size: clamp(1.5rem, 6.5vmin, 2.4rem); margin: 0; color: #fff; }
  #overlay p { margin: 0; opacity: .92; line-height: 1.7; font-size: clamp(.85rem, 3.5vmin, 1rem); color: #f0e7d6; }
  #scores { display: flex; gap: 1.6rem; margin: .2rem 0 .1rem; }
  #scores div { display: flex; flex-direction: column; gap: .1rem; }
  #scores b { font-size: 2.3rem; font-weight: 900; color: #ffe08a; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
  #scores span { font-size: .78rem; opacity: .75; }
  #btn {
    margin-top: .4rem; font: 800 1.05rem ui-monospace, monospace; padding: .85rem 2.2rem;
    border-radius: 2rem; border: none; cursor: pointer; color: #3a2410;
    background: linear-gradient(#ffd98a, #f0b45c);
    box-shadow: 0 5px 0 #b9823a, 0 8px 16px rgba(0,0,0,.3);
  }
  #btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #b9823a, 0 4px 10px rgba(0,0,0,.3); }
  .key { display: inline-block; padding: .05rem .5rem; border: 1.5px solid currentColor;
         border-radius: .4rem; font-size: .85em; opacity: .85; }
  .hint { position: fixed; left: 0; right: 0; bottom: 18%; z-index: 8; text-align: center;
          font-size: 1rem; opacity: .9; color: #fff; text-shadow: 0 2px 6px rgba(0,0,0,.4);
          pointer-events: none; animation: bob 1.6s ease-in-out infinite; }
  .hint.hidden { display: none; }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
</style>
</head>
<body>
<div id="stage"><canvas id="cv"></canvas></div>

<div id="hud">
  <div class="chip" id="scoreChip"><small>SCORE</small><b id="score">0</b></div>
  <div class="chip" id="comboChip">🔥 PERFECT ×1</div>
  <div class="chip" id="hiChip"><small>BEST</small><b id="hi">0</b></div>
</div>
<div id="judge"></div>
<div class="hint hidden" id="hint">👆 탭해서 통나무 쌓기</div>
<button id="mute" aria-label="소리 켜기/끄기">🔊</button>

<div id="overlay">
  <div class="big">🪵</div>
  <h1>우드 스택</h1>
  <p>
    좌우로 움직이는 통나무를 <b>탭</b>해서 쌓아요.<br>
    삐져나온 부분은 <b>잘려 떨어지고</b> 통나무가 가늘어져요.<br>
    딱 맞추면 <b>PERFECT!</b> — 콤보가 쌓이고, 5콤보마다 두께가 회복돼요.<br>
    <b>10콤보</b>부터는 🔥 <b>PERFECT RUN</b>!<br>
    겹치는 곳이 없으면 <b>게임 오버</b>.<br>
    <span class="key">스페이스</span> 또는 화면 <b>탭</b>!
  </p>
  <button id="btn">시작</button>
</div>

<script>
// ── 캔버스 ─────────────────────────────────────────────
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = cv.clientWidth; H = cv.clientHeight;
  cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // 회전/리사이즈 시 현재 통나무를 화면 안으로 보정하고 새 너비 기준 속도로 재계산
  if (moving) {
    moving.x = Math.max(marginX() + moving.w / 2, Math.min(W - marginX() - moving.w / 2, moving.x));
    moving.speed = logSpeed(score, moving.w);
  }
}
window.addEventListener("resize", resize);
// 초기 resize() 호출은 게임 상태 변수(moving/score) 선언 이후로 미룬다(TDZ 회피).

// ── 상수 ───────────────────────────────────────────────
const LOG_H = 34;          // 통나무 높이(px)
const PERFECT = 3;         // Perfect 판정 오차(±px)
const GROUND = 0.16;       // 화면 하단 여백 비율(땅)
const GRAV = 1600;         // 낙하 중력(px/s^2)
const ISO_X = 6, ISO_Y = 7; // 약한 pseudo-isometric 윗면(가독성 유지 — x판정 불변)
function baseW() { return Math.min(W * 0.5, 250); }
function marginX() { return W * 0.12; }
// 이동 속도를 px/s가 아니라 "편도 이동 시간(초)" 기준으로 계산한다. 그래야
// 화면 너비가 달라도 통나무가 끝에서 끝까지 가는 데 걸리는 시간이 비슷해져
// 기기별 체감 난이도가 맞춰진다. 편도 시간은 배경 단계와 연동해 부드럽게 감소.
function oneWayTime(score) {
  if (score < 20) return lerp(1.45, 1.25, score / 20);          // 🌄 아침
  if (score < 50) return lerp(1.20, 1.00, (score - 20) / 30);   // ☀️ 낮
  if (score < 100) return lerp(1.00, 0.82, (score - 50) / 50);  // 🌇 노을
  return Math.max(0.65, 0.78 - (score - 100) * 0.002);          // 🌌 밤 (최저 0.65초)
}
// 통나무 중심의 이동 가능 거리(px) ÷ 편도 시간 = px/s. 좁을수록 이동 범위가 넓다.
function logSpeed(score, movingWidth) {
  const travel = Math.max(1, W - marginX() * 2 - movingWidth);
  return travel / oneWayTime(score);
}
// 중앙 가이드라인 알파 — 점수(=배경 단계)에 따라 점진적으로 사라지고 밤엔 0.
// Perfect 콤보/Perfect Run과 무관하게 오직 점수로만 결정된다.
function guideAlpha(score) {
  if (score < 20) return lerp(0.28, 0.18, score / 20);
  if (score < 50) return lerp(0.16, 0.08, (score - 20) / 30);
  if (score < 100) return lerp(0.06, 0.015, (score - 50) / 50);
  return 0;                                                     // 밤: 렌더 생략
}

// ── 오디오(신스 — 외부 음원 없음) ──────────────────────
let actx, master, muted = false, ambient = null, runLayer = null;
function initAudio() {
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.9; master.connect(actx.destination);
}
function ping(freq, dur, gain, type = "sine", slideTo) {
  if (!actx || muted) return;
  const t = actx.currentTime, o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(master); o.start(t); o.stop(t + dur + 0.02);
}
function noiseBurst(dur, gain, freq, q = 1, slideTo) {
  if (!actx || muted) return;
  const t = actx.currentTime, n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const s = actx.createBufferSource(); s.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = "bandpass";
  bp.frequency.setValueAtTime(freq, t); bp.Q.value = q;
  if (slideTo) bp.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  s.connect(bp).connect(g).connect(master); s.start(t); s.stop(t + dur + 0.02);
}
// v2.1: 판정당 대표음 1개 — 배치 자체엔 별도 Tap음을 두지 않고 sCut/sPerfect로 통일
const sCut = () => { noiseBurst(0.13, 0.3, 1500, 1.4, 480); ping(300, 0.09, 0.12, "sine", 170); }; // 나무 절단
function sPerfect(combo) {                                                      // 맑은 효과음(콤보만큼 상승)
  noiseBurst(0.04, 0.22, 3400, 2.2);
  const base = 660 * Math.pow(1.055, Math.min(combo, 14));
  ping(base, 0.13, 0.17, "triangle");
  ping(base * 1.5, 0.17, 0.1, "sine");
  if (combo % 5 === 0) ping(base * 2, 0.24, 0.09, "sine");
}
function sOver() {                                                              // 통나무 붕괴
  noiseBurst(0.55, 0.34, 900, 0.7, 150);
  ping(220, 0.55, 0.15, "sawtooth", 60);
  setTimeout(() => noiseBurst(0.35, 0.2, 500, 0.8, 120), 90);
}
function startAmbient() {
  if (!actx || muted || ambient) return;
  const g = actx.createGain(); g.gain.value = 0.045; g.connect(master);
  const o1 = actx.createOscillator(), o2 = actx.createOscillator();
  o1.type = "sine"; o1.frequency.value = 110;
  o2.type = "sine"; o2.frequency.value = 164.8;
  const lfo = actx.createOscillator(), lg = actx.createGain();
  lfo.frequency.value = 0.08; lg.gain.value = 0.02;
  lfo.connect(lg).connect(g.gain);
  o1.connect(g); o2.connect(g);
  o1.start(); o2.start(); lfo.start();
  const birdTimer = setInterval(() => {
    if (muted || document.hidden) return;
    if (Math.random() < 0.5) {
      const f = 1800 + Math.random() * 900;
      ping(f, 0.09, 0.03, "sine", f * 1.4);
      setTimeout(() => ping(f * 1.2, 0.07, 0.025, "sine", f), 110);
    }
  }, 4200);
  ambient = { o1, o2, lfo, birdTimer };
}
function stopAmbient() {
  if (!ambient) return;
  try { ambient.o1.stop(); ambient.o2.stop(); ambient.lfo.stop(); } catch {}
  clearInterval(ambient.birdTimer); ambient = null;
}
// Perfect Run 동안 얹히는 반짝이는 상위 레이어
function startRunLayer() {
  if (!actx || muted || runLayer) return;
  const g = actx.createGain(); g.gain.value = 0;
  g.gain.linearRampToValueAtTime(0.05, actx.currentTime + 0.4); g.connect(master);
  const o = actx.createOscillator(); o.type = "triangle"; o.frequency.value = 880;
  const o2 = actx.createOscillator(); o2.type = "sine"; o2.frequency.value = 1320;
  const lfo = actx.createOscillator(); lfo.frequency.value = 5;
  const lg = actx.createGain(); lg.gain.value = 7;
  lfo.connect(lg).connect(o.frequency);
  o.connect(g); o2.connect(g); o.start(); o2.start(); lfo.start();
  runLayer = { g, o, o2, lfo };
}
function stopRunLayer() {
  if (!runLayer) return;
  const { g, o, o2, lfo } = runLayer;
  try { g.gain.setTargetAtTime(0, actx.currentTime, 0.12); } catch {}
  setTimeout(() => { try { o.stop(); o2.stop(); lfo.stop(); } catch {} }, 400);
  runLayer = null;
}

// ── 배경(시간대: 0~20 아침 · 20~50 낮 · 50~100 노을 · 100+ 밤) ──────────
const SKY = [
  { t: 0,   top: [253,225,192], bot: [247,182,132], sun: [255,240,200], sunY: 0.80 }, // 🌄 아침
  { t: 20,  top: [150,205,240], bot: [226,240,250], sun: [255,247,210], sunY: 0.28 }, // ☀️ 낮
  { t: 50,  top: [255,168,110], bot: [232,108,94],  sun: [255,214,150], sunY: 0.64 }, // 🌇 노을
  { t: 100, top: [22,32,62],    bot: [40,52,90],    sun: [220,228,245], sunY: 0.22 }, // 🌌 밤
];
const lerp = (a, b, u) => a + (b - a) * u;
const lerpRGB = (a, b, u) => [lerp(a[0],b[0],u), lerp(a[1],b[1],u), lerp(a[2],b[2],u)];
const rgb = (c) => `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
function skyAt(score) {
  if (score <= SKY[0].t) return sky(SKY[0], SKY[0], 0, score);
  if (score >= SKY[SKY.length - 1].t) return sky(SKY[SKY.length - 1], SKY[SKY.length - 1], 0, score);
  for (let i = 0; i < SKY.length - 1; i++) {
    if (score >= SKY[i].t && score < SKY[i + 1].t) {
      return sky(SKY[i], SKY[i + 1], (score - SKY[i].t) / (SKY[i + 1].t - SKY[i].t), score);
    }
  }
  return sky(SKY[0], SKY[0], 0, score);
}
function sky(a, b, u, score) {
  return {
    top: lerpRGB(a.top, b.top, u), bot: lerpRGB(a.bot, b.bot, u),
    sun: lerpRGB(a.sun, b.sun, u), sunY: lerp(a.sunY, b.sunY, u),
    night: score >= 82,
  };
}
let curSky = skyAt(0);
const stars = Array.from({ length: 46 }, () => ({ x: Math.random(), y: Math.random() * 0.55, r: Math.random() * 1.2 + 0.3, tw: Math.random() * 6.28 }));

// ── 게임 상태 ──────────────────────────────────────────
let state = "idle";                 // idle | play | over
let stack = [];                     // 쌓인 통나무 [{x,w}] — 0이 맨 아래
let moving = null;                  // 움직이는 통나무 {x,w,dir}
let falling = [];                   // 낙하 조각
let dust = [];                      // 톱밥·조각 파티클
let score = 0, hi = 0, combo = 0, bestCombo = 0;
let perfectRun = false;
let camY = 0, camTarget = 0, camLift = 0;
let shake = 0, zoom = 0, hitStop = 0;
let flash = 0, flashColor = "255,255,255";
let lastT = 0;

try { hi = Math.max(0, parseInt(localStorage.getItem("woodstack-hi") || "0", 10) || 0); } catch {}
document.getElementById("hi").textContent = hi;

const $ = (id) => document.getElementById(id);
const overlay = $("overlay"), btn = $("btn"), hint = $("hint"), judgeEl = $("judge"), comboChip = $("comboChip");

// 월드 y(통나무 바닥) → 화면 y(바닥). 위로 쌓일수록 월드 y 증가.
function screenBottom(worldY) { return H - H * GROUND - (worldY - camY) + camLift; }

function reset() {
  stack = []; falling = []; dust = [];
  score = 0; combo = 0; bestCombo = 0; perfectRun = false;
  camY = 0; camTarget = 0; camLift = 0; shake = 0; zoom = 0; hitStop = 0; flash = 0;
  stopRunLayer();
  stack.push({ x: W / 2, w: baseW() });
  spawnMoving(baseW());
  curSky = skyAt(0);
  $("score").textContent = "0";
  updateCombo();
}
function spawnMoving(w) {
  const level = stack.length;
  const fromLeft = level % 2 === 0;
  // 속도는 생성 시점의 점수·폭으로 고정한다 — 배치 중 갑자기 가감속하지 않도록.
  moving = {
    w, dir: fromLeft ? 1 : -1,
    x: fromLeft ? marginX() + w / 2 : W - marginX() - w / 2,
    speed: logSpeed(score, w),
  };
}
function updateCombo() {
  if (combo >= 2) {
    comboChip.textContent = `🔥 PERFECT ×${combo}`;
    comboChip.classList.add("on");
    comboChip.classList.toggle("run", perfectRun);
  } else {
    comboChip.classList.remove("on", "run");
  }
}

function place() {
  if (state !== "play" || !moving) return;
  const top = stack[stack.length - 1];
  const px = top.x, pw = top.w;
  const nx = moving.x, w = moving.w;
  const left = Math.max(nx - w / 2, px - pw / 2);
  const right = Math.min(nx + w / 2, px + pw / 2);
  const overlap = right - left;
  const level = stack.length;
  const sb = screenBottom(level * LOG_H);

  if (overlap <= 0) {                            // Miss → 게임 오버 + 타워 붕괴
    falling.push(makeFall(nx, w, sb, moving.dir, false));
    sOver();
    gameOver();
    return;
  }

  if (Math.abs(nx - px) <= PERFECT) {            // ── PERFECT ──
    combo++;
    bestCombo = Math.max(bestCombo, combo);
    let newW = pw;
    if (combo % 5 === 0) {                        // Perfect x5 → 폭 10% 회복
      const deficit = baseW() - pw;
      if (deficit > 0.5) newW = Math.min(baseW(), pw + deficit * 0.10);
    }
    stack.push({ x: px, w: newW });

    const x10 = combo % 10 === 0, x5 = combo % 5 === 0;
    zoom = x10 ? 0.05 : x5 ? 0.035 : 0.022;       // Camera Punch(≈2%)
    hitStop = x10 ? 0.09 : 0.045;                 // Hit Stop 40~90ms
    flash = x10 ? 0.8 : x5 ? 0.45 : 0.3;          // Bright Flash
    flashColor = combo >= 10 ? "255,214,110" : combo >= 3 ? "255,236,180" : "255,255,255";
    shake = Math.min(shake + 1.5, 3.5);

    if (combo === 10 && !perfectRun) {            // Perfect Run 진입
      perfectRun = true; startRunLayer();
      showJudge("🔥 PERFECT RUN!", true);
    } else {
      showJudge(combo > 1 ? `PERFECT ×${combo}` : "PERFECT!", combo >= 10);
    }
    spawnDust(px, sb, newW, combo >= 3);          // 콤보 3+부터 금빛 톱밥
    if (combo >= 3) spawnSpark(px, sb, newW, combo >= 10);
    sPerfect(combo);                              // 판정당 대표음 1개 (Tap 중첩 제거)
    vibrate(x10 ? [10, 25, 10, 25, 15] : x5 ? [8, 18, 8] : 14);
  } else {                                        // ── GOOD(절단) ──
    if (perfectRun) { perfectRun = false; stopRunLayer(); }
    combo = 0;
    const newC = (left + right) / 2, newW = overlap;
    stack.push({ x: newC, w: newW });
    if (nx > px) falling.push(makeFall((right + nx + w / 2) / 2, nx + w / 2 - right, sb, 1, false));
    else falling.push(makeFall((nx - w / 2 + left) / 2, left - (nx - w / 2), sb, -1, false));
    spawnDust(newC + (nx > px ? newW / 2 : -newW / 2), sb, LOG_H, false);
    shake = Math.min(shake + 1.4, 3);
    sCut(); vibrate(9);                           // 절단은 sCut() 하나로 (Tap 중첩 제거)
  }

  score++;
  $("score").textContent = score;
  updateCombo();
  camTarget = stack.length * LOG_H;
  spawnMoving(stack[stack.length - 1].w);   // 다음 통나무는 방금 놓인 통나무와 같은 길이
}

function makeFall(cx, w, sb, dir, collapse) {
  return {
    x: cx, y: sb - LOG_H / 2, w, h: LOG_H, level: stack.length,
    vx: dir * (collapse ? 40 + Math.random() * 180 : 60 + Math.random() * 70),
    vy: collapse ? -220 - Math.random() * 220 : -70 - Math.random() * 50,
    rot: 0, vr: dir * (2 + Math.random() * 3.5) * (collapse ? 1.4 : 1),
    a: 1, bounces: 0,
  };
}
function spawnDust(cx, sb, w, gold) {
  const col = gold ? "255,216,115" : "232,199,154";
  for (let i = 0; i < (gold ? 20 : 15); i++) {
    const ang = -Math.PI / 2 + (Math.random() - 0.5) * 2.2;
    const sp = 60 + Math.random() * 170;
    dust.push({
      x: cx + (Math.random() - 0.5) * w, y: sb - LOG_H,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
      r: 1 + Math.random() * 2.6, a: 1, life: 0.5 + Math.random() * 0.45,
      col, spark: false, g: 380,
    });
  }
}
function spawnSpark(cx, sb, w, big) {
  for (let i = 0; i < (big ? 18 : 9); i++) {
    const ang = Math.random() * 6.28, sp = 120 + Math.random() * (big ? 320 : 180);
    dust.push({
      x: cx + (Math.random() - 0.5) * w * 0.6, y: sb - LOG_H / 2,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 40,
      r: 1 + Math.random() * 2, a: 1, life: 0.4 + Math.random() * 0.4,
      col: big ? "255,235,150" : "255,224,138", spark: true, g: 120,
    });
  }
}
function showJudge(text, gold) {
  judgeEl.textContent = text;
  judgeEl.style.color = gold ? "#ffcf5e" : "#ffe08a";
  judgeEl.classList.remove("show"); void judgeEl.offsetWidth; judgeEl.classList.add("show");
}
function vibrate(p) { try { navigator.vibrate?.(p); } catch {} }

function gameOver() {
  state = "over";
  shake = 7;
  vibrate([20, 40, 60]);
  if (perfectRun) { perfectRun = false; stopRunLayer(); }
  // 타워 붕괴 — 위쪽 통나무들이 파편으로 튄다
  const collapseN = Math.min(stack.length - 1, 11);
  for (let k = 0; k < collapseN; k++) {
    const idx = stack.length - 1 - k;
    const s = stack[idx];
    const sb = screenBottom(idx * LOG_H);
    falling.push(makeFall(s.x, s.w, sb, Math.random() < 0.5 ? -1 : 1, true));
  }
  stack.splice(Math.max(1, stack.length - collapseN));
  moving = null;
  combo = 0; updateCombo();
  if (score > hi) { hi = score; try { localStorage.setItem("woodstack-hi", String(hi)); } catch {} }
  $("hi").textContent = hi;
  window.blWeeklyReport?.(score);
  setTimeout(() => {
    overlay.querySelector(".big").textContent = "🪵";
    overlay.querySelector("h1").textContent = "무너졌어요!";
    overlay.querySelector("p").innerHTML =
      `<div id="scores"><div><b>${score}</b><span>SCORE</span></div>` +
      `<div><b>${bestCombo}</b><span>BEST COMBO</span></div>` +
      `<div><b>${hi}</b><span>BEST</span></div></div>` +
      (score >= hi && score > 0 ? "🎉 최고 기록 경신!" : "한 판만 더 쌓아볼까요?");
    btn.textContent = "다시";
    overlay.classList.remove("hidden");
    hint.classList.add("hidden");
  }, 750);
}

// ── 렌더링 ─────────────────────────────────────────────
function woodColor(level) {
  const h = 30 + (level % 6) * 3;
  return {
    hi: `hsl(${h} 54% 71%)`, mid: `hsl(${h} 49% 58%)`, lo: `hsl(${h} 46% 42%)`,
    dark: `hsl(${h} 44% 33%)`, cut: `hsl(${h} 60% 82%)`, cutMid: `hsl(${h} 50% 64%)`,
    top: `hsl(${h} 56% 76%)`,
  };
}
function roundRectPath(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawLog(cx, by, w, level, gold) {
  const r = LOG_H / 2, x = cx - w / 2, y = by - LOG_H;
  const c = woodColor(level);
  // 약한 iso 윗면(가독성 위해 아주 얕게) — 통나무 위를 살짝 내려다본 느낌
  if (w > LOG_H) {
    ctx.beginPath();
    ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
    ctx.lineTo(x + w - r + ISO_X, y - ISO_Y); ctx.lineTo(x + r + ISO_X, y - ISO_Y);
    ctx.closePath(); ctx.fillStyle = c.top; ctx.fill();
  }
  // 원통 몸통(세로 그라데이션 = 둥근 느낌)
  ctx.save();
  ctx.shadowColor = "rgba(0,0,0,.22)"; ctx.shadowBlur = 8; ctx.shadowOffsetY = 4;
  const grad = ctx.createLinearGradient(0, y, 0, y + LOG_H);
  grad.addColorStop(0, c.hi); grad.addColorStop(0.45, c.mid); grad.addColorStop(1, c.lo);
  roundRectPath(x, y, w, LOG_H, r); ctx.fillStyle = grad; ctx.fill();
  ctx.restore();
  // 나무결
  ctx.save();
  roundRectPath(x, y, w, LOG_H, r); ctx.clip();
  ctx.strokeStyle = c.dark; ctx.globalAlpha = 0.4; ctx.lineWidth = 1.3;
  for (let i = 1; i <= 3; i++) {
    const gy = y + (LOG_H * i) / 4;
    ctx.beginPath();
    ctx.moveTo(x + 3, gy);
    ctx.bezierCurveTo(x + w * 0.33, gy - 1.6, x + w * 0.66, gy + 1.6, x + w - 3, gy);
    ctx.stroke();
  }
  ctx.restore();
  // 절단면(밝은 나이테) — 양 끝
  const drawEnd = (ex) => {
    ctx.save(); ctx.translate(ex, y + LOG_H / 2); ctx.scale(0.5, 1);
    for (let k = 0; k < 3; k++) {
      ctx.beginPath(); ctx.arc(0, 0, r * (0.92 - k * 0.28), 0, 6.28);
      ctx.fillStyle = k % 2 ? c.cut : c.cutMid; ctx.fill();
    }
    ctx.restore();
  };
  drawEnd(x + r * 0.5); drawEnd(x + w - r * 0.5);
  // 콤보 금빛 테두리
  if (gold) {
    ctx.save();
    roundRectPath(x + 1, y + 1, w - 2, LOG_H - 2, r);
    ctx.strokeStyle = "rgba(255,214,90,.95)"; ctx.lineWidth = 2.4;
    ctx.shadowColor = "rgba(255,190,60,.9)"; ctx.shadowBlur = 10; ctx.stroke();
    ctx.restore();
  }
}

function drawBackground(sky) {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, rgb(sky.top)); g.addColorStop(1, rgb(sky.bot));
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  if (sky.night) {
    const tSec = lastT / 1000;
    for (const s of stars) {
      ctx.globalAlpha = 0.45 + 0.5 * Math.sin(tSec * 2 + s.tw);
      ctx.fillStyle = "#fff";
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, 6.28); ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
  const sunX = W * 0.5, sunY = H * sky.sunY, sr = Math.min(W, H) * 0.09;
  ctx.save();
  ctx.shadowColor = rgb(sky.sun); ctx.shadowBlur = 40; ctx.fillStyle = rgb(sky.sun);
  ctx.beginPath(); ctx.arc(sunX, sunY, sr, 0, 6.28); ctx.fill();
  ctx.restore();
  const groundY = H - H * GROUND;
  const gg = ctx.createLinearGradient(0, groundY, 0, H);
  gg.addColorStop(0, sky.night ? "#1c2a1c" : "#4f7a3a");
  gg.addColorStop(1, sky.night ? "#0f1a10" : "#3a5c2b");
  ctx.fillStyle = gg; ctx.fillRect(0, groundY, W, H * GROUND);
}

function frame(ts) {
  const dt = Math.min(0.05, (ts - lastT) / 1000 || 0);
  lastT = ts;

  curSky = skyAt(state === "idle" ? 0 : score);

  camY += (camTarget - camY) * Math.min(1, dt * 6);
  const liftTarget = perfectRun ? 8 : 0;
  camLift += (liftTarget - camLift) * Math.min(1, dt * 4);
  if (zoom > 0) zoom = Math.max(0, zoom - dt * 0.5);
  if (shake > 0) shake = Math.max(0, shake - dt * 12);
  if (flash > 0) flash = Math.max(0, flash - dt * 6);
  if (hitStop > 0) hitStop -= dt;

  if (state === "play" && moving && hitStop <= 0) {
    moving.x += moving.speed * dt * moving.dir;
    const lo = marginX() + moving.w / 2, hiB = W - marginX() - moving.w / 2;
    if (moving.x <= lo) { moving.x = lo; moving.dir = 1; }
    if (moving.x >= hiB) { moving.x = hiB; moving.dir = -1; }
  }

  const groundY = H - H * GROUND;
  for (const f of falling) {
    f.vy += GRAV * dt; f.x += f.vx * dt; f.y += f.vy * dt; f.rot += f.vr * dt;
    // 바닥 충돌 → Bounce
    if (f.y + f.h / 2 >= groundY && f.vy > 0) {
      if (f.bounces < 2) {
        f.y = groundY - f.h / 2; f.vy = -f.vy * 0.42; f.vx *= 0.6; f.vr *= 0.5; f.bounces++;
      } else { f.a -= dt * 2.2; f.vx *= 0.9; }  // 잦아들며 사라짐
    }
    if (f.y > H + 160) f.a = 0;
  }
  falling = falling.filter((f) => f.a > 0);
  for (const p of dust) {
    p.vy += p.g * dt; p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt; p.a = Math.max(0, p.life * 2);
  }
  dust = dust.filter((p) => p.life > 0);

  // ── 그리기 ──
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  drawBackground(curSky);

  ctx.save();
  const sx = shake ? (Math.random() - 0.5) * shake * 2 : 0;
  const sy = shake ? (Math.random() - 0.5) * shake * 2 : 0;
  if (zoom > 0) { ctx.translate(W / 2, H / 2); ctx.scale(1 + zoom, 1 + zoom); ctx.translate(-W / 2, -H / 2); }
  ctx.translate(sx, sy);

  const goldFrom = perfectRun ? 0 : combo >= 3 ? stack.length - Math.min(stack.length, combo) : stack.length;
  for (let i = 0; i < stack.length; i++) {
    const s = stack[i], b = screenBottom(i * LOG_H);
    if (b < -LOG_H - ISO_Y || b - LOG_H > H) continue;
    drawLog(s.x, b, s.w, i, combo >= 3 && i >= goldFrom);
  }
  if (state === "play" && moving) {
    drawLog(moving.x, screenBottom(stack.length * LOG_H), moving.w, stack.length, combo >= 3);
    // 중앙 가이드라인 — 점수에 따라 점점 흐려지고 밤(100+)엔 렌더 생략.
    // 색(흰색)은 고정하고 알파만 변화한다.
    const ga = guideAlpha(score);
    if (ga > 0.001) {
      const top = stack[stack.length - 1];
      const gy = screenBottom(stack.length * LOG_H);
      ctx.strokeStyle = `rgba(255,255,255,${ga})`; ctx.setLineDash([4, 6]); ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(top.x, gy); ctx.lineTo(top.x, gy - LOG_H * 2.4); ctx.stroke();
      ctx.setLineDash([]);
    }
  }
  for (const f of falling) {
    ctx.save(); ctx.globalAlpha = f.a;
    ctx.translate(f.x, f.y); ctx.rotate(f.rot);
    drawLog(0, f.h / 2, f.w, f.level, false);
    ctx.restore();
  }
  for (const p of dust) {
    ctx.globalAlpha = p.a; ctx.fillStyle = `rgb(${p.col})`;
    if (p.spark) { ctx.shadowColor = `rgb(${p.col})`; ctx.shadowBlur = 6; }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 6.28); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // Bright Flash (화면 전체, 줌 밖)
  if (flash > 0) {
    ctx.fillStyle = `rgba(${flashColor},${(flash * 0.55).toFixed(3)})`;
    ctx.fillRect(0, 0, W, H);
  }
  // Perfect Run 금빛 비네트
  if (perfectRun) {
    const vg = ctx.createRadialGradient(W / 2, H / 2, Math.min(W, H) * 0.3, W / 2, H / 2, Math.max(W, H) * 0.72);
    vg.addColorStop(0, "rgba(255,200,80,0)"); vg.addColorStop(1, "rgba(255,180,40,.26)");
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  }

  requestAnimationFrame(frame);
}
resize();                 // 상태 변수 선언 이후 초기 캔버스 크기 확정
requestAnimationFrame(frame);

// ── 입력 ───────────────────────────────────────────────
function start() {
  initAudio(); if (actx.state === "suspended") actx.resume();
  startAmbient();
  reset();
  state = "play";
  overlay.classList.add("hidden");
  hint.classList.remove("hidden");
  setTimeout(() => hint.classList.add("hidden"), 2600);
}
function onTap() {
  if (state === "play") place();
  else if (!overlay.classList.contains("hidden")) start();
}
btn.addEventListener("click", (e) => { e.stopPropagation(); start(); });
document.getElementById("stage").addEventListener("pointerdown", onTap);
window.addEventListener("keydown", (e) => {
  if (e.code !== "Space" && e.code !== "Enter") return;
  e.preventDefault();
  if (e.repeat) return;
  onTap();
});
$("mute").addEventListener("pointerdown", (e) => {
  e.stopPropagation();
  muted = !muted;
  $("mute").textContent = muted ? "🔇" : "🔊";
  if (muted) { stopAmbient(); stopRunLayer(); }
  else { initAudio(); startAmbient(); if (perfectRun) startRunLayer(); }
});

// ── Bubblelab 연동 ─────────────────────────────────────
window.blWeekly = { game: "woodstack", dir: "max", fmt: (v) => `${v}층` };
window.blShareText = () => `🪵 우드 스택에서 ${hi}층까지 쌓았어요! 도전해보세요`;
</script>
