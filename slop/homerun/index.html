<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>야구 리듬 — 홈런 타이밍</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; overflow: hidden; user-select: none; -webkit-user-select: none;
    font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
    color: light-dark(#243040, #dce6f0);
    background: light-dark(#eaf1f7, #0c1219);
  }
  #field {
    position: relative; width: 100%; height: 100dvh; overflow: hidden; cursor: pointer;
    /* 등뒤 뷰: 하늘(위·먼 곳) → 잔디 → 흙(아래·타석) */
    background:
      linear-gradient(transparent 22.5%, light-dark(#3f6d44,#1c3a24) 23%, light-dark(#3f6d44,#1c3a24) 27%, transparent 27.5%), /* 외야 펜스 */
      radial-gradient(80% 45% at 46% 98%, light-dark(#d8c49a, #2c2519) 0%, transparent 55%),  /* 내야 흙 */
      linear-gradient(light-dark(#cfe0ef, #0d1a29) 0%, light-dark(#bcd3b4, #14251a) 42%,
                      light-dark(#a9c69f, #17301d) 58%, light-dark(#cbb388, #241d12) 100%);
  }
  /* HUD */
  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: space-between; align-items: center;
    padding: .9rem 1.1rem; pointer-events: none; font-size: .95rem;
  }
  #lv { font-weight: bold; letter-spacing: .02em; }
  #strikes { display: flex; gap: .35rem; font-size: 1.1rem; align-self: flex-start; }
  /* 전광판(외야 LED 스코어보드) */
  #board {
    position: absolute; top: 13%; left: 50%; transform: translate(-50%,-50%);
    z-index: 10; padding: .5rem 1.1rem; border-radius: .5rem; pointer-events: none;
    min-width: 50vmin; max-width: 84vw; text-align: center;
    background: linear-gradient(#141a24, #0a0e15);
    border: 3px solid #2c3644;
    box-shadow: 0 5px 12px rgba(0,0,0,.45), inset 0 0 0 2px #05070b,
                inset 0 0 14px rgba(0,0,0,.6);
  }
  #board::before {  /* LED 도트 질감 */
    content: ""; position: absolute; inset: 3px; border-radius: .3rem; opacity: .5;
    background-image: radial-gradient(rgba(255,255,255,.06) 30%, transparent 31%);
    background-size: 4px 4px;
  }
  #boardMsg {
    position: relative; font-family: ui-monospace, monospace; font-weight: 800;
    font-size: 3.5vmin; letter-spacing: .1em; line-height: 1.3;
    color: #7fd6a0; text-shadow: 0 0 5px rgba(120,220,150,.4);
    transition: color .1s;
  }
  #boardMsg.hr     { color: #ffb43a; text-shadow: 0 0 8px rgba(255,160,50,.55); }
  #boardMsg.hit    { color: #62c9ff; text-shadow: 0 0 8px rgba(90,190,255,.5); }
  #boardMsg.strike { color: #ff6b6b; text-shadow: 0 0 7px rgba(255,95,95,.45); }
  #strikes span { opacity: .28; transition: opacity .12s, transform .12s; }
  #strikes span.on { opacity: 1; transform: scale(1.15); }
  /* 투수(사이드암, 먼 곳이라 작게) */
  #pitcher {
    position: absolute; top: 30%; left: 44%; transform: translate(-50%,-50%) rotate(10deg);
    font-size: 6vmin; z-index: 5; transition: transform .12s;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,.3));
  }
  #pitcher.wind { transform: translate(-50%,-50%) rotate(-24deg) scale(1.12); } /* 사이드암 릴리스 */
  /* 스트라이크 존(가운데, 빨간 박스 + 십자선) */
  #zone {
    position: absolute; top: 60%; left: 46%; transform: translate(-50%,-50%);
    width: 16vmin; height: 18vmin; max-width: 130px; max-height: 150px; z-index: 4;
    border-radius: 6%;
    border: 2.5px solid light-dark(rgba(210,55,55,.72), rgba(240,95,95,.7));
    box-shadow: 0 0 9px light-dark(rgba(210,55,55,.28), rgba(240,95,95,.28));
    transition: border-color .07s, transform .07s, box-shadow .07s;
  }
  #zone::before, #zone::after { content: ""; position: absolute; left: 50%; top: 50%;
    background: light-dark(rgba(210,55,55,.85), rgba(240,95,95,.85)); }
  #zone::before { width: 28%; height: 2px; transform: translate(-50%,-50%); }
  #zone::after  { width: 2px; height: 28%; transform: translate(-50%,-50%); }
  #zone.beat { border-color: light-dark(rgba(210,55,55,1), rgba(255,120,120,.95)); }
  #zone.hit  { transform: translate(-50%,-50%) scale(1.18);
               box-shadow: 0 0 0 .5rem light-dark(rgba(75,175,110,.35), rgba(90,220,140,.3)); }
  /* 홈플레이트(오각형, 아래 중앙) */
  #plate {
    position: absolute; left: 44%; top: 90%; transform: translate(-50%,-50%);
    width: 16vmin; height: 9vmin; z-index: 3;
    background: light-dark(#eef1f5, #d7dee7);
    clip-path: polygon(0 0, 100% 0, 100% 45%, 50% 100%, 0 45%);
    box-shadow: 0 2px 6px rgba(0,0,0,.25);
  }
  /* 타자(오른쪽 전경 — SVG, 크게) */
  #batter {
    position: absolute; top: 60%; left: 77%; transform: translate(-50%,-50%);
    width: 48vmin; max-width: 360px; z-index: 9; pointer-events: none;
    filter: drop-shadow(0 8px 13px rgba(0,0,0,.4));
  }
  #batter svg { width: 100%; height: auto; display: block; overflow: visible; }
  #batarm { transform-box: view-box; transform-origin: 58px 108px;
            transition: transform .09s cubic-bezier(.2,.85,.3,1); }
  #batter.swing #batarm { transform: rotate(-88deg); }
  /* 공 */
  .ball {
    position: absolute; z-index: 7; will-change: left, top, transform;
    transform: translate(-50%,-50%); pointer-events: none;
    font-size: 6vmin; filter: drop-shadow(0 3px 4px rgba(0,0,0,.35));
  }
  /* 판정 팝업 */
  #judge {
    position: absolute; top: 62%; left: 50%; transform: translate(-50%,-50%) scale(.6);
    z-index: 15; font-weight: bold; font-size: 6vmin; opacity: 0; pointer-events: none;
    text-shadow: 0 2px 8px rgba(0,0,0,.3);
  }
  #judge.show { animation: pop .5s ease-out; }
  @keyframes pop {
    0% { opacity: 0; transform: translate(-50%,-50%) scale(.5); }
    25% { opacity: 1; transform: translate(-50%,-42%) scale(1.15); }
    100% { opacity: 0; transform: translate(-50%,-30%) scale(1); }
  }
  /* 공 꼬리(잔상) */
  .trail {
    position: absolute; z-index: 6; transform: translate(-50%,-50%);
    border-radius: 50%; pointer-events: none; opacity: .5;
    background: radial-gradient(circle at 40% 35%, #fff, #dcdcdc 68%, rgba(220,220,220,0));
    transition: opacity .4s ease-out;
  }
  /* 오버레이 */
  #overlay {
    position: absolute; inset: 0; z-index: 30; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 1.4rem;
    background: light-dark(rgba(234,241,247,.9), rgba(12,18,25,.9));
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  #overlay.hidden { display: none; }
  #overlay h1 { font-size: clamp(1.6rem, 6vmin, 2.6rem); margin: 0; }
  #overlay p { margin: 0; opacity: .8; line-height: 1.7; font-size: clamp(.85rem, 3.4vmin, 1rem); }
  #overlay .big { font-size: 4rem; margin-bottom: .3rem; }
  #btn {
    margin-top: .6rem; font: bold 1rem ui-monospace, monospace; padding: .8rem 1.8rem;
    border-radius: 2rem; border: 2px solid currentColor; cursor: pointer; color: inherit;
    background: light-dark(rgba(255,255,255,.6), rgba(30,40,55,.6));
  }
  #btn:active { transform: scale(.95); }
  .key { display: inline-block; padding: .05rem .5rem; border: 1.5px solid currentColor;
         border-radius: .4rem; font-size: .85em; opacity: .85; }
  #countin {
    position: absolute; top: 40%; left: 50%; transform: translate(-50%,-50%);
    z-index: 16; font-size: 16vmin; font-weight: bold; opacity: 0; pointer-events: none;
    color: light-dark(#3a4a5f, #8fb4dd);
  }
  #countin.tick { animation: ci .55s ease-out; }
  @keyframes ci { 0% { opacity: .95; transform: translate(-50%,-50%) scale(1.3); }
                  100% { opacity: 0; transform: translate(-50%,-50%) scale(.8); } }
</style>
</head>
<body>
<div id="field">
  <div id="hud">
    <div id="lv">⚾ 야구 리듬</div>
    <div id="strikes"><span>❌</span><span>❌</span><span>❌</span></div>
  </div>
  <div id="board"><div id="boardMsg"></div></div>
  <div id="pitcher">🤾</div>
  <div id="plate"></div>
  <div id="zone"></div>
  <div id="batter">
    <svg viewBox="0 0 220 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <!-- 다리 · 신발 -->
      <ellipse cx="106" cy="284" rx="20" ry="10" fill="#12305f"/>
      <ellipse cx="150" cy="284" rx="20" ry="10" fill="#12305f"/>
      <rect x="98" y="192" width="26" height="86" rx="12" fill="#26324e"/>
      <rect x="130" y="192" width="26" height="86" rx="12" fill="#1e2942"/>
      <!-- 유니폼 몸통 -->
      <path d="M92 116 q38 -15 76 0 l7 82 q-45 17 -90 0 z" fill="#eef1f5"/>
      <path d="M152 120 l15 78 q-15 6 -18 6 l-6 -82 z" fill="#d3d9e2"/>
      <text x="128" y="178" font-family="ui-monospace,monospace" font-size="36" font-weight="700" fill="#26324e" text-anchor="middle">26</text>
      <!-- 뒷목 · 헬멧 -->
      <rect x="114" y="100" width="26" height="24" rx="9" fill="#e2a880"/>
      <circle cx="128" cy="74" r="45" fill="#243458"/>
      <path d="M86 82 q-18 3 -16 -8 q2 -12 24 -10 z" fill="#1b2745"/>
      <ellipse cx="120" cy="60" rx="15" ry="10" fill="#3a4f86" opacity=".65"/>
      <!-- 팔(소매→손) -->
      <path d="M104 126 q-26 -4 -44 -20" stroke="#eef1f5" stroke-width="23" stroke-linecap="round" fill="none"/>
      <path d="M70 112 q-10 -4 -14 -6" stroke="#e2a880" stroke-width="17" stroke-linecap="round" fill="none"/>
      <!-- 배트(스윙 회전 그룹) -->
      <g id="batarm">
        <line x1="58" y1="108" x2="18" y2="22" stroke="#cf9552" stroke-width="15" stroke-linecap="round"/>
        <line x1="58" y1="108" x2="44" y2="78" stroke="#6d4a28" stroke-width="18" stroke-linecap="round"/>
        <circle cx="58" cy="108" r="11" fill="#e2a880"/>
      </g>
    </svg>
  </div>
  <div id="countin"></div>
  <div id="judge"></div>

  <div id="overlay">
    <div class="big">⚾</div>
    <h1>야구 리듬 — 홈런 타이밍</h1>
    <p>
      사이드암 투수의 공이 <b>뱀처럼 휘며 커져서</b> 날아와요.<br>
      레벨1 <b>3구</b> → 레벨2 <b>6구</b> → 레벨3 <b>10구</b>.<br>
      공이 <b>스트라이크 존</b>에 들어오는 순간 <span class="key">스페이스</span> / 화면 탭!<br>
      투수가 <b>한 마디</b>를 던지면(콜), 다음 <b>한 마디</b>에 같은 리듬으로 <b>받아쳐요</b>(리스폰스).<br>
      헛스윙·놓침은 스트라이크, <b>3스트라이크면 아웃</b>.<br>
      레벨이 오를수록 판정이 <b>빡세져요</b>.<br>
      세 레벨 다 통과하면 <b>🏆 공동 1등</b>.
    </p>
    <button id="btn">플레이</button>
  </div>
</div>

<script>
// ── 상수 ───────────────────────────────────────────────
const BPM = 100;
const BEAT = 60 / BPM;        // 한 박 = 0.6초
const MEASURE = 4;           // 한 마디 = 4박
let TRAVEL = 2.4;            // 공 비행 시간(초) = 한 마디 (투수 콜 → 타자 리스폰스)
const COUNTIN = MEASURE;      // 카운트인 = 한 마디
// 등뒤 뷰 좌표(%): 투수(먼 곳, 위)·스트라이크 존(앞, 아래). 세로 구간 길게.
const PITCH = { x: 44, y: 30 }, ZONE = { x: 46, y: 60 };
const SNAKE = 3;   // 좌우 웨이브 반주기 수 — 공이 뱀처럼 휨

// 한 마디(4박) 안 공의 박 위치 — 못박기식: 꾸준한 연타 → 마지막에 촘촘한 액센트
// 음이름 → 주파수 (C장조 펜타토닉: 도레미솔라)
const N = { C4: 261.63, D4: 293.66, E4: 329.63, G4: 392.00, A4: 440.00, C5: 523.25 };
// beats: 한 마디(4박) 안 공의 박 위치 · wp/wg: 퍼펙트/안타 판정 창(±초, 레벨 오를수록 좁아짐)
// mel: 각 공의 음(beats와 같은 길이) — 리듬이 곧 멜로디
const LEVELS = [
  { name: "레벨 1", beats: [0, 1, 2], wp: 0.090, wg: 0.185,
    mel: [N.C4, N.E4, N.G4] },
  { name: "레벨 2", beats: [0, 0.5, 1, 1.5, 2, 2.5], wp: 0.070, wg: 0.150,
    mel: [N.C4, N.E4, N.G4, N.A4, N.G4, N.E4] },
  { name: "레벨 3", beats: [0, 0.5, 1, 1.5, 2, 2.5, 3, 3.25, 3.5, 3.75], wp: 0.052, wg: 0.115,
    mel: [N.C4, N.D4, N.E4, N.G4, N.A4, N.C5, N.A4, N.G4, N.E4, N.C4] },
];

// ── DOM ────────────────────────────────────────────────
const field = document.getElementById("field");
const lvEl = document.getElementById("lv");
const strikeEls = [...document.querySelectorAll("#strikes span")];
const pitcher = document.getElementById("pitcher");
const zone = document.getElementById("zone");
const batter = document.getElementById("batter");
const judgeEl = document.getElementById("judge");
const overlay = document.getElementById("overlay");
const btn = document.getElementById("btn");
const countinEl = document.getElementById("countin");
const boardMsg = document.getElementById("boardMsg");

// ── 오디오(신스 — 외부 음원 없음) ──────────────────────
let ctx, noiseBuf;
function initAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  const n = ctx.sampleRate * 0.4;
  noiseBuf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
}
function tone(freq, t, dur, gain = 0.2, type = "sine") {
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(ctx.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function noise(t, dur, gain, freq, q = 1) {
  const s = ctx.createBufferSource(); s.buffer = noiseBuf;
  const bp = ctx.createBiquadFilter(); bp.type = "bandpass";
  bp.frequency.setValueAtTime(freq, t); bp.Q.value = q;
  const g = ctx.createGain();
  g.gain.setValueAtTime(gain, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  s.connect(bp).connect(g).connect(ctx.destination);
  s.start(t); s.stop(t + dur + 0.02);
}
const click = (t, hi) => tone(hi ? 1600 : 1000, t, 0.05, 0.14, "square");
// 관중 함성 — 필터링된 노이즈가 솟았다 잦아든다
function sCrowd() {
  const t = ctx.currentTime;
  const s = ctx.createBufferSource(); s.buffer = noiseBuf; s.loop = true;
  const bp = ctx.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 650; bp.Q.value = 0.6;
  const lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 2400;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.26, t + 0.2);       // 와아아—
  g.gain.setValueAtTime(0.24, t + 0.75);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 1.6);
  s.connect(bp).connect(lp).connect(g).connect(ctx.destination);
  s.start(t); s.stop(t + 1.65);
}
// 마림바풍 멜로디 음 — 투수가 던질 때(콜)/타자가 칠 때(리스폰스) 같은 음을 낸다
function bell(freq, t, gain = 0.24) {
  const o = ctx.createOscillator(), o2 = ctx.createOscillator();
  const g = ctx.createGain(), g2 = ctx.createGain();
  o.type = "triangle"; o.frequency.setValueAtTime(freq, t);
  o2.type = "sine"; o2.frequency.setValueAtTime(freq * 2, t); // 옥타브 배음(반짝임)
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(gain, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.38);
  g2.gain.setValueAtTime(0.5, t);
  o.connect(g); o2.connect(g2).connect(g); g.connect(ctx.destination);
  o.start(t); o2.start(t); o.stop(t + 0.42); o2.stop(t + 0.42);
}
function kick(t) {
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(48, t + 0.12);
  g.gain.setValueAtTime(0.26, t); g.gain.exponentialRampToValueAtTime(0.0001, t + 0.17);
  o.connect(g).connect(ctx.destination); o.start(t); o.stop(t + 0.19);
}
const hat = (t) => noise(t, 0.028, 0.07, 8500, 1);
// 레벨 내내 깔리는 그루브 — 박자를 '몸으로 느껴서' 치게 만든다(리듬세상 감각)
function scheduleGroove(t0, nbeats) {
  for (let i = 0; i < nbeats; i++) {
    kick(t0 + i * BEAT);
    hat(t0 + (i + 0.5) * BEAT);
    if (i < COUNTIN) click(t0 + i * BEAT, i === 0);  // 카운트인 박은 또렷하게
  }
}
function sCrack()  { const t = ctx.currentTime; noise(t, 0.09, 0.5, 1800, 0.8); tone(880, t, 0.18, 0.22, "triangle"); tone(1320, t, 0.14, 0.12, "sine"); }
function sHit()    { const t = ctx.currentTime; noise(t, 0.08, 0.35, 1200, 1); tone(520, t, 0.12, 0.16, "triangle"); }
function sWhiff()  { const t = ctx.currentTime; noise(t, 0.16, 0.22, 700, 0.5); }
function sStrike() { const t = ctx.currentTime; tone(180, t, 0.2, 0.2, "sawtooth"); }

// ── 게임 상태 ──────────────────────────────────────────
let state = "idle";   // idle | playing | over
let lvIdx = 0;
let balls = [];        // {hit, spawn, judged, node}
let startTime = 0;
let strikes = 0;
let lastBeat = -1;
let respCued = false;             // "받아쳐!" 리스폰스 진입 안내 표시 여부
let curWP = 0.072, curWG = 0.15;  // 현재 레벨 판정 창(±초)
let levelClean = true;   // 이 레벨 전부 퍼펙트+무스트라이크
let perfectGame = true;  // 전체 완벽
let won = false;
let raf = 0;
let homers = 0, maxDist = 0;   // 세션 누적 기록(홈런 수 · 최고 비거리)

function setStrikes(n) {
  strikes = n;
  strikeEls.forEach((el, i) => el.classList.toggle("on", i < n));
}
function popJudge(text, color) {
  judgeEl.textContent = text; judgeEl.style.color = color;
  judgeEl.classList.remove("show"); void judgeEl.offsetWidth; judgeEl.classList.add("show");
}
function startLevel(idx) {
  lvIdx = idx;
  const lv = LEVELS[idx];
  lvEl.textContent = `${lv.name} · ${lv.beats.length}구`;
  curWP = lv.wp; curWG = lv.wg;
  balls = []; setStrikes(0); levelClean = true; lastBeat = -1; respCued = false;
  startTime = ctx.currentTime + 0.45;
  const maxBeat = Math.max(...lv.beats);
  // 투수 한 마디(콜) → 타자 한 마디(리스폰스): 정확히 한 마디 뒤에 타격.
  // 패턴이 한 마디 안에 들어가므로 마지막 투구가 첫 타격보다 먼저 끝난다.
  const OFFSET = MEASURE;
  TRAVEL = OFFSET * BEAT;
  scheduleGroove(startTime, COUNTIN + OFFSET + Math.ceil(maxBeat) + 1);
  lv.beats.forEach((b, i) => {
    const hit = startTime + (COUNTIN + OFFSET + b) * BEAT;  // 타격 = 콜보다 OFFSET박 뒤
    const note = lv.mel[i];
    balls.push({ hit, spawn: hit - TRAVEL, note, judged: false, node: null });
    bell(note, hit - TRAVEL, 0.18);   // 던질 때(spawn) = 콜(투수가 음을 불러줌)
  });
  state = "playing";
  cancelAnimationFrame(raf); raf = requestAnimationFrame(loop);
}

function loop() {
  if (state !== "playing") return;
  const now = ctx.currentTime;

  // 박자 펄스(카운트인 포함)
  const beatNo = Math.floor((now - startTime) / BEAT);
  if (beatNo !== lastBeat && now >= startTime) {
    lastBeat = beatNo;
    zone.classList.add("beat"); setTimeout(() => zone.classList.remove("beat"), 110);
    if (beatNo < COUNTIN) {
      countinEl.textContent = COUNTIN - beatNo;
      countinEl.classList.remove("tick"); void countinEl.offsetWidth; countinEl.classList.add("tick");
      pitcher.classList.add("wind"); setTimeout(() => pitcher.classList.remove("wind"), 140);
    }
  }

  // 투구(콜)가 끝나고 타격(리스폰스) 차례가 오면 한 번 안내
  if (!respCued && balls.length && now >= balls[0].hit - 0.6) {
    respCued = true;
    popJudge("🏏 받아쳐!", "#4bae6e");
  }

  // 공 렌더 + 놓침 판정
  for (const b of balls) {
    if (b.flying) {                        // 타격 후: 궤적 그리며 날아감
      if (b.node) {
        const prog = (now - b.hitT) / b.dur;
        if (prog >= 1) { b.node.remove(); b.node = null; }
        else {
          const ease = 1 - Math.pow(1 - prog, 2);            // 빠르게 나갔다 감속
          const fx = ZONE.x + b.driftX * ease;
          const fy = ZONE.y + (b.topY - ZONE.y) * ease - b.arcH * Math.sin(prog * Math.PI);
          const fsc = Math.max(b.contactScale * (1 - 0.72 * prog), 0.05);  // 멀어지며 작아짐
          b.node.style.left = fx.toFixed(2) + "%";
          b.node.style.top = fy.toFixed(2) + "%";
          b.node.style.transform = `translate(-50%,-50%) scale(${fsc.toFixed(3)})`;
          if (now - (b.lastTrail || 0) > 0.022) { b.lastTrail = now; spawnTrail(fx, fy, 6 * fsc * 0.85); }
        }
      }
      continue;
    }
    const p = (now - b.spawn) / TRAVEL;   // 0=투수, 1=홈플레이트
    if (!b.node && p >= 0 && p < 1.3 && !b.judged) {
      b.node = document.createElement("div");
      b.node.className = "ball"; b.node.textContent = "⚾";
      field.appendChild(b.node);
      pitcher.classList.add("wind"); setTimeout(() => pitcher.classList.remove("wind"), 130); // 투구 모션
    }
    if (b.node) {
      if (b.judged && now > b.hit + 0.28) { b.node.remove(); b.node = null; }
      else {
        const pc = Math.min(p, 1.15);
        const e = Math.pow(pc, 1.3);                          // 위치 이징(원근 — 멀 땐 천천히)
        const sc = 0.14 + Math.pow(pc, 2.2) * 1.2;            // 도착할수록 급팽창 = 화면 쪽으로 다가옴
        const y = PITCH.y + (ZONE.y - PITCH.y) * e;           // 수직 하강
        const amp = 3 + e * 12;                               // 가까울수록 웨이브 진폭 ↑
        const x = ZONE.x + (PITCH.x - ZONE.x) * (1 - e) + amp * Math.sin(SNAKE * Math.PI * e); // 릴리스→존 + 뱀
        b.node.style.left = x.toFixed(2) + "%";
        b.node.style.top = y.toFixed(2) + "%";
        b.node.style.transform = `translate(-50%,-50%) scale(${sc.toFixed(3)})`;
        if (b.judged) b.node.style.opacity = "0.35";
      }
    }
    if (!b.judged && now > b.hit + curWG) {   // 그냥 지나감 = 놓침
      b.judged = true; b.result = "miss";
      addStrike("놓침!");
    }
  }

  // 레벨 종료 판정 (날아가는 공 애니메이션이 끝날 때까지 기다림)
  const last = balls[balls.length - 1];
  const anyFlying = balls.some((b) => b.flying && b.node);
  if (state === "playing" && !anyFlying && now > last.hit + 0.5 && balls.every((b) => b.judged)) {
    finishLevel();
    return;
  }
  raf = requestAnimationFrame(loop);
}

// 타격 성공 → 공이 궤적 그리며 날아감
function launchBall(b, now, homerun) {
  b.flying = true; b.hitT = now; b.lastTrail = 0;
  b.contactScale = 1.35;
  if (homerun) {                       // 우측 담장 넘어 — 오른쪽 위로 사라짐
    b.driftX = 26 + Math.random() * 12;
    b.topY = -20; b.arcH = 10; b.dur = 1.5;
    b.dist = 108 + Math.round(Math.random() * 40);   // 108~148m
  } else {                             // 좌중간 안타 — 왼쪽 필드로 낮게
    b.driftX = -(18 + Math.random() * 10);
    b.topY = 28; b.arcH = 15; b.dur = 1.0;
    b.dist = 0;
  }
}
// 공 꼬리(잔상)
function spawnTrail(xPct, yPct, sizeVmin) {
  const d = document.createElement("div");
  d.className = "trail";
  d.style.left = xPct.toFixed(2) + "%"; d.style.top = yPct.toFixed(2) + "%";
  d.style.width = d.style.height = sizeVmin.toFixed(2) + "vmin";
  field.appendChild(d);
  requestAnimationFrame(() => { d.style.opacity = "0"; });
  setTimeout(() => d.remove(), 420);
}
let boardTimer = 0;
function boardRecords() { boardMsg.textContent = `⚾ 홈런 ${homers}   최고 ${maxDist}m`; boardMsg.className = ""; }
function boardShow(text, cls) {            // 전광판에 결과 표시 후 기록으로 복귀
  boardMsg.textContent = text; boardMsg.className = cls;
  clearTimeout(boardTimer); boardTimer = setTimeout(boardRecords, 1700);
}

function addStrike(label) {
  levelClean = false; perfectGame = false;
  sStrike();
  boardShow(label, "strike");
  setStrikes(strikes + 1);
  if (strikes >= 3) { state = "over"; setTimeout(gameOver, 550); }
}

function swing() {
  if (state !== "playing") return;
  batter.classList.add("swing"); setTimeout(() => batter.classList.remove("swing"), 130);
  const now = ctx.currentTime;
  // 판정 창 안, 아직 안 친 공 중 가장 가까운 공
  let best = null, bd = Infinity;
  for (const b of balls) {
    if (b.judged) continue;
    const d = Math.abs(now - b.hit);
    if (d <= curWG && d < bd) { bd = d; best = b; }
  }
  if (!best) {
    sWhiff();
    // 콜(투구) 단계의 스윙은 연습 스윙 — 스트라이크 아님. 리스폰스 시작 후에만 아웃 카운트.
    const responseStarted = balls.length && now >= balls[0].hit - curWG - 0.1;
    if (responseStarted) addStrike("헛스윙!");
    return;
  }
  best.judged = true;
  zone.classList.add("hit"); setTimeout(() => zone.classList.remove("hit"), 120);
  if (bd <= curWP) {
    best.result = "perfect"; bell(best.note, now, 0.34); sCrack();  // 같은 음 재현 = 리스폰스
    launchBall(best, now, true);   // 홈런: 우측 담장 너머
    homers++; if (best.dist > maxDist) maxDist = best.dist;
    sCrowd(); boardShow(`⚾ 홈런!  ${best.dist}m`, "hr");   // 관중 함성 + 전광판
  } else {
    best.result = "good"; bell(best.note, now, 0.22); sHit(); levelClean = false; perfectGame = false;
    boardShow("안타!", "hit");
    launchBall(best, now, false);  // 안타: 좌중간
  }
}

function finishLevel() {
  if (lvIdx + 1 < LEVELS.length) {
    overlayScreen("✅", `${LEVELS[lvIdx].name} 클리어!`,
      levelClean ? "완벽해요 — 전부 퍼펙트!" : "다음 레벨로!", "다음", () => startLevel(lvIdx + 1));
  } else {
    won = true; state = "over";
    if (perfectGame)
      overlayScreen("🏆✨", "퍼펙트 게임! 공동 1등", "모든 공을 홈런으로 — 완벽한 타석이었어요!", "다시", restart);
    else
      overlayScreen("🏆", "공동 1등 달성!", "세 레벨 모두 통과했어요. 이제 전 구간 퍼펙트에 도전!", "다시", restart);
  }
}

function gameOver() {
  const lv = LEVELS[lvIdx];
  overlayScreen("⚾ 아웃", "3 스트라이크!", `${lv.name}(${lv.beats.length}구)에서 아웃. 다시 도전!`, "재도전", () => startLevel(lvIdx));
}

function overlayScreen(big, title, body, label, onClick) {
  overlay.querySelector(".big").textContent = big;
  overlay.querySelector("h1").textContent = title;
  overlay.querySelector("p").innerHTML = body;
  btn.textContent = label;
  btn.onclick = () => { overlay.classList.add("hidden"); onClick(); };
  overlay.classList.remove("hidden");
}

function restart() { perfectGame = true; won = false; homers = 0; maxDist = 0; boardRecords(); startLevel(0); }

// ── 입력 ───────────────────────────────────────────────
function firstStart() {
  initAudio(); if (ctx.state === "suspended") ctx.resume();
  overlay.classList.add("hidden");
  perfectGame = true; won = false; homers = 0; maxDist = 0; boardRecords(); startLevel(0);
}
btn.onclick = firstStart;

field.addEventListener("pointerdown", () => { if (state === "playing") swing(); });
window.addEventListener("keydown", (e) => {
  if (e.code !== "Space") return;
  e.preventDefault();
  if (e.repeat) return;
  if (state === "playing") swing();
  else if (!overlay.classList.contains("hidden")) btn.click();
});

// ── 공유 문구 ──────────────────────────────────────────
window.blShareText = () => {
  if (won) return perfectGame
    ? "⚾ 야구 리듬에서 퍼펙트 게임 달성! 공동 1등 도전해봐"
    : "⚾ 야구 리듬 3단계 클리어, 공동 1등! 도전해봐";
  return "⚾ 야구공 치기 리듬게임 — 3단계 다 치면 공동 1등!";
};
</script>
<script defer src="/_shared/share.js"></script>
