<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="description" content="Duri — 둘이서 주고받은 대화와 사진이 내 컴퓨터에 저절로 쌓이는 기록 시스템.">
<meta name="theme-color" content="#10151c">
<title>💞 Duri</title>
<style>
  :root { color-scheme: light dark; --pink: light-dark(#c0568a, #f0a8ce); --line: light-dark(#e6eaef, #232c38);
          --panel: light-dark(#ffffff, #161c25); --bg: light-dark(#fafbfc, #10151c); --dim: light-dark(#5b6875, #8b97a6); }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body { font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
         color: light-dark(#1c2733, #e2e9f0); background: var(--bg);
         display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: .5rem; padding: .7rem 1rem;
           border-bottom: 1px solid var(--line); background: var(--panel); }
  header .mark { font-size: 1.2rem; }
  header b { font-size: .95rem; }
  header .status { margin-left: auto; font-size: .72rem; color: var(--dim); display: flex; align-items: center; gap: .35rem; }
  header .dot { width: .5rem; height: .5rem; border-radius: 50%; background: var(--dim); }
  header .dot.on { background: light-dark(#3aa675, #4fd39c); }
  header a { color: var(--dim); font-size: .72rem; text-decoration: none; }

  #log { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .5rem;
         max-width: 44rem; width: 100%; margin: 0 auto; }
  .row { display: flex; flex-direction: column; max-width: 78%; }
  .row.me { align-self: flex-end; align-items: flex-end; }
  .row .who { font-size: .68rem; color: var(--dim); margin: 0 .3rem .1rem; }
  .bubble { padding: .5rem .75rem; border-radius: .9rem; background: var(--panel); border: 1px solid var(--line);
            white-space: pre-wrap; word-break: break-word; line-height: 1.5; font-size: .92rem; }
  .row.me .bubble { background: light-dark(#fbe6f0, #3a2233); border-color: light-dark(#f2cfe1, #4d2c40); }
  .bubble img { max-width: min(20rem, 70vw); border-radius: .5rem; display: block; }
  .bubble .cap { font-size: .82rem; margin-top: .3rem; color: var(--dim); }
  /* 스티커는 정사각 자리를 먼저 잡고, 말풍선 배경 없이 투명하게 */
  .bubble.sticker, .row.me .bubble.sticker { background: none; border: none; padding: .2rem; }
  .bubble.sticker img { width: clamp(6rem, 30vw, 8.5rem); aspect-ratio: 1 / 1; height: auto; border-radius: 0; }
  .time { font-size: .62rem; color: var(--dim); margin: .1rem .3rem 0; }
  .broken { color: light-dark(#b4453a, #f0a8a2); font-size: .82rem; }

  form { display: flex; gap: .5rem; padding: .6rem; border-top: 1px solid var(--line); background: var(--panel);
         max-width: 44rem; width: 100%; margin: 0 auto; align-items: flex-end;
         padding-bottom: calc(.6rem + env(safe-area-inset-bottom)); }
  textarea { flex: 1; resize: none; font: inherit; padding: .55rem .7rem; border-radius: .8rem;
             border: 1px solid var(--line); background: var(--bg); color: inherit; max-height: 8rem; }
  button, label.attach { font: inherit; border: 1px solid var(--line); background: var(--bg); color: inherit;
           border-radius: .8rem; padding: .55rem .75rem; cursor: pointer; }
  #sticker-btn { font-size: 1.1rem; line-height: 1; }
  #sticker-btn[aria-expanded="true"] { background: light-dark(#f0e3ea, #26202a); }
  button.send { background: var(--pink); color: light-dark(#fff, #1a1016); border-color: transparent; font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }

  /* 스티커 서랍 */
  #picker { max-width: 44rem; width: 100%; margin: 0 auto; border-top: 1px solid var(--line); background: var(--panel); }
  #picker[hidden] { display: none; }
  #tabs { display: flex; gap: .25rem; padding: .45rem .7rem 0; overflow-x: auto; }
  #tabs button { font: inherit; font-size: .72rem; padding: .4rem .6rem; border: 0; border-radius: .5rem .5rem 0 0;
                 background: none; color: inherit; opacity: .55; white-space: nowrap; cursor: pointer; }
  #tabs button[aria-selected="true"] { opacity: 1; font-weight: 600; background: var(--bg); }
  #hint { font-size: .68rem; opacity: .55; padding: .4rem .8rem 0; background: var(--bg); min-height: 1.2rem; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(4rem, 1fr)); gap: .3rem;
          padding: .45rem .7rem .7rem; max-height: 42dvh; overflow-y: auto; background: var(--bg); }
  #grid button { padding: .25rem; background: none; border: 2px solid transparent; border-radius: .6rem; cursor: pointer; }
  #grid button.selected { border-color: var(--pink); background: light-dark(#c0568a1a, #f0a8ce22); }
  #grid img { width: 100%; aspect-ratio: 1 / 1; height: auto; display: block; }
  #grid .empty { grid-column: 1 / -1; text-align: center; font-size: .78rem; opacity: .5; padding: 1.2rem 0; }

  .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .card { max-width: 24rem; width: 100%; }
  .card h1 { font-size: 1.2rem; }
  .card p { font-size: .85rem; color: var(--dim); line-height: 1.7; }
  .card label { display: block; font-size: .78rem; margin: 1rem 0 .3rem; }
  .card input { width: 100%; font: inherit; padding: .55rem .7rem; border-radius: .7rem;
                border: 1px solid var(--line); background: var(--panel); color: inherit; }
  .card button { width: 100%; margin-top: 1.1rem; padding: .65rem; background: var(--pink);
                 color: light-dark(#fff, #1a1016); border: none; border-radius: .7rem; font-weight: 600; }
  .card .warn { font-size: .72rem; color: light-dark(#b4453a, #f0a8a2); margin-top: .8rem; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="setup" class="overlay">
  <div class="card">
    <span style="font-size:1.6rem">💞</span>
    <h1>Duri</h1>
    <p>둘만의 <b>암호 문구</b>와 이름을 입력하세요. 문구는 이 기기를 떠나지 않고,
       대화·사진은 문구로 암호화되어 서버는 절대 내용을 볼 수 없습니다. 상대도
       <b>같은 문구</b>를 입력해야 서로의 메시지가 열립니다.</p>
    <label>암호 문구 (둘이 똑같이)</label>
    <input id="pass" type="password" autocomplete="off" placeholder="예: 우리만아는긴문장">
    <label>내 이름</label>
    <input id="name" autocomplete="off" placeholder="예: 도경">
    <button id="enter">시작</button>
    <p class="warn" id="setupWarn"></p>
  </div>
</div>

<header class="hidden" id="bar">
  <span class="mark">💞</span>
  <b>Duri</b>
  <span class="status"><span class="dot" id="dot"></span><span id="stat">연결 중…</span></span>
  <button id="clear-cache" title="이 기기에 저장된 대화 기록 지우기"
          style="margin-left:.6rem; font-size:.7rem; padding:.25rem .5rem;">기록지우기</button>
  <a href="/logout" style="margin-left:.6rem">나가기</a>
</header>

<div id="log" class="hidden"></div>

<div id="picker" hidden>
  <div id="tabs" role="tablist"></div>
  <div id="hint">스티커를 누르면 미리보기, 한 번 더 누르면 전송돼요</div>
  <div id="grid"></div>
</div>

<form id="composer" class="hidden">
  <label class="attach" title="사진 보내기">🖼️<input id="file" type="file" accept="image/*" hidden></label>
  <button type="button" id="sticker-btn" aria-expanded="false" title="스티커">🐴</button>
  <textarea id="text" rows="1" placeholder="메시지…" autocomplete="off"></textarea>
  <button type="submit" class="send" id="sendBtn">보내기</button>
</form>

<script>
"use strict";
// ── 유틸 ─────────────────────────────────────────────────────
const $ = (id) => document.getElementById(id);
const enc = new TextEncoder();
const dec = new TextDecoder();
const b64 = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
const unb64 = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
const hex = (buf) => [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, "0")).join("");
const fmtTime = (t) => new Date(t).toLocaleString("ko-KR", { hour: "2-digit", minute: "2-digit", month: "numeric", day: "numeric" });

// ── E2E 암호화 (PBKDF2 → AES-GCM 256) ────────────────────────
const SALT = enc.encode("duri:v1:pbkdf2:shared-passphrase");
const ITER = 210_000;
let KEY = null, MY_NAME = "";

async function deriveKey(passphrase) {
  const base = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: SALT, iterations: ITER, hash: "SHA-256" },
    base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"],
  );
}
async function encryptBytes(bytes) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, KEY, bytes);
  return { iv: b64(iv), ct };
}
async function decryptBytes(ivB64, ct) {
  return crypto.subtle.decrypt({ name: "AES-GCM", iv: unb64(ivB64) }, KEY, ct);
}
async function encryptJson(obj) {
  const { iv, ct } = await encryptBytes(enc.encode(JSON.stringify(obj)));
  return { iv, ct: b64(ct) };
}
async function decryptJson(ivB64, ctB64) {
  return JSON.parse(dec.decode(await decryptBytes(ivB64, unb64(ctB64))));
}

// ── 스티커 팩 (util/chat 와 동일: /_assets/catalog.json + 누끼) ─
const PACKS = [];
const PACK_IDS = new Map();
const RECENT_KEY = "duri:recent-stickers";

async function loadPacks() {
  try {
    const res = await fetch("/_assets/catalog.json");
    if (!res.ok) throw new Error();
    const { items } = await res.json();
    for (const item of items ?? []) {
      if (item.category !== "sticker" || !item.chat?.title || !Array.isArray(item.downloads)) continue;
      const pack = { id: item.id, title: item.chat.title, count: item.downloads.length, cutout: item.chat.cutout !== false };
      PACKS.push(pack);
      PACK_IDS.set(pack.id, pack);
    }
  } catch { /* 카탈로그 없이도 텍스트·사진은 동작 */ }
}

const stickerUrl = (pack, n) => `/_assets/sticker/${pack}/${String(n).padStart(2, "0")}.png`;
const cutoutCache = new Map();

// 흰 배경 누끼 (util/chat 와 동일한 테두리 flood fill)
function cutoutWhiteBackground(imageData) {
  const { data, width, height } = imageData;
  const whiteness = (i) => Math.min(data[i], data[i + 1], data[i + 2]);
  const visited = new Uint8Array(width * height);
  const queue = [];
  for (let x = 0; x < width; x++) queue.push(x, (height - 1) * width + x);
  for (let y = 0; y < height; y++) queue.push(y * width, y * width + width - 1);
  while (queue.length) {
    const p = queue.pop();
    if (visited[p]) continue;
    visited[p] = 1;
    const i = p * 4;
    const w = whiteness(i);
    if (w < 208) continue;
    data[i + 3] = w >= 235 ? 0 : Math.round(((235 - w) / 27) * 255);
    const x = p % width, y = (p / width) | 0;
    if (x > 0) queue.push(p - 1);
    if (x < width - 1) queue.push(p + 1);
    if (y > 0) queue.push(p - width);
    if (y < height - 1) queue.push(p + width);
  }
}
function stickerObjectUrl(pack, n) {
  if (PACK_IDS.get(pack)?.cutout === false) return Promise.resolve(stickerUrl(pack, n));
  const key = `${pack}/${n}`;
  if (!cutoutCache.has(key)) {
    cutoutCache.set(key, (async () => {
      const source = new Image();
      source.src = stickerUrl(pack, n);
      await source.decode();
      const canvas = document.createElement("canvas");
      canvas.width = source.naturalWidth; canvas.height = source.naturalHeight;
      const context = canvas.getContext("2d");
      context.drawImage(source, 0, 0);
      const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
      cutoutWhiteBackground(imageData);
      context.putImageData(imageData, 0, 0);
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      if (!blob) throw new Error("cutout failed");
      return URL.createObjectURL(blob);
    })().catch(() => stickerUrl(pack, n)));
  }
  return cutoutCache.get(key);
}
function stickerImg(pack, n, alt) {
  const img = document.createElement("img");
  img.alt = alt; img.decoding = "async";
  stickerObjectUrl(pack, n).then((url) => { img.src = url; });
  return img;
}

// ── WebSocket 연결 ───────────────────────────────────────────
let ws = null, backoff = 1000;
const seen = new Set();
const lastSeqKey = "duri:lastSeq";
const getLastSeq = () => Number(localStorage.getItem(lastSeqKey) || 0);
const setLastSeq = (n) => localStorage.setItem(lastSeqKey, String(n));

function setStatus(on, text) { $("dot").classList.toggle("on", on); $("stat").textContent = text; }

function connect() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${proto}//${location.host}/_duri`);
  ws.onopen = () => { backoff = 1000; setStatus(true, "연결됨"); ws.send(JSON.stringify({ type: "hello", since: getLastSeq() })); };
  ws.onmessage = (e) => {
    let m; try { m = JSON.parse(e.data); } catch { return; }
    if (m.type === "ping") { ws.send(JSON.stringify({ type: "pong" })); return; }
    if (m.type === "welcome" || m.type === "presence") { setStatus(true, m.online > 1 ? "둘 다 접속 중" : "연결됨 (혼자)"); return; }
    if (m.type === "entry") { renderEntry(m); return; }
    if (m.type === "error") { console.warn("duri error", m.error); return; }
  };
  ws.onclose = () => { setStatus(false, "재연결 중…"); setTimeout(connect, backoff); backoff = Math.min(backoff * 2, 15000); };
  ws.onerror = () => { try { ws.close(); } catch {} };
}

// ── 로컬 캐시 (IndexedDB) — 이 기기 표시용. 아카이브는 PC 싱크가 정본. ──
// 복호화한 항목을 이 기기에 담아 새로고침·재방문에도 대화가 남게 한다. 사진은
// 복호화한 원본 blob째 담아 서버 R2가 정리된 뒤에도 이 기기에선 계속 보인다.
// (패스프레이즈가 이미 이 기기에 저장돼 자동입장하므로 보안 수준은 동일하다.)
let db = null;
const MAX_CACHE = 2000; // 이 기기에 보관할 최근 항목 수(IndexedDB)
const MAX_DOM = 300;    // 화면에 유지할 말풍선 수(성능 — 넘으면 위에서부터 제거)
function openDB() {
  return new Promise((resolve) => {
    let req;
    try { req = indexedDB.open("duri", 1); } catch { return resolve(null); }
    req.onupgradeneeded = () => req.result.createObjectStore("entries", { keyPath: "seq" });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => resolve(null);
  });
}
function putEntry(rec) {
  if (!db) return;
  try {
    const store = db.transaction("entries", "readwrite").objectStore("entries");
    store.put(rec);
    if (rec.seq > MAX_CACHE) store.delete(IDBKeyRange.upperBound(rec.seq - MAX_CACHE)); // 오래된 것 정리
  } catch { /* 캐시는 최선노력 */ }
}
function allEntries() {
  return new Promise((resolve) => {
    if (!db) return resolve([]);
    const out = [];
    try {
      const cur = db.transaction("entries").objectStore("entries").openCursor();
      cur.onsuccess = (e) => { const c = e.target.result; if (c) { out.push(c.value); c.continue(); } else resolve(out); };
      cur.onerror = () => resolve(out);
    } catch { resolve(out); }
  });
}
function clearCache() {
  return new Promise((resolve) => {
    localStorage.removeItem(lastSeqKey);
    if (!db) return resolve();
    try { const t = db.transaction("entries", "readwrite"); t.objectStore("entries").clear(); t.oncomplete = resolve; t.onerror = resolve; }
    catch { resolve(); }
  });
}

// ── 렌더 ─────────────────────────────────────────────────────
const log = () => $("log");
function atBottom() { const el = log(); return el.scrollHeight - el.scrollTop - el.clientHeight < 80; }
function scroll() { log().scrollTop = log().scrollHeight; }

// 복호화가 끝난 레코드({seq,kind,at,name, text?|sticker?|photo blob|broken})를 그린다.
function appendRecord(rec) {
  if (seen.has(rec.seq)) return;
  seen.add(rec.seq);
  if (rec.seq > getLastSeq()) setLastSeq(rec.seq);
  const stick = atBottom();
  const row = document.createElement("div");
  row.className = "row";
  if (rec.kind === "photo" && rec.blob) {
    buildBubble(row, rec.name, rec.at, (b) => {
      const img = document.createElement("img");
      img.alt = rec.caption || "사진";
      b.appendChild(img);
      if (rec.caption) { const c = document.createElement("div"); c.className = "cap"; c.textContent = rec.caption; b.appendChild(c); }
      img.src = URL.createObjectURL(rec.blob);
    });
  } else if (rec.sticker && PACK_IDS.has(rec.sticker.pack)) {
    buildBubble(row, rec.name, rec.at, (b) => { b.classList.add("sticker"); b.appendChild(stickerImg(rec.sticker.pack, rec.sticker.n, "스티커")); });
  } else if (rec.broken) {
    buildBubble(row, "🔒", rec.at, (b) => { const s = document.createElement("span"); s.className = "broken"; s.textContent = rec.broken; b.appendChild(s); });
  } else {
    buildBubble(row, rec.name, rec.at, (b) => { b.textContent = rec.text; });
  }
  log().appendChild(row);
  // 화면 노드 수를 제한한다(성능). 지운 사진의 blob URL은 메모리 회수.
  while (log().children.length > MAX_DOM) {
    const first = log().firstChild;
    first.querySelectorAll?.("img[src^='blob:']").forEach((im) => URL.revokeObjectURL(im.src));
    first.remove();
  }
  if (stick) scroll();
}

// 서버에서 온 암호화 항목: 복호화 → 그리기 → 이 기기 캐시에 저장(broken은 캐시 안 함).
async function renderEntry(m) {
  if (seen.has(m.seq)) return;
  try {
    if (m.kind === "msg") {
      const p = await decryptJson(m.iv, m.ct);
      const rec = { seq: m.seq, kind: "msg", at: p.at ?? m.at, name: p.name };
      if (p.sticker) rec.sticker = p.sticker; else rec.text = p.text;
      appendRecord(rec); putEntry(rec);
    } else if (m.kind === "photo") {
      const meta = await decryptJson(m.metaIv, m.metaCt);
      const blob = await fetchPhotoBlob(m); // R2가 정리되기 전에 받아 캐시에 담는다
      if (blob) {
        const rec = { seq: m.seq, kind: "photo", at: meta.at ?? m.at, name: meta.name, caption: meta.caption, blob };
        appendRecord(rec); putEntry(rec);
      } else {
        appendRecord({ seq: m.seq, at: m.at, broken: "사진을 불러올 수 없습니다 (이미 백업되어 정리됨)" });
      }
    }
  } catch {
    appendRecord({ seq: m.seq, at: m.at, broken: "복호화할 수 없는 메시지 (암호 문구가 다릅니다)" });
  }
}

function buildBubble(row, name, at, fill) {
  const mine = name && name === MY_NAME;
  if (mine) row.classList.add("me");
  if (name && !mine) { const w = document.createElement("div"); w.className = "who"; w.textContent = name; row.appendChild(w); }
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  fill(bubble);
  row.appendChild(bubble);
  const t = document.createElement("div"); t.className = "time"; t.textContent = fmtTime(at); row.appendChild(t);
}

async function fetchPhotoBlob(m) {
  try {
    const res = await fetch(`/_duri/photo/${m.r2key}`, { cache: "no-store" });
    if (!res.ok) return null;
    const encbuf = await res.arrayBuffer();
    const plain = await decryptBytes(m.imgIv, encbuf);
    return new Blob([plain]);
  } catch { return null; }
}

// ── 보내기 ───────────────────────────────────────────────────
async function sendText(text) {
  const frame = await encryptJson({ name: MY_NAME, text, at: Date.now() });
  ws.send(JSON.stringify({ type: "msg", ...frame }));
}
async function sendSticker(pack, n) {
  if (!ws || ws.readyState !== 1) return;
  const frame = await encryptJson({ name: MY_NAME, at: Date.now(), sticker: { pack, n } });
  ws.send(JSON.stringify({ type: "msg", ...frame }));
  rememberSticker(pack, n);
}
async function sendPhoto(file) {
  const bytes = new Uint8Array(await file.arrayBuffer());
  const sha256 = hex(await crypto.subtle.digest("SHA-256", bytes));
  const img = await encryptBytes(bytes);
  const meta = await encryptJson({ name: MY_NAME, caption: file.name, at: Date.now() });
  const res = await fetch("/_duri/photo", {
    method: "POST",
    headers: { "X-Duri-Img-Iv": img.iv, "X-Duri-Sha256": sha256, "X-Duri-Meta-Iv": meta.iv, "X-Duri-Meta": meta.ct },
    body: img.ct,
  });
  if (!res.ok) {
    const detail = await res.text().catch(() => "");
    alert(`사진 전송 실패: ${res.status}\n원본 ${(bytes.length / 1048576).toFixed(1)}MB\n${detail}`);
  }
}

// ── 스티커 서랍 ──────────────────────────────────────────────
const picker = $("picker"), tabs = $("tabs"), grid = $("grid"), hint = $("hint");
const HINT_DEFAULT = "스티커를 누르면 미리보기, 한 번 더 누르면 전송돼요";
let activeTab = "recent", selectedKey = null;

function recentStickers() {
  try {
    const list = JSON.parse(localStorage.getItem(RECENT_KEY) ?? "[]");
    return Array.isArray(list) ? list.filter((key) => {
      const [pack, n] = String(key).split("/");
      return PACK_IDS.has(pack) && Number(n) >= 1 && Number(n) <= (PACK_IDS.get(pack)?.count ?? 0);
    }) : [];
  } catch { return []; }
}
function rememberSticker(pack, n) {
  const key = `${pack}/${n}`;
  localStorage.setItem(RECENT_KEY, JSON.stringify([key, ...recentStickers().filter((k) => k !== key)].slice(0, 16)));
}
function clearSelection() {
  selectedKey = null; hint.textContent = HINT_DEFAULT;
  for (const b of grid.querySelectorAll("button.selected")) b.classList.remove("selected");
}
function onStickerClick(button, pack, n) {
  const key = `${pack}/${n}`;
  if (selectedKey === key) { // 두 번째 탭 → 전송. 서랍은 닫지 않아 계속 보낼 수 있다.
    clearSelection();
    sendSticker(pack, n);
    return;
  }
  clearSelection();
  selectedKey = key; button.classList.add("selected");
  hint.textContent = (button.title ? `${button.title} — ` : "") + "한 번 더 누르면 전송";
}
function stickerButton(pack, n) {
  const button = document.createElement("button");
  button.type = "button";
  button.append(stickerImg(pack, n, `${PACK_IDS.get(pack)?.title ?? ""} ${n}`));
  button.addEventListener("click", () => onStickerClick(button, pack, n));
  return button;
}
function renderGrid() {
  clearSelection();
  if (activeTab === "recent") {
    const list = recentStickers();
    if (!list.length) {
      const empty = document.createElement("div");
      empty.className = "empty"; empty.textContent = "최근 보낸 스티커가 여기 모여요";
      grid.replaceChildren(empty); return;
    }
    grid.replaceChildren(...list.map((key) => { const [p, n] = key.split("/"); return stickerButton(p, Number(n)); }));
    return;
  }
  const pack = PACK_IDS.get(activeTab);
  const btns = [];
  for (let n = 1; n <= (pack?.count ?? 0); n++) btns.push(stickerButton(activeTab, n));
  grid.replaceChildren(...btns);
}
function renderTabs() {
  tabs.replaceChildren();
  for (const tab of [{ id: "recent", title: "🕘 최근" }, ...PACKS]) {
    const button = document.createElement("button");
    button.type = "button"; button.role = "tab"; button.textContent = tab.title;
    button.setAttribute("aria-selected", String(tab.id === activeTab));
    button.addEventListener("click", () => { activeTab = tab.id; renderTabs(); renderGrid(); });
    tabs.append(button);
  }
}
function openPicker() {
  if (!PACKS.length) return;
  $("text").blur();
  picker.hidden = false;
  $("sticker-btn").setAttribute("aria-expanded", "true");
  if (activeTab === "recent" && !recentStickers().length) activeTab = PACKS[0].id;
  renderTabs(); renderGrid(); scroll();
}
function closePicker() {
  picker.hidden = true;
  $("sticker-btn").setAttribute("aria-expanded", "false");
  clearSelection();
}
$("sticker-btn").addEventListener("click", () => { if (picker.hidden) openPicker(); else closePicker(); });

// ── 셋업 & 이벤트 ────────────────────────────────────────────
$("enter").addEventListener("click", async () => {
  const pass = $("pass").value;
  const name = $("name").value.trim();
  if (!pass || !name) { $("setupWarn").textContent = "문구와 이름을 모두 입력하세요."; return; }
  KEY = await deriveKey(pass);
  MY_NAME = name;
  localStorage.setItem("duri:name", name);
  localStorage.setItem("duri:pass", pass); // 이 기기에만 저장 — 서버로 전송되지 않음
  $("setup").classList.add("hidden");
  for (const el of ["bar", "log", "composer"]) $(el).classList.remove("hidden");
  await loadPacks(); // 백필 스티커 렌더 전에 팩 목록 확보
  db = await openDB();
  // 이 기기 캐시의 최근 분만 그린 뒤(새로고침에도 대화 유지, 화면은 가볍게),
  // 마지막 seq 이후만 이어받는다. 나머지 이력은 IndexedDB·PC 백업에 그대로 있다.
  for (const rec of (await allEntries()).sort((a, b) => a.seq - b.seq).slice(-MAX_DOM)) appendRecord(rec);
  connect();
});

$("clear-cache").addEventListener("click", async () => {
  if (!confirm("이 기기에 저장된 대화 기록을 지울까요?\n(상대 기기와 PC 백업은 그대로예요)")) return;
  await clearCache();
  location.reload();
});

const text = $("text");
// 입력창 자동 높이: 키 입력마다 즉시 리플로우하지 않고 프레임당 한 번으로 합친다.
let resizeScheduled = false;
function autoGrow() {
  resizeScheduled = false;
  text.style.height = "auto";
  text.style.height = text.scrollHeight + "px";
}
text.addEventListener("input", () => {
  if (resizeScheduled) return;
  resizeScheduled = true;
  requestAnimationFrame(autoGrow);
});
text.addEventListener("focus", () => { if (!picker.hidden) closePicker(); });
text.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); $("composer").requestSubmit(); }
});
$("composer").addEventListener("submit", (e) => {
  e.preventDefault();
  const val = text.value.trim();
  if (!val || !ws || ws.readyState !== 1) return;
  text.value = ""; text.style.height = "auto";
  text.focus(); // 전송 후에도 키보드 유지 — 제스처 안에서 동기로 포커스 유지, await 안 함
  sendText(val).catch((err) => console.warn("send failed", err));
});
$("file").addEventListener("change", async (e) => {
  const file = e.target.files[0];
  e.target.value = "";
  if (file) await sendPhoto(file);
});

// 저장된 문구·이름이 있으면 곧바로 입장 (아무것도 안 해도 이어짐)
(async () => {
  const savedPass = localStorage.getItem("duri:pass");
  const savedName = localStorage.getItem("duri:name");
  if (savedPass && savedName) { $("pass").value = savedPass; $("name").value = savedName; $("enter").click(); }
})();
</script>
