<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>다온핏 시안 선택</title>
<link rel="icon" href="v2/_work_assets/logo.png">
<style>
  :root { color-scheme: light; }
  body { margin: 0; min-height: 100dvh; display: grid; place-items: center;
         background: #fffdf7; color: #2b1d16;
         font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont,
           "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  main { width: min(46rem, 92vw); padding: 3rem 0; text-align: center; }
  img.logo { width: 5.5rem; }
  h1 { margin: .8rem 0 .3rem; font-size: 1.35rem; letter-spacing: -.01em; }
  p.sub { margin: 0 0 2rem; color: #8a7a6e; font-size: .88rem; }
  .versions { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(15rem, 1fr)); }
  a.ver { display: block; padding: 1.6rem 1.4rem; border-radius: 1.1rem; text-decoration: none;
          text-align: left; line-height: 1.65; transition: transform .15s; }
  a.ver:hover { transform: translateY(-3px); }
  a.v1 { background: #fff3d6; color: #2b1d16; border: 1px solid #f0e5d8; }
  a.v2 { background: #2b1d16; color: #fff; }
  .ver .tag { font-size: .7rem; font-weight: 800; letter-spacing: .18em; opacity: .6; }
  .ver b { display: block; font-size: 1.1rem; margin: .3rem 0 .2rem; }
  .ver span { font-size: .8rem; opacity: .75; }
</style>
</head>
<body>
<main>
  <img class="logo" src="v2/_work_assets/logo.png" alt="다온핏 로고">
  <h1>다온핏 홈페이지 시안</h1>
  <p class="sub">두 가지 방향을 준비했어요. 눌러서 비교해보세요.</p>
  <div class="versions">
    <a class="ver v1" href="v1/">
      <span class="tag">시안 1</span>
      <b>따뜻한 크림</b>
      <span>로고의 크림·오렌지 톤 그대로, 아기자기하고 친근한 분위기</span>
    </a>
    <a class="ver v2" href="v2/">
      <span class="tag">시안 2</span>
      <b>시네마틱 브라운</b>
      <span>얇은 대형 타이포와 다크브라운 히어로, 프리미엄 브랜드 무드</span>
    </a>
  </div>
</main>
</body>
</html>
