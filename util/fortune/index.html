<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오늘의 운세</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>🔮</text></svg>">
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
         margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
         padding: 1.5rem;
         background: light-dark(#eef2f6, #10161f);
         color: light-dark(#1c2733, #dbe4ee); }
  main { width: min(30rem, 100%); }
  header { text-align: center; margin-bottom: 1.4rem; }
  h1 { margin: 0; font-size: 1.15rem; font-weight: bold; letter-spacing: .02em; }
  .date { margin: .35rem 0 0; opacity: .55; font-size: 1.15rem; }

  .card { padding: 1.4rem 1.3rem; border-radius: .9rem;
          border: 1px solid light-dark(#1c273322, #dbe4ee22);
          background: light-dark(#ffffffaa, #182230aa); }

  #fortune { text-align: center; }
  #fortune .emoji { font-size: 2.6rem; line-height: 1; }
  #fortune .text { margin: 1rem 0 0; font-size: 1.05rem; line-height: 1.7;
                   min-height: 3.4em; display: flex; align-items: center; justify-content: center; }
  #fortune .basis { margin: .65rem 0 0; font-size: .62rem; line-height: 1.45; opacity: .42; }
  .fortune-categories { display: grid; gap: .38rem; margin-top: 1rem; }
  .fortune-category { display: grid; grid-template-columns: 3.2rem minmax(0, 1fr);
                      grid-template-areas: "name comment" "level comment";
                      column-gap: .55rem; row-gap: .16rem; align-items: start; padding: .55rem .6rem;
                      border-radius: .45rem; text-align: left; font-size: .74rem;
                      line-height: 1.45; background: light-dark(#1c273307, #dbe4ee08); }
  .fortune-category-name { grid-area: name; font-weight: bold; }
  .fortune-category-comment { grid-area: comment; min-width: 0; opacity: .72; }
  .fortune-category-level { grid-area: level; justify-self: start; padding: .08rem .35rem;
                            border-radius: .28rem; font: 600 .7rem/1.45 ui-monospace, SFMono-Regular,
                            Menlo, Consolas, monospace; white-space: nowrap;
                            background: light-dark(#1c273310, #dbe4ee16); }
  .fortune-category[data-level="원활"] .fortune-category-level { color: light-dark(#247b5f, #6fd4ac); }
  .fortune-category[data-level="주의"] .fortune-category-level { color: light-dark(#b6483d, #ff8a7a); }
  #fortune.is-loading .emoji, #fortune.is-loading .text, #fortune.is-loading .fortune-category {
    color: transparent; border-radius: .45rem;
    background: linear-gradient(100deg,
      light-dark(#1c27330d, #dbe4ee0d) 25%,
      light-dark(#1c27331c, #dbe4ee1c) 42%,
      light-dark(#1c27330d, #dbe4ee0d) 58%);
    background-size: 220% 100%; animation: fortune-shimmer 1.25s ease-in-out infinite;
  }
  #fortune.is-loading .emoji { width: 3rem; height: 3rem; margin: 0 auto; }
  #fortune.is-loading .text { width: min(22rem, 88%); min-height: 3.4rem; margin: 1rem auto 0; }
  #fortune.is-loading .fortune-category { min-height: 2.6rem; }
  @keyframes fortune-shimmer { to { background-position-x: -220%; } }
  @media (prefers-reduced-motion: reduce) {
    #fortune.is-loading .emoji, #fortune.is-loading .text, #fortune.is-loading .fortune-category { animation: none; }
  }

  button { font: inherit; color: inherit; background: none; cursor: pointer;
           padding: .6rem 1.2rem; border-radius: .55rem;
           border: 1px solid light-dark(#1c273355, #dbe4ee55); transition: background .15s; }
  button:hover:not(:disabled) { background: light-dark(#1c273310, #dbe4ee14); }
  button:active { transform: scale(.97); }
  .link-btn { border: none; padding: .5rem; opacity: .7; text-decoration: underline;
              text-underline-offset: 3px; font-size: .82rem; }
  .link-btn:hover { opacity: 1; background: none !important; }

  section { margin-top: 1.4rem; }
  [hidden] { display: none !important; }
  .panel-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between;
                  padding: 0; border: 0; border-radius: 0; text-align: left; }
  .panel-toggle:hover { background: none !important; }
  .panel-toggle h2 { margin: 0 !important; }
  .panel-chevron { opacity: .45; font-size: .8rem; transition: transform .18s ease; }
  .panel-toggle[aria-expanded="false"] .panel-chevron { transform: rotate(-90deg); }
  .panel-content { margin-top: .3rem; }

  /* 생년월일 입력 */
  #reveal { text-align: center; }
  #form .row { display: flex; gap: .5rem; align-items: center; margin-bottom: .8rem; }
  #form label { width: 3.2rem; flex: none; opacity: .6; font-size: .82rem; text-align: right; }
  #form select { flex: 1; min-width: 0; font: inherit; font-size: .85rem; color: inherit;
                 background: light-dark(#eef2f6, #10161f);
                 border: 1px solid light-dark(#1c273355, #dbe4ee55);
                 border-radius: .4rem; padding: .35rem .4rem; }
  #form input[type="time"] { flex: 1; min-width: 0; font: inherit; font-size: .85rem; color: inherit;
                 background: light-dark(#eef2f6, #10161f);
                 border: 1px solid light-dark(#1c273355, #dbe4ee55);
                 border-radius: .4rem; padding: .35rem .4rem; }
  .time-mode { display: grid; grid-template-columns: 1fr 1fr; gap: .3rem; width: 100%;
               padding: .2rem; border-radius: .55rem;
               background: light-dark(#1c27330b, #dbe4ee0d); }
  .time-mode button { padding: .42rem .5rem; border: 0; font-size: .8rem; opacity: .58; }
  .time-mode button[aria-pressed="true"] { opacity: 1; font-weight: bold;
               background: light-dark(#fff, #273445); box-shadow: 0 1px 4px #0002; }
  .time-mode.gender-mode { grid-template-columns: repeat(3, 1fr); }
  .time-help { margin: -.35rem 0 .8rem 3.7rem; font-size: .72rem; line-height: 1.45; opacity: .52; }
  #form .form-actions { display: flex; gap: .6rem; margin-top: 1rem; }
  #form .form-actions button { flex: 1; }
  #err { min-height: 1.1em; margin: .6rem 0 0; font-size: .8rem; text-align: center;
         color: light-dark(#c0392b, #ff8a7a); }

  /* 바이오리듬 결과 */
  #result h2 { margin: 0 0 .3rem; font-size: .95rem; }
  #result .sub { margin: 0 0 1.1rem; font-size: .78rem; opacity: .55; }
  #result .headline { margin: 0 0 1.2rem; font-size: 1rem; line-height: 1.65;
                      text-align: center; }
  .bio { margin-bottom: 1rem; }
  .bio:last-of-type { margin-bottom: 0; }
  .bio .bio-top { display: flex; justify-content: space-between; align-items: baseline;
                  font-size: .82rem; margin-bottom: .35rem; }
  .bio .bio-name { font-weight: bold; }
  .bio .bio-name small { font-weight: normal; opacity: .5; margin-left: .35rem; }
  .bio .bio-pct { font-variant-numeric: tabular-nums; opacity: .8; }
  .track { position: relative; height: .5rem; border-radius: 1rem;
           background: light-dark(#1c273315, #dbe4ee12); overflow: hidden; }
  .track .mid { position: absolute; left: 50%; top: 0; bottom: 0; width: 1px;
                background: light-dark(#1c273330, #dbe4ee30); }
  .track .fill { position: absolute; top: 0; bottom: 0; border-radius: 1rem;
                 transition: width .6s ease, left .6s ease; }
  .bio.phy .fill { background: light-dark(#e05a4d, #ff8a7a); }
  .bio.emo .fill { background: light-dark(#d99a26, #ffcf6b); }
  .bio.int .fill { background: light-dark(#2f8f6e, #6fd4ac); }
  .bio .bio-note { margin: .35rem 0 0; font-size: .78rem; line-height: 1.55; opacity: .75; }
  #result .footer { margin-top: 1.3rem; text-align: center; }
  #result .saved { font-size: .78rem; opacity: .5; margin: 0 0 .6rem; }

  /* 사주 명식 */
  #saju h2 { margin: 0 0 .3rem; font-size: .95rem; }
  #saju .sub { margin: 0 0 1rem; font-size: .72rem; opacity: .55; line-height: 1.5; }
  .saju-status { margin: .55rem 0 0; font-size: .56rem; line-height: 1.4; opacity: .42; }
  .saju-candidate + .saju-candidate { margin-top: 1rem; padding-top: 1rem;
                                     border-top: 1px solid light-dark(#1c273322, #dbe4ee22); }
  .saju-candidate-title { margin: 0 0 .55rem; font-size: .75rem; opacity: .62; }
  .saju-grid { display: grid; grid-template-columns: 3.2rem repeat(4, minmax(0, 1fr));
               border: 1px solid light-dark(#1c273322, #dbe4ee22); border-radius: .65rem;
               overflow: hidden; }
  .saju-cell { min-width: 0; overflow: hidden; padding: .55rem .15rem; text-align: center;
               border-right: 1px solid light-dark(#1c273318, #dbe4ee18);
               border-bottom: 1px solid light-dark(#1c273318, #dbe4ee18); }
  .saju-cell:nth-child(5n) { border-right: 0; }
  .saju-cell:nth-last-child(-n+5) { border-bottom: 0; }
  .saju-head, .saju-label { display: grid; place-items: center; font-size: .7rem; opacity: .58;
                            background: light-dark(#1c273307, #dbe4ee08); }
  .saju-char { display: block; font-family: serif; font-size: 1.55rem; line-height: 1.2; }
  .saju-korean { display: block; margin-top: .18rem; font-size: .72rem; }
  .saju-meta, .saju-god { display: block; margin-top: .12rem; font-size: .56rem;
                          line-height: 1.25; opacity: .52; white-space: normal; word-break: keep-all; }
  .saju-god { margin-top: .08rem; opacity: .7; }
  .saju-actions { display: flex; justify-content: flex-end; margin-top: .75rem; }
  .saju-copy { padding: .38rem .65rem; font-size: .7rem; }
  .saju-warning { margin: .8rem 0 0; padding: .65rem .75rem; border-radius: .5rem;
                  font-size: .73rem; line-height: 1.5;
                  background: light-dark(#d99a2614, #ffcf6b12); }
  @media (max-width: 390px) {
    body { padding: 1rem; }
    .card { padding: 1.15rem .9rem; }
    .saju-grid { grid-template-columns: 2.65rem repeat(4, minmax(0, 1fr)); }
    .saju-char { font-size: 1.4rem; }
    .saju-korean { font-size: .66rem; }
  }
</style>
</head>
<body>
<main>
  <header>
    <h1>🔮 오늘의 운세</h1>
    <p class="date" id="today"></p>
  </header>

  <!-- 랜덤 운세 -->
  <div class="card" id="fortune">
    <div class="emoji" id="f-emoji">🔮</div>
    <p class="text" id="f-text"></p>
    <div class="fortune-categories" id="f-categories" hidden>
      <div class="fortune-category" id="f-wealth"><span class="fortune-category-name">재물운</span><code class="fortune-category-level"></code><span class="fortune-category-comment"></span></div>
      <div class="fortune-category" id="f-career"><span class="fortune-category-name">직업운</span><code class="fortune-category-level"></code><span class="fortune-category-comment"></span></div>
      <div class="fortune-category" id="f-love"><span class="fortune-category-name">연애운</span><code class="fortune-category-level"></code><span class="fortune-category-comment"></span></div>
    </div>
    <p class="basis" id="f-basis" hidden></p>
  </div>
  <!-- 개인 운세 진입 -->
  <section id="reveal">
    <button class="link-btn" id="reveal-btn">나에게 맞는 운세를 보고싶다면? →</button>
  </section>

  <!-- 생년월일 입력 -->
  <section class="card" id="form" hidden>
    <h2 style="margin:0 0 1rem;font-size:.95rem;">생년월일시를 입력해주세요</h2>
    <div class="row">
      <label>달력</label>
      <div class="time-mode" role="group" aria-label="생년월일 달력 방식">
        <button type="button" id="mode-solar" aria-pressed="true">양력</button>
        <button type="button" id="mode-lunar" aria-pressed="false">음력</button>
      </div>
    </div>
    <div class="row">
      <label>성별</label>
      <div class="time-mode gender-mode" role="group" aria-label="성별">
        <button type="button" id="gender-none" aria-pressed="true">미선택</button>
        <button type="button" id="gender-male" aria-pressed="false">남</button>
        <button type="button" id="gender-female" aria-pressed="false">여</button>
      </div>
    </div>
    <div class="row">
      <label for="in-y">년</label>
      <select id="in-y"></select>
    </div>
    <div class="row">
      <label for="in-m">월</label>
      <select id="in-m"></select>
    </div>
    <div class="row">
      <label for="in-d">일</label>
      <select id="in-d"></select>
    </div>
    <div class="row" id="lunar-leap-row" hidden>
      <label for="in-lunar-leap">월 구분</label>
      <select id="in-lunar-leap">
        <option value="normal">평달</option>
        <option value="leap">윤달</option>
      </select>
    </div>
    <p class="time-help" id="lunar-help" hidden>윤달 생일인 경우에만 윤달을 선택하세요.</p>
    <div class="row">
      <label>시간</label>
      <div class="time-mode" role="group" aria-label="출생시간 입력 방식">
        <button type="button" id="mode-branch" aria-pressed="true">시진 · 자축인묘</button>
        <button type="button" id="mode-clock" aria-pressed="false">정확한 시각</button>
      </div>
    </div>
    <div class="row" id="branch-row">
      <label for="in-h">시진</label>
      <select id="in-h"></select>
    </div>
    <p class="time-help" id="branch-help">정확한 시각을 모르면 두 시간 단위의 시진을 선택하세요.</p>
    <div class="row" id="clock-row" hidden>
      <label for="in-time">시각</label>
      <input type="time" id="in-time" step="60">
    </div>
    <p class="time-help" id="clock-help" hidden>태어난 시각을 시·분까지 입력하세요.</p>
    <div class="form-actions">
      <button id="cancel">취소</button>
      <button id="save">내 운세 보기</button>
    </div>
    <p id="err"></p>
  </section>

  <!-- 사주 명식 -->
  <section class="card" id="saju" hidden>
    <button type="button" class="panel-toggle" aria-expanded="true" aria-controls="saju-content">
      <h2>🧭 사주 명식</h2><span class="panel-chevron" aria-hidden="true">▼</span>
    </button>
    <div class="panel-content" id="saju-content">
      <p class="sub" id="saju-rule">양력 · 대한민국 표준시(KST) · 00시 일주 변경 · 진태양시 미보정</p>
      <div id="saju-candidates"></div>
      <div class="saju-actions"><button type="button" class="saju-copy" id="saju-copy" disabled>명식 이미지 복사</button></div>
      <p class="saju-status" id="saju-status">명식을 계산하고 있습니다…</p>
      <p class="saju-warning" id="saju-warning" hidden></p>
    </div>
  </section>

  <!-- 바이오리듬 결과 -->
  <section class="card" id="result" hidden>
    <button type="button" class="panel-toggle" aria-expanded="true" aria-controls="bio-content">
      <h2>🌊 오늘의 바이오리듬</h2><span class="panel-chevron" aria-hidden="true">▼</span>
    </button>
    <div class="panel-content" id="bio-content">
      <p class="sub" id="bio-sub"></p>
      <p class="headline" id="bio-headline"></p>

    <div class="bio phy">
      <div class="bio-top"><span class="bio-name">신체 <small>Physical</small></span><span class="bio-pct" id="pct-phy"></span></div>
      <div class="track"><span class="mid"></span><span class="fill" id="fill-phy"></span></div>
      <p class="bio-note" id="note-phy"></p>
    </div>
    <div class="bio emo">
      <div class="bio-top"><span class="bio-name">감성 <small>Emotional</small></span><span class="bio-pct" id="pct-emo"></span></div>
      <div class="track"><span class="mid"></span><span class="fill" id="fill-emo"></span></div>
      <p class="bio-note" id="note-emo"></p>
    </div>
    <div class="bio int">
      <div class="bio-top"><span class="bio-name">지성 <small>Intellectual</small></span><span class="bio-pct" id="pct-int"></span></div>
      <div class="track"><span class="mid"></span><span class="fill" id="fill-int"></span></div>
      <p class="bio-note" id="note-int"></p>
    </div>

      <div class="footer">
        <p class="saved" id="saved-info"></p>
        <button class="link-btn" id="edit-btn">생년월일 다시 입력</button>
      </div>
    </div>
  </section>
</main>

<script>
  "use strict";
  const KEY = "bl-fortune-birth";

  // ── 랜덤 운세 문구 ─────────────────────────────────────────────
  const FORTUNES = [
    ["🌤️", "서두르지 않아도 괜찮아요. 오늘은 천천히 가도 도착합니다."],
    ["🍀", "생각지 못한 곳에서 작은 행운이 굴러옵니다. 주변을 살펴보세요."],
    ["🔥", "미뤄둔 일을 시작하기 딱 좋은 날. 첫 걸음이 제일 무겁습니다."],

    ["💬", "오늘의 대화 속에 답이 숨어 있어요. 귀를 기울여 보세요."],
    ["🌱", "지금 심은 씨앗은 훗날 큰 그늘이 됩니다. 조급해 마세요."],

    ["🎯", "집중력이 빛나는 날. 하나에만 몰두하면 크게 이룹니다."],

    ["🎁", "받는 것보다 주는 것이 더 큰 복이 되어 돌아오는 날."],

    ["🕊️", "묵은 감정을 흘려보내기 좋은 날. 용서는 나를 위한 선물입니다."],
    ["📮", "연락이 뜸했던 사람에게 먼저 손을 내밀어 보세요. 반가운 답이 옵니다."],
    ["🌸", "예상 밖의 칭찬을 듣게 됩니다. 겸손하되 마음껏 기뻐하세요."],
    ["🛟", "무리하지 마세요. 오늘의 최선은 '적당히'입니다."],
    ["🔑", "닫혀 있던 문이 열립니다. 준비된 자만이 그 문을 알아봅니다."],
    ["🌈", "흐린 아침이 맑은 오후로 바뀌듯, 기분도 점점 나아집니다."],
    ["🍜", "따뜻한 한 끼가 곧 보약. 잘 챙겨 먹는 것부터 시작하세요."],
    ["🎲", "작은 도전에 운이 따릅니다. 망설였던 그것, 오늘 해보세요."],
    ["🧩", "흩어져 있던 조각들이 맞춰지는 날. 인내가 곧 보상받습니다."],
    ["💛", "당신은 생각보다 많은 사람에게 소중한 존재입니다."],
    ["🌵", "버티는 것도 성장입니다. 오늘을 견딘 당신이 자랑스럽습니다."],
  ];

  const fEmoji = document.getElementById("f-emoji");
  const fText = document.getElementById("f-text");
  const fBasis = document.getElementById("f-basis");
  const fCategories = document.getElementById("f-categories");
  const fortuneCard = document.getElementById("fortune");

  // 오늘의 한줄: 무작위가 아니라 날짜(+생년월일·바이오리듬 수치)로 결정.
  // → 하루 동안 같은 문구가 유지되고, 사람마다 다르게 나온다.
  function todayNum() {
    return Math.floor(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate()) / 86400000);
  }
  function seedToIdx(seed) {
    let x = Math.sin(seed) * 10000;
    x -= Math.floor(x);
    return Math.floor(x * FORTUNES.length);
  }
  let currentLine = FORTUNES[0];   // 공유 이미지에서 재사용
  let fallbackFortuneSeed = 0;
  function showFortuneLoading() {
    fortuneCard.classList.add("is-loading");
    fortuneCard.setAttribute("aria-busy", "true");
    fEmoji.textContent = "";
    fText.textContent = "";
    fCategories.hidden = false;
    fBasis.hidden = true;
  }
  function showFortune(seed) {
    const i = seedToIdx(seed);
    currentLine = FORTUNES[i];
    fEmoji.textContent = currentLine[0];
    fText.textContent = currentLine[1];
    fCategories.hidden = true;
    fBasis.hidden = true;
    fortuneCard.classList.remove("is-loading");
    fortuneCard.removeAttribute("aria-busy");
  }
  function showFortuneCategory(key, category) {
    const row = document.getElementById(`f-${key}`);
    row.dataset.level = category.level;
    row.querySelector(".fortune-category-level").textContent = category.level;
    row.querySelector(".fortune-category-comment").textContent = category.comment;
  }
  function showSajuFortune(daily) {
    currentLine = [daily.emoji, daily.text];
    fEmoji.textContent = daily.emoji;
    fText.textContent = daily.text;
    for (const key of ["wealth", "career", "love"]) showFortuneCategory(key, daily.categories[key]);
    fCategories.hidden = false;
    fBasis.hidden = false;
    fBasis.textContent = `명식 일간 + 오늘 일진 ${daily.iljin}(${daily.iljinHanja}) · ${daily.tenGod} · ${daily.method}`;
    fortuneCard.classList.remove("is-loading");
    fortuneCard.removeAttribute("aria-busy");
  }

  // ── 날짜 표기 ─────────────────────────────────────────────────
  const now = new Date();
  const WD = ["일", "월", "화", "수", "목", "금", "토"];
  document.getElementById("today").textContent =
    `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일 (${WD[now.getDay()]})`;

  // ── 입력 폼 옵션 채우기 ────────────────────────────────────────
  const selY = document.getElementById("in-y");
  const selM = document.getElementById("in-m");
  const selD = document.getElementById("in-d");
  const selH = document.getElementById("in-h");
  const inTime = document.getElementById("in-time");
  const modeSolar = document.getElementById("mode-solar");
  const modeLunar = document.getElementById("mode-lunar");
  const genderNone = document.getElementById("gender-none");
  const genderMale = document.getElementById("gender-male");
  const genderFemale = document.getElementById("gender-female");
  const lunarLeapRow = document.getElementById("lunar-leap-row");
  const lunarLeap = document.getElementById("in-lunar-leap");
  const lunarHelp = document.getElementById("lunar-help");
  const modeBranch = document.getElementById("mode-branch");
  const modeClock = document.getElementById("mode-clock");
  const branchRow = document.getElementById("branch-row");
  const branchHelp = document.getElementById("branch-help");
  const clockRow = document.getElementById("clock-row");
  const clockHelp = document.getElementById("clock-help");
  let calendarMode = "solar";
  let genderMode = "unspecified";
  let timeMode = "branch";
  const thisYear = now.getFullYear();
  function opt(sel, val, label) {
    const o = document.createElement("option");
    o.value = val; o.textContent = label; sel.appendChild(o);
  }
  for (let y = thisYear; y >= 1920; y--) opt(selY, y, y + "년");
  for (let m = 1; m <= 12; m++) opt(selM, m, m + "월");
  function fillDays() {
    const y = +selY.value, m = +selM.value;
    const keep = selD.value;
    const days = calendarMode === "lunar" ? 30 : new Date(y, m, 0).getDate();
    selD.innerHTML = "";
    for (let d = 1; d <= days; d++) opt(selD, d, d + "일");
    if (keep && +keep <= days) selD.value = keep;
  }
  selY.addEventListener("change", fillDays);
  selM.addEventListener("change", fillDays);
  fillDays();
  function setCalendarMode(mode) {
    calendarMode = mode === "lunar" ? "lunar" : "solar";
    const isLunar = calendarMode === "lunar";
    modeSolar.setAttribute("aria-pressed", String(!isLunar));
    modeLunar.setAttribute("aria-pressed", String(isLunar));
    lunarLeapRow.hidden = !isLunar;
    lunarHelp.hidden = !isLunar;
    fillDays();

  modeSolar.addEventListener("click", () => setCalendarMode("solar"));
  modeLunar.addEventListener("click", () => setCalendarMode("lunar"));
  function setGenderMode(gender) {
    genderMode = ["male", "female"].includes(gender) ? gender : "unspecified";
    genderNone.setAttribute("aria-pressed", String(genderMode === "unspecified"));
    genderMale.setAttribute("aria-pressed", String(genderMode === "male"));
    genderFemale.setAttribute("aria-pressed", String(genderMode === "female"));
  }
  genderNone.addEventListener("click", () => setGenderMode("unspecified"));
  genderMale.addEventListener("click", () => setGenderMode("male"));
  genderFemale.addEventListener("click", () => setGenderMode("female"));
  // 십이지시(十二支時): 자시(23~01)부터 두 시간 단위
  const BRANCHES = [
    { k: "자", c: "子", range: "23~01시" },
    { k: "축", c: "丑", range: "01~03시" },
    { k: "인", c: "寅", range: "03~05시" },
    { k: "묘", c: "卯", range: "05~07시" },
    { k: "진", c: "辰", range: "07~09시" },
    { k: "사", c: "巳", range: "09~11시" },
    { k: "오", c: "午", range: "11~13시" },
    { k: "미", c: "未", range: "13~15시" },
    { k: "신", c: "申", range: "15~17시" },
    { k: "유", c: "酉", range: "17~19시" },
    { k: "술", c: "戌", range: "19~21시" },
    { k: "해", c: "亥", range: "21~23시" },
  ];
  opt(selH, "", "모름");
  BRANCHES.forEach((b, i) => opt(selH, i, `${b.k}시 (${b.c}, ${b.range})`));
  function setTimeMode(mode) {
    timeMode = mode === "clock" ? "clock" : "branch";
    const isClock = timeMode === "clock";
    modeBranch.setAttribute("aria-pressed", String(!isClock));
    modeClock.setAttribute("aria-pressed", String(isClock));
    branchRow.hidden = isClock;
    branchHelp.hidden = isClock;
    clockRow.hidden = !isClock;
    clockHelp.hidden = !isClock;
  }
  modeBranch.addEventListener("click", () => setTimeMode("branch"));
  modeClock.addEventListener("click", () => setTimeMode("clock"));

  // 23~01시는 자시, 이후에는 두 시간마다 축·인·묘…로 진행한다.
  function branchFromClock(value) {
    if (!/^\d{2}:\d{2}$/.test(value)) return null;
    const hour = +value.slice(0, 2);
    if (hour === 23 || hour === 0) return 0;
    return Math.floor((hour + 1) / 2);
  }
  // 기본값: 90년생 정도로 시작
  selY.value = "1990"; selM.value = "1"; fillDays(); selD.value = "1";

  // ── 바이오리듬 계산 ────────────────────────────────────────────
  const CYCLES = [
    { key: "phy", name: "신체", period: 23 },
    { key: "emo", name: "감성", period: 28 },
    { key: "int", name: "지성", period: 33 },
  ];
  function daysBetween(birth, today) {
    // 자정 기준 경과 일수 (시간 무시)
    const a = Date.UTC(birth.y, birth.m - 1, birth.d);
    const b = Date.UTC(today.getFullYear(), today.getMonth(), today.getDate());
    return Math.round((b - a) / 86400000);
  }
  // 값별 코멘트 (v: -1~1)
  function noteFor(name, v) {
    if (v >= 0.7) return `${name} 최고조! 자신 있게 밀어붙여도 좋은 날.`;
    if (v >= 0.2) return `${name}이(가) 상승세. 컨디션이 받쳐줍니다.`;
    if (v > -0.2) return `${name}이(가) 전환점. 무리 없이 평소대로.`;
    if (v > -0.7) return `${name}이(가) 저조. 욕심내지 말고 페이스 조절을.`;
    return `${name} 바닥권. 오늘은 회복과 휴식에 집중하세요.`;
  }
  function setBar(key, v) {
    const pct = Math.round(v * 100);
    document.getElementById("pct-" + key).textContent = (pct > 0 ? "+" : "") + pct + "%";
    // 바: 중앙(50%)이 0, 왼쪽이 -100, 오른쪽이 +100
    const fill = document.getElementById("fill-" + key);
    if (v >= 0) { fill.style.left = "50%"; fill.style.width = (v * 50) + "%"; }
    else { fill.style.left = (50 + v * 50) + "%"; fill.style.width = (-v * 50) + "%"; }
  }

  // ── 사주 명식 ──────────────────────────────────────────────────
  const sajuSec = document.getElementById("saju");
  const sajuCandidates = document.getElementById("saju-candidates");
  const sajuStatus = document.getElementById("saju-status");
  const sajuWarning = document.getElementById("saju-warning");
  const sajuCopy = document.getElementById("saju-copy");
  const SAJU_COLUMNS = [["hour", "시주"], ["day", "일주"], ["month", "월주"], ["year", "연주"]];
  let sajuRequestId = 0;
  let lastSajuData = null;

  function addSajuCell(grid, className, text) {
    const cell = document.createElement("div");
    cell.className = `saju-cell ${className}`;
    cell.textContent = text;
    grid.appendChild(cell);
    return cell;
  }

  function addPillarPart(grid, part) {
    const cell = addSajuCell(grid, "", "");
    if (!part) {
      cell.textContent = "미상";
      cell.style.opacity = ".45";
      return;
    }
    const char = document.createElement("span");
    char.className = "saju-char";
    char.textContent = part.hanja;
    const korean = document.createElement("span");
    korean.className = "saju-korean";
    korean.textContent = part.korean;
    const meta = document.createElement("span");
    meta.className = "saju-meta";
    meta.textContent = `${part.yinYang}·${part.element}`;
    cell.append(char, korean, meta);
    if (part.tenGod) {
      const god = document.createElement("span");
      god.className = "saju-god";
      god.textContent = part.tenGod;
      cell.appendChild(god);
    }
  }

  function renderSajuCandidate(candidate, showTitle) {
    const wrap = document.createElement("div");
    wrap.className = "saju-candidate";
    if (showTitle) {
      const title = document.createElement("p");
      title.className = "saju-candidate-title";
      title.textContent = candidate.timeLabel;
      wrap.appendChild(title);
    }
    const grid = document.createElement("div");
    grid.className = "saju-grid";
    addSajuCell(grid, "saju-head", "");
    for (const [, label] of SAJU_COLUMNS) addSajuCell(grid, "saju-head", label);
    addSajuCell(grid, "saju-label", "천간");
    for (const [key] of SAJU_COLUMNS) addPillarPart(grid, candidate.pillars[key]?.stem);
    addSajuCell(grid, "saju-label", "지지");
    for (const [key] of SAJU_COLUMNS) addPillarPart(grid, candidate.pillars[key]?.branch);
    wrap.appendChild(grid);
    sajuCandidates.appendChild(wrap);
  }

  async function renderSaju(birth) {
    const requestId = ++sajuRequestId;
    sajuSec.hidden = false;
    sajuCandidates.replaceChildren();
    lastSajuData = null;
    sajuCopy.disabled = true;
    sajuStatus.hidden = false;
    sajuStatus.textContent = "명식을 계산하고 있습니다…";
    sajuWarning.hidden = true;
    try {
      const response = await fetch("/_fortune/chart", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          year: birth.y, month: birth.m, day: birth.d,
          calendar: birth.calendar === "lunar" ? "lunar" : "solar",
          lunarLeap: birth.lunarLeap === true,
          gender: birth.gender,
          timeMode: birth.timeMode === "clock" ? "clock" : "branch",
          time: birth.time,
          branch: birth.h,
        }),
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "명식을 계산하지 못했습니다.");
      if (requestId !== sajuRequestId) return;
      lastSajuData = data;
      sajuCopy.disabled = false;
      if (birth.calendar === "lunar") {
        birth.solar = { y: data.solarDate.year, m: data.solarDate.month, d: data.solarDate.day };
        try { localStorage.setItem(KEY, JSON.stringify(birth)); } catch (e) {}
        renderBioResult(birth, birth.solar);
        document.getElementById("saju-rule").textContent =
          `음력 ${birth.lunarLeap ? "윤달" : "평달"} → 양력 ${data.solarDate.year}.${data.solarDate.month}.${data.solarDate.day} · 대한민국 표준시(KST) · 00시 일주 변경`;
      } else {
        document.getElementById("saju-rule").textContent =
          "양력 · 대한민국 표준시(KST) · 00시 일주 변경 · 진태양시 미보정";
      }
      if (data.dailyFortunes?.[0]) showSajuFortune(data.dailyFortunes[0]);
      for (const candidate of data.candidates) renderSajuCandidate(candidate, data.ambiguous);
      const verifyText = {
        verified: "KASI 일진 교차검증 완료",
        mismatch: "KASI 일진과 계산값이 달라 확인이 필요합니다",
        unavailable: "KASI 연결 없이 내장 정밀 만세력으로 계산했습니다",
        "not-configured": "내장 정밀 만세력으로 계산했습니다",
      }[data.verification?.status] || "내장 정밀 만세력으로 계산했습니다";
      sajuStatus.textContent = `${verifyText} · 계산 기준 ${data.rules.version}`;
      if (data.ambiguous) {
        sajuWarning.hidden = false;
        sajuWarning.textContent = `⚠️ ${data.ambiguityReason} 가능한 명식을 함께 표시했습니다.`;
      }
    } catch (error) {
      if (requestId !== sajuRequestId) return;
      sajuStatus.textContent = error.message || "명식을 계산하지 못했습니다.";
      showFortune(fallbackFortuneSeed);
      if (birth.calendar === "lunar" && !birth.solar) document.getElementById("form").hidden = false;
    }
  }

  function drawSajuCard(data) {
    const S = 2, W = 500, pad = 28, rowLabelW = 54;
    const cellW = (W - pad * 2 - rowLabelW) / 4;
    const candidateH = 248;
    const titleExtra = data.ambiguous ? 28 : 0;
    const H = 102 + data.candidates.length * (candidateH + titleExtra) + 34;
    const cv = document.createElement("canvas");
    cv.width = W * S; cv.height = H * S;
    const ctx = cv.getContext("2d");
    ctx.scale(S, S);
    const MONO = 'ui-monospace, "SF Mono", monospace';
    const SERIF = 'serif';
    const INK = "#dbe4ee", DIM = "rgba(219,228,238,.56)", LINE = "rgba(219,228,238,.15)";
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#182230"); g.addColorStop(1, "#10161f");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.textBaseline = "middle";
    ctx.fillStyle = INK; ctx.textAlign = "left"; ctx.font = `bold 20px ${MONO}`;
    ctx.fillText("🧭 사주 명식", pad, 34);
    ctx.fillStyle = DIM; ctx.font = `11px ${MONO}`;
    const calendarNote = data.inputCalendar === "lunar"
      ? `음력${data.inputDate.leap ? " 윤달" : " 평달"} → 양력 ${data.solarDate.year}.${data.solarDate.month}.${data.solarDate.day}`
      : "양력";
    ctx.fillText(`${calendarNote} · 대한민국 표준시(KST) · 00시 일주 변경`, pad, 60);
    let y = 84;

    const drawCell = (x, top, w, h, fill) => {
      ctx.fillStyle = fill || "rgba(219,228,238,.025)"; ctx.fillRect(x, top, w, h);
      ctx.strokeStyle = LINE; ctx.strokeRect(x, top, w, h);
    };
    const drawPart = (part, x, top, w, h) => {
      drawCell(x, top, w, h);
      ctx.textAlign = "center";
      if (!part) {
        ctx.fillStyle = DIM; ctx.font = `13px ${MONO}`; ctx.fillText("미상", x + w / 2, top + h / 2);
        return;
      }
      ctx.fillStyle = INK; ctx.font = `30px ${SERIF}`; ctx.fillText(part.hanja, x + w / 2, top + 31);
      ctx.font = `12px ${MONO}`; ctx.fillText(part.korean, x + w / 2, top + 59);
      ctx.fillStyle = DIM; ctx.font = `10px ${MONO}`;
      ctx.fillText(`${part.yinYang}·${part.element}`, x + w / 2, top + 78);
      if (part.tenGod) ctx.fillText(part.tenGod, x + w / 2, top + 94);
    };

    for (const candidate of data.candidates) {
      if (data.ambiguous) {
        ctx.fillStyle = DIM; ctx.textAlign = "left"; ctx.font = `11px ${MONO}`;
        ctx.fillText(candidate.timeLabel, pad, y + 10); y += 28;
      }
      const headH = 34, partH = 105;
      drawCell(pad, y, rowLabelW, headH, "rgba(219,228,238,.055)");
      SAJU_COLUMNS.forEach(([, label], i) => {
        const x = pad + rowLabelW + cellW * i;
        drawCell(x, y, cellW, headH, "rgba(219,228,238,.055)");
        ctx.fillStyle = DIM; ctx.textAlign = "center"; ctx.font = `11px ${MONO}`;
        ctx.fillText(label, x + cellW / 2, y + headH / 2);
      });
      ["stem", "branch"].forEach((partKey, row) => {
        const top = y + headH + partH * row;
        drawCell(pad, top, rowLabelW, partH, "rgba(219,228,238,.055)");
        ctx.fillStyle = DIM; ctx.textAlign = "center"; ctx.font = `11px ${MONO}`;
        ctx.fillText(row === 0 ? "천간" : "지지", pad + rowLabelW / 2, top + partH / 2);
        SAJU_COLUMNS.forEach(([key], i) => drawPart(
          candidate.pillars[key]?.[partKey], pad + rowLabelW + cellW * i, top, cellW, partH
        ));
      });
      y += candidateH;
    }
    ctx.fillStyle = "rgba(219,228,238,.5)"; ctx.textAlign = "center"; ctx.font = `bold 11px ${MONO}`;
    ctx.fillText("util.bubblelab.dev/fortune", W / 2, H - 19);
    return cv;
  }

  sajuCopy.addEventListener("click", async () => {
    if (!lastSajuData) return;
    const original = "명식 이미지 복사";
    try {
      if (!navigator.clipboard?.write || typeof ClipboardItem === "undefined") {
        throw new Error("이 브라우저에서는 이미지 복사를 지원하지 않습니다.");
      }
      const cv = drawSajuCard(lastSajuData);
      const blob = await new Promise((resolve) => cv.toBlob(resolve, "image/png"));
      if (!blob) throw new Error("이미지를 만들지 못했습니다.");
      await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
      sajuCopy.textContent = "복사됨 ✓";
    } catch (error) {
      sajuCopy.textContent = "복사 실패";
      sajuStatus.hidden = false;
      sajuStatus.textContent = error.message || "이미지를 복사하지 못했습니다.";
    } finally {
      setTimeout(() => { sajuCopy.textContent = original; }, 1800);
    }
  });

  let lastBio = null;   // { n, vals, head } — 공유 이미지에서 재사용
  function renderBioResult(birth, solarBirth) {
    document.getElementById("form").hidden = true;
    document.getElementById("reveal").hidden = true;
    const res = document.getElementById("result");
    res.hidden = false;

    const n = daysBetween(solarBirth, now);
    const vals = {};
    for (const c of CYCLES) {
      const v = Math.sin((2 * Math.PI * n) / c.period);
      vals[c.key] = v;
      setBar(c.key, v);
      document.getElementById("note-" + c.key).textContent = noteFor(c.name, v);
    }
    const avg = (vals.phy + vals.emo + vals.int) / 3;

    // 오늘의 한줄을 생년월일·바이오리듬 수치로 갱신 (하루 동안 고정)
    const seed = todayNum() + n +
      Math.round((vals.phy + vals.emo + vals.int) * 1000);
    fallbackFortuneSeed = seed;

    let head;
    if (avg >= 0.5) head = "✨ 세 리듬이 모두 좋은 날! 자신감을 가져도 좋습니다.";
    else if (avg >= 0.15) head = "🙂 전반적으로 순조로운 흐름. 무난하게 좋은 하루.";
    else if (avg > -0.15) head = "😌 균형 잡힌 날. 큰 기복 없이 차분하게 보내기 좋아요.";
    else if (avg > -0.5) head = "🌥️ 리듬이 다소 가라앉는 날. 무리하지 말고 쉬엄쉬엄.";
    else head = "🛌 컨디션 저점 구간. 오늘은 나를 아껴주는 하루로.";
    document.getElementById("bio-headline").textContent = head;

    document.getElementById("bio-sub").textContent = `태어난 지 ${n.toLocaleString()}일째`;

    const b = BRANCHES[birth.h];
    const hourTxt = birth.timeMode === "clock" && birth.time
      ? ` ${birth.time}`
      : (b ? ` ${b.k}시(${b.c})` : "");
    const dateTxt = birth.calendar === "lunar"
      ? `음력 ${birth.y}.${birth.m}.${birth.d} ${birth.lunarLeap ? "윤달" : "평달"} → 양력 ${solarBirth.y}.${solarBirth.m}.${solarBirth.d}`
      : `양력 ${birth.y}.${birth.m}.${birth.d}`;
    document.getElementById("saved-info").textContent =
      `저장됨: ${dateTxt}${hourTxt} · 이 기기에만 저장됩니다`;

    lastBio = { n, vals, head };   // 공유 이미지에서 재사용
  }

  function renderResult(birth) {
    document.getElementById("form").hidden = true;
    document.getElementById("reveal").hidden = true;
    showFortuneLoading();
    if (birth.calendar === "lunar") {
      if (birth.solar) renderBioResult(birth, birth.solar);
      else {
        lastBio = null;
        document.getElementById("result").hidden = true;
      }
    } else {
      renderBioResult(birth, birth);
    }
    renderSaju(birth);
  }

  // ── 저장/불러오기 ──────────────────────────────────────────────
  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return null;
      const o = JSON.parse(raw);
      if (o && o.y && o.m && o.d) return o;
    } catch (e) {}
    return null;
  }
  function fillForm(b) {
    if (!b) return;
    setCalendarMode(b.calendar === "lunar" ? "lunar" : "solar");
    setGenderMode(b.gender);
    selY.value = b.y; selM.value = b.m; fillDays(); selD.value = b.d;
    lunarLeap.value = b.lunarLeap ? "leap" : "normal";
    selH.value = (b.h == null || !BRANCHES[b.h]) ? "" : b.h;
    inTime.value = b.time || "";
    setTimeMode(b.timeMode === "clock" ? "clock" : "branch");
  }

  const revealSec = document.getElementById("reveal");
  const formSec = document.getElementById("form");
  const errEl = document.getElementById("err");

  document.getElementById("reveal-btn").addEventListener("click", () => {
    revealSec.hidden = true;
    formSec.hidden = false;
    errEl.textContent = "";
  });
  document.getElementById("cancel").addEventListener("click", () => {
    formSec.hidden = true;
    if (!load()) revealSec.hidden = false;
    else renderResult(load());
  });
  document.getElementById("edit-btn").addEventListener("click", () => {
    document.getElementById("result").hidden = true;
    sajuSec.hidden = true;
    sajuRequestId++;
    fillForm(load());
    formSec.hidden = false;
    errEl.textContent = "";
  });
  document.getElementById("save").addEventListener("click", () => {
    const y = +selY.value, m = +selM.value, d = +selD.value;
    const time = timeMode === "clock" ? inTime.value : "";
    if (timeMode === "clock" && !time) {
      errEl.textContent = "정확한 시각을 입력하거나 시진 입력을 선택해주세요.";
      return;
    }
    const h = timeMode === "clock"
      ? branchFromClock(time)
      : (selH.value === "" ? null : +selH.value);
    const birth = {
      y, m, d, calendar: calendarMode,
      lunarLeap: calendarMode === "lunar" && lunarLeap.value === "leap",
      gender: genderMode,
      timeMode, h, time: time || null,
    };
    // 미래 날짜 방어
    const bd = new Date(y, m - 1, d);
    if (calendarMode === "solar" && bd > now) { errEl.textContent = "미래 날짜는 입력할 수 없어요."; return; }
    errEl.textContent = "";
    try { localStorage.setItem(KEY, JSON.stringify(birth)); } catch (e) {}
    renderResult(birth);
  });

  document.querySelectorAll(".panel-toggle").forEach((toggle) => {
    toggle.addEventListener("click", () => {
      const content = document.getElementById(toggle.getAttribute("aria-controls"));
      const expanded = toggle.getAttribute("aria-expanded") === "true";
      toggle.setAttribute("aria-expanded", String(!expanded));
      content.hidden = expanded;
    });
  });

  // ── 초기 상태 ──────────────────────────────────────────────────
  const saved = load();
  if (saved) { fillForm(saved); renderResult(saved); }
  else { showFortune(todayNum()); }  // 생년월일 없으면 오늘 날짜 기준

  // ── 공유 ───────────────────────────────────────────────────────
  const dateStr = document.getElementById("today").textContent;

  // 공유 텍스트: 오늘의 문구를 항상 포함.
  // (생년월일 미입력자는 이 텍스트만, 입력자는 이미지와 함께 공유된다)
  window.blShareText = () => {
    const [emoji, text] = currentLine;
    return `🔮 오늘의 운세 · ${dateStr}\n${emoji} ${text}`;
  };

  // 공유 이미지: 생년월일을 입력해 바이오리듬이 있을 때만 생성.
  function rr(ctx, x, y, w, h, r) {
    r = Math.min(r, Math.abs(w) / 2, h / 2);
    if (w < 0) { x += w; w = -w; }
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(x, y, w, h, r);
    else {
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }
  }
  function wrapLines(ctx, text, maxW) {
    const lines = [];
    let cur = "";
    for (const ch of text) {
      const test = cur + ch;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = ch; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    return lines;
  }

  function drawCard() {
    const S = 2, W = 450, pad = 34, innerW = W - pad * 2;
    const MONO = 'ui-monospace, "SF Mono", monospace';
    const [emoji, text] = currentLine;
    const { vals, n, head } = lastBio;

    // 측정용 컨텍스트로 문구 줄바꿈 계산
    const meas = document.createElement("canvas").getContext("2d");
    meas.font = "19px " + MONO;
    const lines = wrapLines(meas, text, innerW);
    meas.font = "15px " + MONO;
    const headLines = wrapLines(meas, head, innerW);

    // 높이 계산
    let H = 34;             // top pad
    H += 26 + 20;           // title + date
    H += 30;                // gap
    H += 52;                // emoji
    H += lines.length * 28; // 문구
    H += 26;                // gap
    H += 1 + 26;            // divider + label
    H += CYCLES.length * 52;// 바 3개
    H += 16;                // gap
    H += headLines.length * 22;
    H += 26;                // gap
    H += 20;                // footer
    H += 30;                // bottom pad

    const cv = document.createElement("canvas");
    cv.width = W * S; cv.height = H * S;
    const ctx = cv.getContext("2d");
    ctx.scale(S, S);

    // 배경
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#141c27");
    g.addColorStop(1, "#0f151d");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    const INK = "#dbe4ee", DIM = "rgba(219,228,238,";
    ctx.textBaseline = "alphabetic";
    let y = 34;

    // 타이틀
    ctx.textAlign = "left";
    ctx.fillStyle = INK;
    ctx.font = "bold 20px " + MONO;
    y += 20;
    ctx.fillText("🔮 오늘의 운세", pad, y);
    ctx.fillStyle = DIM + "0.5)";
    ctx.font = "13px " + MONO;
    y += 20;
    ctx.fillText(`${dateStr} · 태어난 지 ${n.toLocaleString()}일째`, pad, y);

    // 오늘의 문구
    y += 30;
    ctx.textAlign = "center";
    ctx.font = "40px " + MONO;
    y += 40;
    ctx.fillText(emoji, W / 2, y);
    ctx.fillStyle = INK;
    ctx.font = "19px " + MONO;
    y += 12;
    for (const ln of lines) { y += 28; ctx.fillText(ln, W / 2, y); }

    // 구분선
    y += 26;
    ctx.fillStyle = DIM + "0.12)";
    ctx.fillRect(pad, y, innerW, 1);

    // 바이오리듬 라벨
    ctx.textAlign = "left";
    ctx.fillStyle = DIM + "0.7)";
    ctx.font = "bold 14px " + MONO;
    y += 26;
    ctx.fillText("🌊 오늘의 바이오리듬", pad, y);

    // 바 3개
    const COLORS = { phy: "#ff8a7a", emo: "#ffcf6b", int: "#6fd4ac" };
    for (const c of CYCLES) {
      const v = vals[c.key];
      ctx.fillStyle = INK;
      ctx.font = "13px " + MONO;
      ctx.textAlign = "left";
      ctx.fillText(c.name, pad, y + 26);
      const pct = Math.round(v * 100);
      ctx.fillStyle = DIM + "0.75)";
      ctx.textAlign = "right";
      ctx.fillText((pct > 0 ? "+" : "") + pct + "%", pad + innerW, y + 26);
      // 트랙
      const by = y + 34, barH = 8, half = innerW / 2;
      ctx.fillStyle = DIM + "0.10)";
      rr(ctx, pad, by, innerW, barH, 4); ctx.fill();
      ctx.fillStyle = DIM + "0.22)";
      ctx.fillRect(pad + half - 0.5, by - 2, 1, barH + 4);
      ctx.fillStyle = COLORS[c.key];
      if (v >= 0) { rr(ctx, pad + half, by, half * v, barH, 4); ctx.fill(); }
      else { rr(ctx, pad + half + half * v, by, -half * v, barH, 4); ctx.fill(); }
      y += 52;
    }

    // 종합 한줄
    y += 16;
    ctx.textAlign = "center";
    ctx.fillStyle = INK;
    ctx.font = "15px " + MONO;
    for (const ln of headLines) { y += 22; ctx.fillText(ln, W / 2, y); }

    // 푸터 (링크)
    y += 26;
    ctx.fillStyle = DIM + "0.72)";
    ctx.font = "bold 14px " + MONO;
    y += 10;
    ctx.fillText("👉 util.bubblelab.dev/fortune", W / 2, y);

    return cv;
  }

  window.blShareFiles = async () => {
    if (!load() || !lastBio) return null;   // 생년월일 없으면 이미지 없이 텍스트만
    try {
      const cv = drawCard();
      const blob = await new Promise((res) => cv.toBlob(res, "image/png"));
      if (!blob) return null;
      return [new File([blob], "오늘의운세.png", { type: "image/png" })];
    } catch (e) { return null; }
  };
</script>
<script defer src="/_shared/share.js"></script>
</body>
