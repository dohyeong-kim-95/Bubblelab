<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>📸 네컷사진</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>📸</text></svg>">
<style>
  :root { color-scheme: light dark; --bg: light-dark(#f2f4f7, #0d131c);
          --panel: light-dark(#fff, #171f2b); --line: light-dark(#d9e0e7, #2a3646);
          --text: light-dark(#1c2733, #e2e9f0); --muted: light-dark(#6e7985, #91a0b2);
          --accent: #df5f75; }
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100dvh; background: var(--bg); color: var(--text);
         font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
         user-select: none; -webkit-user-select: none; }
  button { font: inherit; color: inherit; cursor: pointer; border: 1px solid var(--line);
           background: light-dark(#fff, #111923); border-radius: .75rem; padding: .75rem 1rem; }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .42; cursor: default; }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
  .app { width: min(32rem, 100%); min-height: 100dvh; margin: 0 auto; padding: .8rem 1rem 1.5rem;
         display: flex; flex-direction: column; }
  header { height: 2.8rem; display: grid; grid-template-columns: 2.6rem 1fr 2.6rem;
           align-items: center; text-align: center; flex: none; }
  header h1 { margin: 0; font-size: 1rem; }
  #back { padding: .3rem; border: 0; background: transparent; font-size: 1.5rem; }
  #back[hidden] { visibility: hidden; display: block; }
  .step { display: none; flex: 1; min-height: 0; }
  .step.active { display: flex; flex-direction: column; animation: enter .22s ease-out; }
  @keyframes enter { from { opacity: 0; transform: translateX(12px); } }
  .center { justify-content: center; align-items: center; text-align: center; }
  .eyebrow { margin: 0 0 .45rem; color: var(--accent); font-size: .72rem; font-weight: bold; }
  h2 { margin: 0; font-size: 1.45rem; line-height: 1.35; }
  .desc { margin: .65rem 0 1.2rem; color: var(--muted); font-size: .78rem; line-height: 1.65; }
  .privacy { margin: .9rem 0 0; color: var(--muted); font-size: .68rem; line-height: 1.55; }

  .hero-strip { width: 7.2rem; aspect-ratio: 1/3; padding: .7rem; margin: 0 auto 1.2rem;
                background: #f7dce5; border-radius: .35rem; box-shadow: 0 12px 28px #0002;
                display: grid; grid-template-rows: repeat(4, 1fr); gap: .3rem;
                transform: rotate(-3deg); }
  .hero-strip span { display: block; border-radius: .15rem;
                     background: linear-gradient(135deg, #b8cfdf, #e6bbc6); }

  .progress { display: flex; justify-content: center; gap: .4rem; margin: .35rem 0 1rem; }
  .progress i { width: .45rem; height: .45rem; border-radius: 50%; background: var(--line); }
  .progress i.on { background: var(--accent); }
  .frame-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .65rem; width: 100%; }
  .frame-choice { padding: .6rem .35rem; color: var(--muted); font-size: .72rem; }
  .frame-choice.active { border-color: var(--accent); color: var(--accent); font-weight: bold; }
  .frame-mini { width: 3.7rem; aspect-ratio: 1/3; padding: .32rem; margin: 0 auto .45rem;
                border-radius: .2rem; background: var(--frame); display: grid;
                grid-template-rows: repeat(4, 1fr); gap: .14rem; border: 1px solid #8884; }
  .frame-mini span { background: linear-gradient(135deg, #a9c6d4, #dec0d1); border-radius: .08rem; }
  .frame-actions { margin-top: auto; padding-top: 1rem; display: grid; }

  .camera-box { position: relative; width: 100%; aspect-ratio: 3/2; overflow: hidden;
                border-radius: 1rem; background: #080b10; display: grid; place-items: center; }
  #camera { width: 100%; height: 100%; object-fit: cover; }
  #camera.mirror { transform: scaleX(-1); }
  #cameraEmpty { position: absolute; inset: 0; display: grid; place-items: center; padding: 1rem;
                 text-align: center; font-size: .78rem; color: #a9b4c1; }
  #cameraEmpty[hidden], #countdown[hidden] { display: none; }
  #countdown { position: absolute; inset: 0; display: grid; place-items: center; color: #fff;
               font-size: 5.5rem; font-weight: bold; text-shadow: 0 4px 18px #000b; }
  #flash { position: absolute; inset: 0; pointer-events: none; opacity: 0; background: #fff; }
  #flash.on { animation: flash .22s ease-out; }
  @keyframes flash { 25% { opacity: .95; } to { opacity: 0; } }
  #shotProgress { position: absolute; top: .55rem; right: .65rem; color: #fff; font-weight: bold;
                  font-size: .78rem; text-shadow: 0 2px 5px #000; }
  .shots { display: grid; grid-template-columns: repeat(4, 1fr); gap: .4rem; margin-top: .65rem; }
  .shot { aspect-ratio: 3/2; border-radius: .35rem; overflow: hidden; background: var(--line);
          border: 2px solid transparent; }
  .shot.filled { border-color: var(--accent); }
  .shot canvas { display: block; width: 100%; height: 100%; object-fit: cover; }
  .camera-status { min-height: 1.35em; margin: .6rem 0; text-align: center;
                   color: var(--muted); font-size: .72rem; }
  .camera-actions { display: grid; grid-template-columns: 1fr 1.25fr 1fr; gap: .45rem; }
  .camera-actions button { padding: .65rem .25rem; font-size: .72rem; }

  .review-list { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; margin-top: .9rem; }
  .review-shot { padding: 0; overflow: hidden; aspect-ratio: 3/2; border: 3px solid transparent; }
  .review-shot.active { border-color: var(--accent); }
  .review-shot canvas { display: block; width: 100%; height: 100%; }
  .review-actions { margin-top: auto; padding-top: .9rem; display: grid; grid-template-columns: 1fr 1.25fr; gap: .55rem; }

  .print-window { width: min(47vw, 10rem); height: min(64dvh, 31rem); overflow: hidden;
                  margin: .8rem auto; display: flex; justify-content: center; align-items: flex-start; }
  #finalCanvas { display: block; width: 100%; aspect-ratio: 1/3; box-shadow: 0 10px 26px #0003;
                 transform: translateY(-105%); }
  #finalCanvas.printing { animation: printout 1.65s cubic-bezier(.2,.75,.35,1) forwards; }
  @keyframes printout { to { transform: translateY(0); } }
  .result-actions { display: grid; grid-template-columns: 1.25fr 1fr; gap: .55rem;
                    width: 100%; opacity: 0; pointer-events: none; }
  .result-actions.ready { opacity: 1; pointer-events: auto; transition: opacity .3s; }
  #resultStatus { min-height: 1.25em; margin: .55rem 0 0; color: var(--muted); font-size: .7rem; }
  .restart { margin-top: .55rem; border: 0; background: transparent; color: var(--muted); font-size: .72rem; }
  @media (min-width: 48rem) { .app { padding-top: 1.2rem; } }
</style>
</head>
<body>
<main class="app">
  <header>
    <button id="back" type="button" aria-label="이전 단계" hidden>‹</button>
    <h1>📸 Bubblelab 네컷사진</h1>
    <span></span>
  </header>

  <section class="step active center" data-step="welcome">
    <div class="hero-strip"><span></span><span></span><span></span><span></span></div>
    <p class="eyebrow">FOUR CUT PHOTO</p>
    <h2>우리만의 순간을<br>네 컷에 담아보세요</h2>
    <p class="desc">프레임을 고르고 3초 간격으로 촬영합니다.<br>사진은 기기 밖으로 전송되지 않습니다.</p>
    <button class="primary" id="begin" type="button">촬영 시작</button>
  </section>

  <section class="step" data-step="frame">
    <div class="progress"><i class="on"></i><i></i><i></i><i></i></div>
    <p class="eyebrow">STEP 1</p>
    <h2>프레임을 골라주세요</h2>
    <p class="desc">모든 프레임은 실제 포토부스 규격인 1:3 스트립입니다.</p>
    <div class="frame-grid" id="frameGrid"></div>
    <div class="frame-actions"><button class="primary" id="frameNext" type="button">이 프레임으로 촬영</button></div>
  </section>

  <section class="step" data-step="camera">
    <div class="progress"><i class="on"></i><i class="on"></i><i></i><i></i></div>
    <p class="eyebrow">STEP 2 · 3초 간격 자동 촬영</p>
    <div class="camera-box">
      <video id="camera" autoplay muted playsinline></video>
      <div id="cameraEmpty">카메라를 켜주세요.</div>
      <div id="countdown" hidden></div>
      <div id="flash"></div>
      <div id="shotProgress">0 / 4</div>
    </div>
    <div class="shots" id="shotRail"></div>
    <p class="camera-status" id="cameraStatus"></p>
    <div class="camera-actions">
      <button id="cameraStart" type="button">카메라 켜기</button>
      <button class="primary" id="shoot" type="button" disabled>네컷 촬영</button>
      <button id="cameraSwitch" type="button" disabled>전환</button>
    </div>
  </section>

  <section class="step" data-step="review">
    <div class="progress"><i class="on"></i><i class="on"></i><i class="on"></i><i></i></div>
    <p class="eyebrow">STEP 3</p>
    <h2>네 컷을 확인해주세요</h2>
    <p class="desc">다시 찍을 사진을 고르거나 바로 출력할 수 있습니다.</p>
    <div class="review-list" id="reviewList"></div>
    <div class="review-actions">
      <button id="retake" type="button">선택 컷 재촬영</button>
      <button class="primary" id="print" type="button">이대로 출력</button>
    </div>
  </section>

  <section class="step center" data-step="result">
    <div class="progress"><i class="on"></i><i class="on"></i><i class="on"></i><i class="on"></i></div>
    <p class="eyebrow">STEP 4 · PRINTING</p>
    <div class="print-window"><canvas id="finalCanvas" width="1200" height="3600"></canvas></div>
    <div class="result-actions" id="resultActions">
      <button class="primary" id="download" type="button">PNG 저장</button>
      <button id="share" type="button">공유</button>
    </div>
    <p id="resultStatus" role="status"></p>
    <button class="restart" id="restart" type="button">처음부터 다시 찍기</button>
  </section>
</main>

<script>
const OUTPUT_W = 1200, OUTPUT_H = 3600;
const SLOTS = [0, 1, 2, 3].map((i) => ({ x: 72, y: 230 + i * 760, w: 1056, h: 704 }));
const photos = [null, null, null, null];
let frameIndex = 0, reviewIndex = 0, retakeIndex = -1;
let stream = null, facingMode = "user", shooting = false, currentStep = "welcome";

const videoEl = document.getElementById("camera");
const cameraEmptyEl = document.getElementById("cameraEmpty");
const cameraStatusEl = document.getElementById("cameraStatus");
const countdownEl = document.getElementById("countdown");
const shotProgressEl = document.getElementById("shotProgress");
const finalCanvas = document.getElementById("finalCanvas");
const finalCtx = finalCanvas.getContext("2d");
const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

function dateText() {
  const d = new Date();
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
}

const FRAMES = [
  { id: "cream", name: "크림", color: "#f7f0df", text: "#342e2a",
    title: "FOUR LITTLE MOMENTS" },
  { id: "midnight", name: "미드나잇", color: "#141923", text: "#f3f6fa",
    title: "NIGHT CUT" },
  { id: "pink", name: "포토 스트립", color: "#f7dce5", text: "#8e3e59",
    title: "♡  OUR FOUR CUTS  ♡" },
];

function go(step) {
  currentStep = step;
  document.querySelectorAll(".step").forEach((el) => el.classList.toggle("active", el.dataset.step === step));
  document.getElementById("back").hidden = step === "welcome" || shooting;
  scrollTo({ top: 0, behavior: "smooth" });
}

document.getElementById("begin").addEventListener("click", () => go("frame"));
document.getElementById("back").addEventListener("click", () => {
  if (shooting) return;
  if (currentStep === "frame") go("welcome");
  else if (currentStep === "camera") { stopCamera(); go(photos.every(Boolean) ? "review" : "frame"); }
  else if (currentStep === "review") go("frame");
  else if (currentStep === "result") go("review");
});

FRAMES.forEach((frame, index) => {
  const button = document.createElement("button");
  button.type = "button"; button.className = "frame-choice";
  button.innerHTML = `<span class="frame-mini" style="--frame:${frame.color}"><span></span><span></span><span></span><span></span></span>${frame.name}`;
  button.addEventListener("click", () => {
    frameIndex = index;
    document.querySelectorAll(".frame-choice").forEach((b, i) => b.classList.toggle("active", i === index));
  });
  document.getElementById("frameGrid").appendChild(button);
});
document.querySelector(".frame-choice").classList.add("active");
document.getElementById("frameNext").addEventListener("click", () => { retakeIndex = -1; resetCameraScreen(); go("camera"); });

function buildPhotoViews() {
  const rail = document.getElementById("shotRail");
  const review = document.getElementById("reviewList");
  rail.innerHTML = ""; review.innerHTML = "";
  for (let i = 0; i < 4; i++) {
    const thumb = document.createElement("div"); thumb.className = "shot";
    const thumbCanvas = document.createElement("canvas"); thumbCanvas.width = 300; thumbCanvas.height = 200;
    thumb.appendChild(thumbCanvas); rail.appendChild(thumb);

    const button = document.createElement("button"); button.type = "button"; button.className = "review-shot";
    const reviewCanvas = document.createElement("canvas"); reviewCanvas.width = 600; reviewCanvas.height = 400;
    button.appendChild(reviewCanvas);
    button.addEventListener("click", () => { reviewIndex = i; updatePhotoViews(); });
    review.appendChild(button);
  }
}

function drawSource(canvas, source) {
  const c = canvas.getContext("2d"); c.clearRect(0, 0, canvas.width, canvas.height);
  if (source) c.drawImage(source, 0, 0, canvas.width, canvas.height);
}

function updatePhotoViews() {
  [...document.querySelectorAll(".shot")].forEach((el, i) => {
    el.classList.toggle("filled", !!photos[i]); drawSource(el.querySelector("canvas"), photos[i]);
  });
  [...document.querySelectorAll(".review-shot")].forEach((el, i) => {
    el.classList.toggle("active", i === reviewIndex); drawSource(el.querySelector("canvas"), photos[i]);
  });
  shotProgressEl.textContent = `${photos.filter(Boolean).length} / 4`;
}

buildPhotoViews(); updatePhotoViews();

async function startCamera() {
  if (stream) return true;
  if (!navigator.mediaDevices?.getUserMedia) {
    cameraStatusEl.textContent = "이 브라우저는 카메라 촬영을 지원하지 않습니다."; return false;
  }
  cameraStatusEl.textContent = "카메라 권한을 확인하는 중…";
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 1920 }, height: { ideal: 1280 } }, audio: false,
    });
    videoEl.srcObject = stream; await videoEl.play();
    videoEl.classList.toggle("mirror", facingMode === "user"); cameraEmptyEl.hidden = true;
    document.getElementById("cameraStart").disabled = true;
    document.getElementById("cameraStart").textContent = "카메라 켜짐";
    document.getElementById("shoot").disabled = false;
    document.getElementById("cameraSwitch").disabled = false;
    cameraStatusEl.textContent = retakeIndex >= 0 ? `${retakeIndex + 1}번째 컷을 다시 촬영합니다.` : "준비되면 네컷 촬영을 눌러주세요.";
    return true;
  } catch (err) {
    cameraStatusEl.textContent = err?.name === "NotAllowedError"
      ? "카메라 권한이 필요합니다. 브라우저 설정에서 허용해주세요."
      : "카메라를 열지 못했습니다. 기본 브라우저에서 시도해주세요.";
    return false;
  }
}

function stopCamera() {
  stream?.getTracks().forEach((track) => track.stop()); stream = null; videoEl.srcObject = null;
  cameraEmptyEl.hidden = false;
  document.getElementById("cameraStart").disabled = false;
  document.getElementById("cameraStart").textContent = "카메라 켜기";
  document.getElementById("shoot").disabled = true;
  document.getElementById("cameraSwitch").disabled = true;
}

function resetCameraScreen() {
  stopCamera(); countdownEl.hidden = true;
  document.getElementById("shoot").textContent = retakeIndex >= 0 ? "선택 컷 촬영" : "네컷 촬영";
  cameraStatusEl.textContent = retakeIndex >= 0 ? `${retakeIndex + 1}번째 컷 재촬영` : "카메라를 켜주세요.";
  updatePhotoViews();
}

function captureFrame() {
  const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
  if (!vw || !vh) throw new Error("camera not ready");
  const targetRatio = 3 / 2;
  let sx = 0, sy = 0, sw = vw, sh = vh;
  if (vw / vh > targetRatio) { sw = vh * targetRatio; sx = (vw - sw) / 2; }
  else { sh = vw / targetRatio; sy = (vh - sh) / 2; }
  const output = document.createElement("canvas"); output.width = 1800; output.height = 1200;
  const c = output.getContext("2d");
  if (facingMode === "user") { c.translate(output.width, 0); c.scale(-1, 1); }
  c.drawImage(videoEl, sx, sy, sw, sh, 0, 0, output.width, output.height);
  return output;
}

async function takeOne(index) {
  for (let n = 3; n >= 1; n--) {
    countdownEl.textContent = String(n); countdownEl.hidden = false;
    cameraStatusEl.textContent = `${index + 1}번째 컷 · ${n}초`;
    await wait(1000);
  }
  countdownEl.hidden = true;
  const flash = document.getElementById("flash"); flash.classList.remove("on");
  void flash.offsetWidth; flash.classList.add("on");
  photos[index] = captureFrame(); updatePhotoViews(); await wait(250);
}

async function shoot() {
  if (shooting || !stream) return;
  shooting = true; document.getElementById("back").hidden = true;
  document.getElementById("shoot").disabled = true; document.getElementById("cameraSwitch").disabled = true;
  try {
    if (retakeIndex >= 0) await takeOne(retakeIndex);
    else for (let i = 0; i < 4; i++) await takeOne(i);
    reviewIndex = retakeIndex >= 0 ? retakeIndex : 0; retakeIndex = -1;
    stopCamera(); updatePhotoViews(); go("review");
  } catch (_) {
    cameraStatusEl.textContent = "촬영 중 문제가 생겼습니다. 다시 시도해주세요.";
  } finally {
    shooting = false; document.getElementById("back").hidden = false;
  }
}

document.getElementById("cameraStart").addEventListener("click", startCamera);
document.getElementById("shoot").addEventListener("click", shoot);
document.getElementById("cameraSwitch").addEventListener("click", async () => {
  if (shooting) return; stopCamera(); facingMode = facingMode === "user" ? "environment" : "user"; await startCamera();
});
document.getElementById("retake").addEventListener("click", () => {
  retakeIndex = reviewIndex; resetCameraScreen(); go("camera");
});
addEventListener("pagehide", stopCamera);

function paintFinal() {
  const frame = FRAMES[frameIndex];
  finalCtx.fillStyle = frame.color; finalCtx.fillRect(0, 0, OUTPUT_W, OUTPUT_H);
  for (let i = 0; i < 4; i++) {
    const s = SLOTS[i]; finalCtx.drawImage(photos[i], s.x, s.y, s.w, s.h);
  }
  finalCtx.fillStyle = frame.text; finalCtx.textAlign = "center";
  finalCtx.font = "bold 38px ui-monospace, monospace"; finalCtx.fillText(frame.title, OUTPUT_W / 2, 105);
  finalCtx.font = "26px ui-monospace, monospace"; finalCtx.fillText(dateText(), OUTPUT_W / 2, 3400);
  finalCtx.globalAlpha = .58; finalCtx.font = "22px ui-monospace, monospace";
  finalCtx.fillText("BUBBLELAB PHOTO", OUTPUT_W / 2, 3470); finalCtx.globalAlpha = 1;
  if (frame.id === "midnight") {
    finalCtx.strokeStyle = frame.text; finalCtx.lineWidth = 3; finalCtx.strokeRect(35, 35, OUTPUT_W - 70, OUTPUT_H - 70);
  }
}

document.getElementById("print").addEventListener("click", async () => {
  if (!photos.every(Boolean)) return;
  paintFinal(); go("result");
  const actions = document.getElementById("resultActions"); actions.classList.remove("ready");
  finalCanvas.classList.remove("printing"); void finalCanvas.offsetWidth; finalCanvas.classList.add("printing");
  await wait(1750); actions.classList.add("ready");
});

function makeFile() {
  const dataUrl = finalCanvas.toDataURL("image/png");
  const binary = atob(dataUrl.slice(dataUrl.indexOf(",") + 1));
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new File([bytes], `bubblelab-fourcut-${dateText().replaceAll(".", "-")}.png`, { type: "image/png" });
}

document.getElementById("download").addEventListener("click", () => {
  try {
    const file = makeFile(), url = URL.createObjectURL(file);
    const a = document.createElement("a"); a.href = url; a.download = file.name;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(() => URL.revokeObjectURL(url), 5000);
    document.getElementById("resultStatus").textContent = "PNG 다운로드를 요청했습니다.";
  } catch (_) { document.getElementById("resultStatus").textContent = "이미지를 저장하지 못했습니다."; }
});

const shareButton = document.getElementById("share");
const canShare = (() => {
  try { return typeof navigator.share === "function" && typeof navigator.canShare === "function"
    && navigator.canShare({ files: [new File([""], "photo.png", { type: "image/png" })] }); }
  catch (_) { return false; }
})();
shareButton.hidden = !canShare;
if (!canShare) document.getElementById("resultActions").style.gridTemplateColumns = "1fr";
shareButton.addEventListener("click", () => {
  try {
    navigator.share({ title: "Bubblelab 네컷사진", files: [makeFile()] })
      .catch((err) => { if (err?.name !== "AbortError") document.getElementById("resultStatus").textContent = "공유 메뉴를 열지 못했습니다."; });
  } catch (_) { document.getElementById("resultStatus").textContent = "이미지를 공유하지 못했습니다."; }
});

document.getElementById("restart").addEventListener("click", () => {
  stopCamera(); photos.fill(null); frameIndex = 0; reviewIndex = 0; retakeIndex = -1;
  document.querySelectorAll(".frame-choice").forEach((b, i) => b.classList.toggle("active", i === 0));
  updatePhotoViews(); finalCanvas.classList.remove("printing");
  document.getElementById("resultActions").classList.remove("ready");
  document.getElementById("resultStatus").textContent = ""; go("welcome");
});
</script>
</body>
</html>
