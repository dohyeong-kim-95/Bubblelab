<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>달력</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='13' font-size='13'>📅</text></svg>">
<style>
  :root { color-scheme: light dark; }
  body { font-family: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace;
         margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
         background: light-dark(#eef2f6, #10161f);
         color: light-dark(#1c2733, #dbe4ee); }
  main { padding: 1.5rem; width: min(26rem, 100%); box-sizing: border-box;
         /* 저장 이미지와 같은 비례: 셀 폭 기준으로 모든 크기를 계산 */
         --cell: calc((min(26rem, 100vw) - 3rem) / 7); }
  header { text-align: center; margin-bottom: calc(var(--cell) * .45); }
  #year { margin: 0; opacity: .6; font-size: calc(var(--cell) * .3); }
  #month { margin: 0; font-weight: bold; font-size: calc(var(--cell) * .62);
           letter-spacing: .02em; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed;
          font-variant-numeric: tabular-nums; }
  th { font-weight: normal; opacity: .5; font-size: calc(var(--cell) * .21);
       padding-bottom: calc(var(--cell) * .3); }
  th.sun, th.sat { opacity: .9; }
  td { text-align: center; padding: 0; height: calc(var(--cell) * 1.05);
       font-size: calc(var(--cell) * .3); position: relative; z-index: 0; }
  .sun { color: light-dark(#c0392b, #ff8a7a); }
  .sat { color: light-dark(#2563ab, #8ab8ff); }
  .today { position: relative; font-weight: bold;
           color: light-dark(#fff, #10161f); }
  .today::before { content: ""; position: absolute; inset: 50% auto auto 50%;
                   width: 2.1em; height: 2.1em; border-radius: 50%;
                   transform: translate(-50%, -50%); z-index: -1;
                   background: light-dark(#1c2733, #dbe4ee); }
  #actions { text-align: center; margin-top: 1.6rem; }
  button { font: inherit; color: inherit; background: none; cursor: pointer;
           padding: .55rem 1.1rem; border-radius: .5rem;
           border: 1px solid light-dark(#1c273355, #dbe4ee55); }
  button:hover:not(:disabled) { background: light-dark(#1c273310, #dbe4ee14); }
  button:disabled { opacity: .5; cursor: default; }
  #panel { margin-top: 1.2rem; display: flex; flex-direction: column; gap: .9rem;
           align-items: center; padding: 1.1rem;
           border: 1px solid light-dark(#1c273322, #dbe4ee22); border-radius: .75rem; }
  #panel[hidden] { display: none; }
  #preview { width: 9.5rem; height: auto; border-radius: .6rem;
             border: 1px solid light-dark(#1c273333, #dbe4ee33); }
  .ctl { display: flex; align-items: center; gap: .7rem; width: 100%;
         font-size: .85rem; }
  .ctl > label { width: 4.5rem; text-align: right; opacity: .6; flex: none; }
  .ctl > select, .ctl > input[type=range] { flex: 1; min-width: 0; }
  select { font: inherit; font-size: .85rem; color: inherit;
           background: light-dark(#eef2f6, #10161f);
           border: 1px solid light-dark(#1c273355, #dbe4ee55);
           border-radius: .4rem; padding: .3rem .4rem; }
  input[type=range] { accent-color: light-dark(#1c2733, #dbe4ee); }
  #err { min-height: 1.2em; margin: 0; font-size: .85rem;
         color: light-dark(#c0392b, #ff8a7a); }
  #save-hint { margin: -.25rem 0 0; font-size: .78rem; opacity: .65;
               text-align: center; line-height: 1.5; }
  #save-hint[hidden] { display: none; }
</style>
</head>
<body>
<main>
  <header>
    <p id="year"></p>
    <h1 id="month">📅</h1>
  </header>
  <table>
    <thead>
      <tr>
        <th class="sun">SUN</th><th>MON</th><th>TUE</th><th>WED</th><th>THU</th>
        <th>FRI</th><th class="sat">SAT</th>
      </tr>
    </thead>
    <tbody id="days"></tbody>
  </table>
  <div id="actions">
    <button id="save" type="button" aria-expanded="false" aria-controls="panel"
            aria-label="휴대폰 배경화면 만들기 열기">휴대폰 배경화면 저장</button>
    <div id="panel" hidden>
      <canvas id="preview" role="img" aria-label="배경화면 미리보기"></canvas>
      <div class="ctl">
        <label for="device">기종</label>
        <select id="device" aria-label="휴대폰 기종 선택"></select>
      </div>
      <div class="ctl">
        <label for="cal-size">달력 크기</label>
        <input type="range" id="cal-size" min="40" max="95" value="60"
               aria-label="달력 크기 조절">
      </div>
      <div class="ctl">
        <label for="cal-pos">세로 위치</label>
        <input type="range" id="cal-pos" min="30" max="80" value="55"
               aria-label="달력 세로 위치 조절">
      </div>
      <button id="download" type="button"
              aria-label="배경화면 PNG 이미지 다운로드">PNG 다운로드</button>
      <p id="save-hint" hidden>공유 메뉴에서 ‘이미지 저장’을 선택하세요.</p>
      <p id="err" role="alert"></p>
    </div>
  </div>
</main>
<script>
const now = new Date();

// 월별 날짜 데이터: 7칸짜리 주 배열 (빈 칸은 null)
function monthData(y, m) {
  const firstDow = new Date(y, m, 1).getDay();
  const lastDate = new Date(y, m + 1, 0).getDate();
  const weeks = [];
  let week = new Array(firstDow).fill(null);
  for (let d = 1; d <= lastDate; d++) {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length) { while (week.length < 7) week.push(null); weeks.push(week); }
  return { y, m, weeks };
}

// 현재 활성 테마의 색상 (CSS의 light-dark() 값과 동일하게 유지)
function themeColors() {
  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  return dark
    ? { bg: "#10161f", fg: "#dbe4ee", sun: "#ff8a7a", sat: "#8ab8ff" }
    : { bg: "#eef2f6", fg: "#1c2733", sun: "#c0392b", sat: "#2563ab" };
}

const MONTHS_EN = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
                   "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
const DOW_EN = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

const cal = monthData(now.getFullYear(), now.getMonth());
const today = now.getDate();

// ---- 화면 달력 (저장 이미지와 같은 구성: 연도 / 영문 월 / 영문 요일) ----
document.getElementById("year").textContent = cal.y;
document.getElementById("month").textContent = MONTHS_EN[cal.m];
document.title = `${cal.y}년 ${cal.m + 1}월 달력`;

const tbody = document.getElementById("days");
for (const week of cal.weeks) {
  const row = tbody.insertRow();
  week.forEach((d, dow) => {
    const cell = row.insertCell();
    if (d === null) return;
    cell.textContent = d;
    if (dow === 0) cell.classList.add("sun");
    if (dow === 6) cell.classList.add("sat");
    if (d === today) cell.classList.add("today");
  });
}

window.blShareText = () => `📅 ${cal.y}년 ${cal.m + 1}월 달력 — util.bubblelab.dev/calendar`;

// ---- 배경화면 PNG ----
// 기종 해상도 자동 인식: 모바일 세로 화면일 때만 신뢰한다
function detectDevice() {
  const dpr = devicePixelRatio || 1;
  const w = Math.round(screen.width * dpr), h = Math.round(screen.height * dpr);
  const mobile = /Android|iPhone|iPod|Mobile/i.test(navigator.userAgent);
  if (mobile && h > w && w >= 640 && w <= 2200 && h <= 4400) return { w, h };
  return null;
}

const DEVICE_PRESETS = [
  ["Galaxy S26", 1080, 2340],
  ["Galaxy S26+ / Ultra", 1440, 3120],
  ["iPhone Pro Max", 1290, 2796],
  ["iPhone / Pro", 1179, 2556],
];

// 배경화면 렌더링. 오늘 날짜 강조 없음(정적 이미지이므로).
// opt: { w, h, scale(달력 폭 비율 0~1), pos(달력 세로 중심 0~1) }
// 상단 20%는 시계·알림용 안전 영역으로 항상 비워 둔다.
function drawWallpaper(canvas, data, c, opt) {
  const W = opt.w, H = opt.h;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const mono = 'ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Consolas, monospace';

  ctx.fillStyle = c.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  const bw = W * opt.scale;          // 달력 블록 너비
  const cell = bw / 7;
  const rows = data.weeks.length;
  const rowH = cell * 1.05;
  const yearH = cell * 0.55, monthH = cell * 1.15, dowH = cell * 0.85;
  const blockH = yearH + monthH + dowH + rowH * rows;

  const minTop = H * 0.2;
  const maxTop = Math.max(minTop, H - blockH - H * 0.04);
  const top = Math.min(Math.max(H * opt.pos - blockH / 2, minTop), maxTop);
  const left = (W - bw) / 2;
  const colX = (i) => left + cell * (i + .5);

  let y = top;
  ctx.fillStyle = c.fg;
  ctx.globalAlpha = .6;
  ctx.font = `${cell * 0.30}px ${mono}`;
  ctx.fillText(String(data.y), W / 2, y + yearH / 2);
  y += yearH;

  ctx.globalAlpha = 1;
  ctx.font = `bold ${cell * 0.62}px ${mono}`;
  ctx.fillText(MONTHS_EN[data.m], W / 2, y + monthH / 2);
  y += monthH;

  ctx.font = `${cell * 0.21}px ${mono}`;
  DOW_EN.forEach((name, i) => {
    ctx.fillStyle = i === 0 ? c.sun : i === 6 ? c.sat : c.fg;
    ctx.globalAlpha = (i === 0 || i === 6) ? .9 : .5;
    ctx.fillText(name, colX(i), y + dowH / 2);
  });
  ctx.globalAlpha = 1;
  y += dowH;

  ctx.font = `${cell * 0.30}px ${mono}`;
  data.weeks.forEach((week, r) => {
    week.forEach((d, i) => {
      if (d === null) return;
      ctx.fillStyle = i === 0 ? c.sun : i === 6 ? c.sat : c.fg;
      ctx.fillText(String(d), colX(i), y + rowH * r + rowH / 2);
    });
  });

  return { cell, colX, gridTop: y, rowH, top, blockH };
}

function downloadCanvasPng(canvas, filename, done) {
  canvas.toBlob((blob) => {
    if (!blob) { done(new Error("PNG 인코딩 실패")); return; }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 5000);
    done(null);
  }, "image/png");
}

// iOS에서는 <a download>가 사진 앱 저장을 보장하지 않는다.
// 사용자 탭의 활성 상태를 유지하기 위해 PNG File을 동기 생성해 공유 시트를 연다.
function canvasPngFile(canvas, filename) {
  const dataUrl = canvas.toDataURL("image/png");
  const base64 = dataUrl.slice(dataUrl.indexOf(",") + 1);
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new File([bytes], filename, { type: "image/png" });
}

function isAppleMobile() {
  return /iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
}

// ---- 미리보기 패널 ----
const saveBtn = document.getElementById("save");
const panel = document.getElementById("panel");
const previewCv = document.getElementById("preview");
const deviceSel = document.getElementById("device");
const sizeInput = document.getElementById("cal-size");
const posInput = document.getElementById("cal-pos");
const dlBtn = document.getElementById("download");
const saveHintEl = document.getElementById("save-hint");
const errEl = document.getElementById("err");
const appleMobile = isAppleMobile();
const appleFileShare = appleMobile
  && typeof navigator.share === "function"
  && typeof navigator.canShare === "function"
  && navigator.canShare({ files: [new File([""], "calendar.png", { type: "image/png" })] });

if (appleFileShare) {
  dlBtn.textContent = "사진 앱에 저장";
  dlBtn.setAttribute("aria-label", "배경화면 PNG 이미지를 사진 앱에 저장");
  saveHintEl.hidden = false;
} else if (appleMobile) {
  saveHintEl.textContent = "다운로드 후 파일 앱의 다운로드 폴더에서 확인하세요.";
  saveHintEl.hidden = false;
}

const detected = detectDevice();
if (detected) {
  const opt = document.createElement("option");
  opt.value = `${detected.w}x${detected.h}`;
  opt.textContent = `내 기기 (${detected.w}×${detected.h})`;
  deviceSel.appendChild(opt);
}
for (const [name, w, h] of DEVICE_PRESETS) {
  const opt = document.createElement("option");
  opt.value = `${w}x${h}`;
  opt.textContent = `${name} (${w}×${h})`;
  deviceSel.appendChild(opt);
}
if (!detected) deviceSel.value = "1080x2340"; // 인식 실패 시 기본값: Galaxy S26

function currentOpt() {
  const [w, h] = deviceSel.value.split("x").map(Number);
  return { w, h, scale: sizeInput.value / 100, pos: posInput.value / 100 };
}

let rafPending = false;
function renderPreview() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(() => {
    rafPending = false;
    drawWallpaper(previewCv, cal, themeColors(), currentOpt());
  });
}

saveBtn.addEventListener("click", () => {
  const open = panel.hidden;
  panel.hidden = !open;
  saveBtn.setAttribute("aria-expanded", String(open));
  if (open) renderPreview();
});
deviceSel.addEventListener("change", renderPreview);
sizeInput.addEventListener("input", renderPreview);
posInput.addEventListener("input", renderPreview);
matchMedia("(prefers-color-scheme: dark)")
  .addEventListener("change", () => { if (!panel.hidden) renderPreview(); });

dlBtn.addEventListener("click", () => {
  if (dlBtn.disabled) return;
  dlBtn.disabled = true;
  const idleLabel = dlBtn.textContent;
  dlBtn.textContent = "이미지 생성 중...";
  errEl.textContent = "";
  const restore = () => { dlBtn.disabled = false; dlBtn.textContent = idleLabel; };

  try {
    drawWallpaper(previewCv, cal, themeColors(), currentOpt());
    const name = `calendar-${cal.y}-${String(cal.m + 1).padStart(2, "0")}-mobile.png`;

    if (appleFileShare) {
      const file = canvasPngFile(previewCv, name);
      if (navigator.canShare({ files: [file] })) {
        navigator.share({
          title: `${cal.y}년 ${cal.m + 1}월 달력`,
          files: [file],
        }).catch((err) => {
          if (err?.name !== "AbortError") {
            errEl.textContent = "공유 메뉴를 열지 못했습니다. 다시 시도해주세요.";
          }
        }).finally(restore);
        return;
      }
    }

    // 공유 파일을 지원하지 않는 브라우저는 파일 앱 다운로드로 대체한다.
    setTimeout(() => {
      downloadCanvasPng(previewCv, name, (err) => {
        if (err) errEl.textContent = "배경화면을 생성하지 못했습니다.";
        else if (appleMobile) errEl.textContent = "다운로드를 요청했습니다. 파일 앱에서 확인해주세요.";
        restore();
      });
    }, 30);
  } catch (e) {
    errEl.textContent = "배경화면을 생성하지 못했습니다.";
    restore();
  }
});
</script>
<script defer src="/_shared/share.js"></script>
</body>
</html>
