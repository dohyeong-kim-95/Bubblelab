name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 자동 목록 페이지의 최신순 정렬(git log)에 필요

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build
        run: node _infra/build.mjs

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4" # 기본값(3.x)은 wrangler.jsonc를 못 읽음
